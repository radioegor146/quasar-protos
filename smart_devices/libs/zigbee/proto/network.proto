syntax = "proto3";

package zigbee.proto;

message TNodeDescriptor {
  uint32 Type = 1;
  bool ComplexDescriptorAvailable = 2;
  bool UserDescriptorAvailable = 3;
  uint32 FreqBand = 4;
  uint32 Capability = 5;
  uint32 ManufacturerCode = 6;
  uint32 MaximumBufferSize = 7;
  uint32 MaximumIncomingTransferSize = 8;
  uint32 ServerMask = 9;
  uint32 MaximumOutgoingTransferSize = 10;
  uint32 DescriptorCapabilityField = 11;
}

message TSimpleDescriptor {
  uint32 Endpoint = 1;
  uint32 ProfileId = 2;
  uint32 DeviceId = 3;
  uint32 DeviceVersion = 4;
  repeated uint32 InputClusters = 5;
  repeated uint32 OutputClusters = 6;
}

message TZigbeeNode {
  reserved 4;
  uint32 NodeId = 1;
  fixed64 Eui64 = 2;
  uint32 Capability = 3;
  repeated .zigbee.proto.TSimpleDescriptor Endpoints = 5;
  .zigbee.proto.TNodeDescriptor NodeDescriptor = 6;
}

message TNetworkParameters {
  enum TVersion {
    UNKNOWN = 0;
    FIRST = 1;
  }

  uint32 PanId = 1;
  bytes ExtendedPanId = 2;
  bytes NetworkKey = 3;
  uint32 NetworkKeySequenceNumber = 4;
  bytes TrustCenterLinkKey = 5;
  uint32 Channel = 6;
  repeated .zigbee.proto.TZigbeeNode Nodes = 7;
  .zigbee.proto.TNetworkParameters.TVersion Version = 8;
}

