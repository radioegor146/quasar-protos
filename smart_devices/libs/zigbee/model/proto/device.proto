syntax = "proto3";

package proto;

import "google/protobuf/timestamp.proto";

message ZigbeeDevice {
  message DeviceInfo {
    message EndpointsEntry {
      uint32 key = 1;
      .proto.ZigbeeDevice.Endpoint value = 2;
    }

    repeated .proto.ZigbeeDevice.DeviceInfo.EndpointsEntry endpoints = 6;
    optional uint32 application_version = 1;
    optional uint32 stack_version = 2;
    optional uint32 hw_version = 3;
    optional string manufacturer_name = 4;
    optional string model_identifier = 5;
    optional string serial_number = 7;
  }

  message Endpoint {
    message ClustersEntry {
      uint32 key = 1;
      .proto.ZigbeeDevice.Cluster value = 2;
    }

    repeated .proto.ZigbeeDevice.Endpoint.ClustersEntry clusters = 1;
  }

  message Attribute {
    bytes Value = 1;
    optional uint32 ManufacturerCode = 2;
  }

  message Cluster {
    message LegacyAttributesEntry {
      uint32 key = 1;
      bytes value = 2;
    }

    message AttributesEntry {
      uint32 key = 1;
      .proto.ZigbeeDevice.Attribute value = 2;
    }

    repeated .proto.ZigbeeDevice.Cluster.LegacyAttributesEntry LegacyAttributes = 1;
    repeated .proto.ZigbeeDevice.Cluster.AttributesEntry Attributes = 2;
  }

  message DeviceConfig {
    message EndpointFingerprintsEntry {
      uint32 key = 1;
      bytes value = 2;
    }

    repeated uint32 removed_endpoints = 1;
    repeated .proto.ZigbeeDevice.DeviceConfig.EndpointFingerprintsEntry endpoint_fingerprints = 2;
  }

  .proto.ZigbeeDevice.DeviceInfo info = 1;
  .google.protobuf.Timestamp last_seen = 2;
  .proto.ZigbeeDevice.DeviceConfig config = 3;
}

