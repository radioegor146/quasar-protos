syntax = "proto2";

import "yandex_io/libs/appmetrica/proto/request_parameters.proto";

message Time {
  required uint64 timestamp = 1;
  required sint32 time_zone = 2;
  optional int64 server_time_offset = 3;
  optional bool obtained_before_first_synchronization = 4 [default = false];
}

message ReportMessage {
  message Location {
    required double lat = 1;
    required double lon = 2;
    optional uint64 timestamp = 3;
    optional uint32 precision = 4;
    optional uint32 direction = 5;
    optional uint32 speed = 6;
    optional int32 altitude = 7;
    optional .LocationProvider provider = 8 [default = PROVIDER_UNKNOWN];
    optional string original_provider = 9;
  }

  message Session {
    message SessionDesc {
      message Location {
        required double lat = 1;
        required double lon = 2;
      }

      message DeprecatedNetworkInfo {
        message CellularNetworkInfo {
          optional string network_type = 1;
          optional uint32 country_code = 2;
          optional uint32 operator_id = 3;
          optional uint32 cell_id = 4;
          optional uint32 lac = 5;
          optional sint32 signal_strength = 6;
          optional string operator_name = 7;
        }

        required .ReportMessage.Session.ConnectionType connection_type = 1;
        optional .ReportMessage.Session.SessionDesc.DeprecatedNetworkInfo.CellularNetworkInfo cellular_network_info = 2;
        repeated .WifiNetwork wifi_networks = 3;
      }

      enum SessionType {
        SESSION_FOREGROUND = 0;
        SESSION_BACKGROUND = 1;
        SESSION_DIAGNOSTIC = 2;
      }

      required .Time start_time = 1;
      required string locale = 2;
      optional .ReportMessage.Session.SessionDesc.Location location = 3;
      optional .ReportMessage.Session.SessionDesc.DeprecatedNetworkInfo network_info = 4;
      optional .ReportMessage.Session.SessionDesc.SessionType session_type = 5;
    }

    message Event {
      message NetworkInfo {
        message WifiAccessPoint {
          enum State {
            STATE_UNKNOWN = 0;
            STATE_DISABLED = 1;
            STATE_ENABLED = 2;
          }

          required string ssid = 1;
          optional .ReportMessage.Session.Event.NetworkInfo.WifiAccessPoint.State state = 2 [default = STATE_UNKNOWN];
        }

        repeated .Cell cell = 1;
        repeated .WifiNetwork wifi_networks = 2;
        optional .ReportMessage.Session.ConnectionType connection_type = 3 [default = CONNECTION_UNDEFINED];
        optional string cellular_network_type = 4;
        optional .ReportMessage.Session.Event.NetworkInfo.WifiAccessPoint wifi_access_point = 5;
      }

      message Account {
        required string id = 1;
        optional string type = 2;
        optional string options = 3;
      }

      enum EventType {
        EVENT_INIT = 1;
        EVENT_START = 2;
        EVENT_CRASH = 3;
        EVENT_CLIENT = 4;
        EVENT_REFERRER = 5;
        EVENT_ERROR = 6;
        EVENT_ALIVE = 7;
        EVENT_IDENTITY = 8;
        EVENT_AD_CLICK = 9;
        EVENT_AD_INSTALL = 10;
        EVENT_STATBOX = 11;
        EVENT_ACCOUNT = 12;
        EVENT_FIRST = 13;
        EVENT_PUSH_TOKEN = 14;
        EVENT_NOTIFICATION = 15;
        EVENT_OPEN = 16;
        EVENT_UPDATE = 17;
        EVENT_PERMISSIONS = 18;
        EVENT_APP_FEATURES = 19;
        EVENT_PROFILE = 20;
        EVENT_REVENUE = 21;
        EVENT_DIAGNOSTIC = 22;
        EVENT_DIAGNOSTIC_STATBOX = 23;
        EVENT_DIAGNOSTIC_APPMETRICA_STATE = 24;
        EVENT_PROTOBUF_ANR = 25;
        EVENT_PROTOBUF_CRASH = 26;
        EVENT_PROTOBUF_ERROR = 27;
        EVENT_IDENTITY_LIGHT = 28;
        EVENT_CLEANUP = 29;
        EVENT_VIEW_TREE = 30;
        EVENT_SEND_NOTIFICATION = 31;
        EVENT_PING_NOTIFICATION = 32;
        EVENT_INVALID_PUSH_TOKEN = 33;
        EVENT_RAW_VIEW_TREE = 34;
        EVENT_ECOMMERCE = 35;
      }

      enum EncodingType {
        NONE = 0;
        RSA_AES_CBC = 1;
        GZIP = 2;
      }

      required uint64 number_in_session = 1;
      required uint64 time = 2;
      required uint32 type = 3;
      optional string name = 4;
      optional bytes value = 5;
      optional .ReportMessage.Location location = 6;
      optional .ReportMessage.Session.Event.NetworkInfo network_info = 7;
      optional string environment = 8;
      optional .ReportMessage.Session.Event.Account account = 9;
      optional uint32 bytes_truncated = 10;
      optional .ReportMessage.Session.Event.EncodingType encoding_type = 12 [default = NONE];
      optional .ReportMessage.OptionalBool location_tracking_enabled = 13 [default = OPTIONAL_BOOL_UNDEFINED];
      optional bytes profile_id = 14;
      optional .ReportMessage.OptionalBool first_occurrence = 15 [default = OPTIONAL_BOOL_UNDEFINED];
      optional uint64 global_number = 16;
      optional uint64 number_of_type = 17;
      optional .ChargeType charge_type = 18 [default = CHARGE_TYPE_UNKNOWN];
      optional .CollectionMode collection_mode = 19 [default = COLLECTION_MODE_FOREGROUND];
      optional .ReportMessage.OptionalBool has_omitted_data = 20 [default = OPTIONAL_BOOL_UNDEFINED];
      optional .CallState call_state = 21 [default = CALL_STATE_UNKNOWN];
    }

    enum ConnectionType {
      CONNECTION_CELL = 0;
      CONNECTION_WIFI = 1;
      CONNECTION_UNDEFINED = 2;
      CONNECTION_BLUETOOTH = 3;
      CONNECTION_ETHERNET = 4;
      CONNECTION_MOBILE_DUN = 5;
      CONNECTION_MOBILE_HIPRI = 6;
      CONNECTION_MOBILE_MMS = 7;
      CONNECTION_MOBILE_SUPL = 8;
      CONNECTION_VPN = 9;
      CONNECTION_WIMAX = 10;
      CONNECTION_LOWPAN = 11;
      CONNECTION_WIFI_AWARE = 12;
    }

    required uint64 id = 1;
    required .ReportMessage.Session.SessionDesc session_desc = 2;
    repeated .ReportMessage.Session.Event events = 3;
  }

  message EnvironmentVariable {
    required string name = 1;
    required string value = 2;
  }

  message NetworkInterface {
    required string name = 1;
    required string mac = 2;
  }

  message SimInfo {
    optional uint32 country_code = 1;
    optional uint32 operator_id = 2;
    optional string operator_name = 3;
    optional bool data_roaming = 4 [default = false];
    optional string icc_id = 5;
  }

  enum OptionalBool {
    OPTIONAL_BOOL_UNDEFINED = -1;
    OPTIONAL_BOOL_FALSE = 0;
    OPTIONAL_BOOL_TRUE = 1;
  }

  optional .Time send_time = 1;
  repeated .ReportMessage.Session sessions = 3;
  optional .RequestParameters report_request_parameters = 4;
  repeated .ReportMessage.EnvironmentVariable app_environment = 7;
  repeated .ReportMessage.NetworkInterface network_interfaces = 8;
  repeated string imei = 9;
  repeated .ReportMessage.SimInfo sim_info = 10;
  repeated string certificates_sha1_fingerprints = 11;
}

message LocationMessage {
  message Location {
    required uint64 incremental_id = 1;
    required uint64 collect_timestamp = 2;
    optional uint64 timestamp = 3;
    required double latitude = 4;
    required double longitude = 5;
    optional uint32 precision = 6;
    optional uint32 direction = 7;
    optional uint32 speed = 8;
    optional int32 altitude = 9;
    optional .LocationProvider provider = 10 [default = PROVIDER_UNKNOWN];
    optional .CollectionMode collection_mode = 11 [default = COLLECTION_MODE_FOREGROUND];
    optional uint64 collect_timestamp_boot_offset = 12;
    optional .ChargeType charge_type = 13 [default = CHARGE_TYPE_UNKNOWN];
  }

  message Lbs {
    required uint64 incremental_id = 1;
    required uint64 timestamp = 2;
    repeated .Cell cell = 3;
    repeated .WifiNetwork wifi_network_info = 4;
    optional uint64 timestamp_boot_offset = 5;
    optional .ChargeType charge_type = 6 [default = CHARGE_TYPE_UNKNOWN];
    optional .CollectionMode collection_mode = 7 [default = COLLECTION_MODE_FOREGROUND];
  }

  message Visit {
    required uint64 incremental_id = 1;
    required uint64 collect_timestamp = 2;
    optional uint64 arrival_timestamp = 3;
    optional uint64 departure_timestamp = 4;
    required double latitude = 5;
    required double longitude = 6;
    optional double precision = 7;
  }

  repeated .LocationMessage.Location location = 1;
  repeated .LocationMessage.Lbs lbs = 2;
  repeated .LocationMessage.Visit visits = 3;
}

message Cell {
  enum Type {
    TYPE_DEFAULT = 0;
    TYPE_GSM = 1;
    TYPE_CDMA = 2;
    TYPE_WCDMA = 3;
    TYPE_LTE = 4;
  }

  optional uint32 cell_id = 1;
  optional sint32 signal_strength = 2;
  optional uint32 lac = 3;
  optional uint32 country_code = 4;
  optional uint32 operator_id = 5;
  optional string operator_name = 6;
  optional bool is_connected = 7 [default = false];
  optional .Cell.Type type = 8 [default = TYPE_DEFAULT];
  optional uint32 pci = 9;
  optional uint64 last_visible_time_offset = 10;
  optional sint32 lte_rsrq = 11;
  optional sint32 lte_rssnr = 12;
  optional sint32 lte_rssi = 13;
  optional uint32 arfcn = 14;
  optional uint32 lte_bandwidth = 15;
  optional uint32 lte_cqi = 16 [default = 4294967295];
}

message WifiNetwork {
  required string mac = 1;
  optional sint32 signal_strength = 2;
  optional string ssid = 3;
  optional bool is_connected = 4 [default = false];
  optional uint64 last_visible_time_offset = 5;
}

enum LocationProvider {
  PROVIDER_UNKNOWN = 0;
  PROVIDER_GPS = 1;
  PROVIDER_NETWORK = 2;
  PROVIDER_FUSED = 3;
}

enum ChargeType {
  CHARGE_TYPE_UNKNOWN = 0;
  CHARGE_TYPE_NONE = 1;
  CHARGE_TYPE_USB = 2;
  CHARGE_TYPE_WIRELESS = 3;
  CHARGE_TYPE_AC = 4;
}

enum CollectionMode {
  COLLECTION_MODE_FOREGROUND = 0;
  COLLECTION_MODE_BACKGROUND = 1;
  COLLECTION_MODE_VISIBLE = 2;
  COLLECTION_MODE_UNKNOWN = 3;
}

enum CallState {
  CALL_STATE_UNKNOWN = 0;
  CALL_STATE_IDLE = 1;
  CALL_STATE_RINGING = 2;
  CALL_STATE_OFFHOOK = 3;
}

