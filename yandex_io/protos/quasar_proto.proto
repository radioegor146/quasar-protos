  optional string report_event = 1;
  optional string report_event_json_value = 8;
  optional string report_error = 3;
  optional string report_error_value = 12;
  optional string metrica_uuid = 6;
  optional .quasar.proto.MetricaMessage.AppEnvironmentValue app_environment_value = 9;
  optional string delete_environment_key = 11;
  optional uint64 flags = 13;
  optional .quasar.proto.NetworkStatus network_status = 14;
  optional .quasar.proto.Location location = 16;
  optional .quasar.proto.Timezone timezone = 17;
  optional .quasar.proto.MetricaMessage.Statistics stats = 19;
  optional .quasar.proto.EmptyMessage flush = 20;
  optional string sync_uuid = 21;
  optional .quasar.proto.EmptyMessage clock_synchronized = 22;
  optional bool need_network_status = 23;
  optional bool is_listening = 24;
  optional .google.protobuf.Timestamp timestamp = 25;
  optional string passport_uid = 26;
}

message RecordingEvent {
  optional string phrase = 1;
  optional string speaker_id = 2;
  optional string phrase_id = 3;
  optional int32 seat_number = 9;
  optional .quasar.proto.EmptyMessage pause = 4;
  optional .quasar.proto.EmptyMessage resume = 5;
  optional string error = 6;
  optional string device_id = 7;
  optional bytes audio_data = 8;
  optional bool child = 10 [default = false];
  optional int64 timestamp_ms = 11;
}

message PhraseEndEvent {
  optional bool success = 1 [default = false];
  optional int64 timestamp_ms = 2;
}

message UpdateProgress {
  optional double downloaded_percent = 1;
}

message ExternalCommandResponse {
  required bool processed = 1;
}

message VinsCallResponse {
  reserved 1;
  reserved 3;
  enum Status {
    OK = 0;
    ERROR = 1;
  }

  optional string vins_response = 7;
  optional .quasar.proto.VinsCallResponse.Status status = 2;
  optional string error_code = 4;
  optional string error_text = 5;
  optional string error_text_lang = 6;
}

message LeaderOverride {
  reserved 1;
  reserved 2;
  reserved 3;
  optional .quasar.proto.MusicStateOverride music_state_override = 4;
  optional .quasar.proto.RadioStateOverride radio_state_override = 5;
}

message MusicStateOverride {
  reserved 8;
  optional bool is_paused = 1;
  optional double progress = 2;
  optional double duration = 3;
  optional string title = 4;
  optional string artists = 5;
  optional string cover_uri = 6;
  optional .quasar.proto.AppState.MusicState.TrackType next_track_type = 7;
  optional .quasar.proto.Audio.Screen screen_type = 9;
  optional string provider_name = 10;
}

message RadioStateOverride {
  optional bool is_paused = 1;
  optional string title = 2;
  optional string cover_uri = 3;
  optional string color = 4;
}

message SimplePlayerState {
  message TrackInfo {
    optional string id = 1;
    optional string type = 2;
  }

  message EntityInfo {
    optional string id = 1;
    optional string type = 2;
    optional string description = 3;
    optional .quasar.proto.SimplePlayerState.TrackInfo prev = 4;
    optional .quasar.proto.SimplePlayerState.TrackInfo next = 5;
    optional bool shuffled = 6;
    optional string repeat_mode = 7;
  }

  message ExtraEntry {
    optional string key = 1;
    optional string value = 2;
  }

  enum PlayerType {
    UNKNOWN = 0;
    MUSIC = 1;
    RADIO = 2;
    BLUETOOTH = 3;
    VIDEO = 4;
  }

  optional bool has_pause = 1;
  optional bool has_play = 2;
  optional bool has_next = 3;
  optional bool has_prev = 4;
  optional int64 position_time_point = 22;
  optional double position = 5;
  optional double duration = 6;
  optional string title = 7;
  optional string subtitle = 8;
  optional bool has_progress_bar = 9;
  optional bool has_like = 11;
  optional bool has_dislike = 12;
  optional bool show_player = 13;
  optional string live_stream_text = 14;
  optional string id = 15;
  optional string type = 16;
  optional string player_name = 17;
  optional .quasar.proto.SimplePlayerState.EntityInfo entity_info = 18;
  optional string provider_name = 19;
  optional bool hide_progress_bar = 20;
  optional .quasar.proto.SimplePlayerState.PlayerType player_type = 21;
  optional string playback_starter_user_id = 23;
  optional string current_screen = 24;
  repeated .quasar.proto.SimplePlayerState.ExtraEntry extra = 100;
}

message MordoviaShowMessage {
  reserved 3;
  optional string url = 1;
  optional bool is_full_screen = 2;
  optional string splash_div = 4;
  optional string server_callback_prototype = 5;
  optional string view_key = 6;
  optional string scenario_name = 7;
  optional bool go_back = 8;
  optional string vins_request_id = 9;
}

message MordoviaCommandMessage {
  reserved 3;
  optional string command = 1;
  optional string meta = 2;
  optional string view_key = 4;
  optional string scenario_name = 5;
  optional string vins_request_id = 6;
}

message WebsocketClientState {
  enum State {
    DISCONNECTED = 0;
    CONNECTING = 1;
    CONNECTED = 2;
  }

  optional .quasar.proto.WebsocketClientState.State state = 1 [default = DISCONNECTED];
}

message XivaSubscriptions {
  repeated string xiva_subscriptions = 1;
}

message SetupRcuAutoEvent {
  optional string tv_model = 1;
}

message LogMessage {
  message Source {
    optional string filename = 1;
    optional int32 line = 2;
    optional string funcname = 3;
    optional string path = 4;
  }

  enum Level {
    TRACE = 0;
    DEBUG = 1;
    INFO = 2;
    WARN = 3;
    ERROR = 4;
  }

  optional .quasar.proto.LogMessage.Level level = 1;
  optional int64 timestamp_ms = 2;
  optional .quasar.proto.LogMessage.Source source = 3;
  optional string msg = 4;
  optional string device_id = 5;
  optional string platform = 6;
}

