message NetworkStatsCommand {
  message DumpNetStatus {
  }

  optional .quasar.proto.NetworkStatsCommand.DumpNetStatus dump_net_status = 1;
  optional .quasar.proto.EmptyMessage get_arps = 2;
}

message NetworkStats {
  message Arp {
    optional string ip = 1;
    optional string mac = 2;
    optional .quasar.proto.NetworkStats.ArpState state = 3;
  }

  message NetDevice {
    optional string name = 1;
    optional string mac = 2;
    optional bool running = 3;
    repeated string addresses = 4;
    optional uint64 ms_in_state = 5;
    repeated .quasar.proto.NetworkStats.Arp arps = 6;
  }

  enum ArpState {
    INCOMPLETE = 0;
    REACHABLE = 1;
    STALE = 2;
    DELAY = 3;
    PROBE = 4;
    FAILED = 5;
    NOARP = 6;
    UNKNOWN = 7;
  }

  repeated .quasar.proto.NetworkStats.NetDevice devices = 1;
  optional .quasar.proto.EmptyMessage with_arps = 2;
}

message UpdateHealthCheck {
  message UpdateHealthCheckStatus {
    message RssStatuses {
      message StatusesEntry {
        optional string key = 1;
        optional .quasar.proto.UpdateHealthCheck.UpdateHealthCheckStatus.RssStatuses.Status value = 2;
      }

      enum Status {
        UNKNOWN = 0;
        OK = 1;
        EXCEEDED = 2;
      }

      repeated .quasar.proto.UpdateHealthCheck.UpdateHealthCheckStatus.RssStatuses.StatusesEntry statuses = 1;
    }

    optional bool is_alice_connected = 1;
    optional bool is_mic_audio_detected = 2;
    optional .quasar.proto.UpdateHealthCheck.UpdateHealthCheckStatus.RssStatuses rss_statuses = 3;
    optional bool spotter_started = 4;
  }

  optional bool failed = 1;
  optional .quasar.proto.UpdateHealthCheck.UpdateHealthCheckStatus status = 2;
}

message RssStatus {
  optional string daemon = 1;
  optional bool is_ok = 2;
}

message ForceCheckUpdates {
  optional uint64 timeout_seconds = 1;
}

message EqualizerParameters {
  optional string json_data = 1;
  optional string config_hash = 2;
}

