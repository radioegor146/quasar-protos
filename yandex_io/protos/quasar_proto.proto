message WifiConnect {
  optional string wifi_id = 1;
  optional string password = 2;
  optional .quasar.proto.WifiType wifi_type = 3;
}

message WifiConnectResponse {
  enum Status {
    OK = 0;
    SSID_NOT_FOUND = 1;
    AUTH_ERROR = 2;
    TIMEOUT = 3;
  }

  required .quasar.proto.WifiConnectResponse.Status status = 1;
}

message MediaMessage {
  optional .quasar.proto.SearchResult recommendations = 1;
  optional .quasar.proto.SearchResult featured_new = 2;
  optional .quasar.proto.SearchResult trending = 3;
  optional .quasar.proto.SearchResult music = 17;
  optional .quasar.proto.MediaItem last_watched = 4;
  optional .quasar.proto.EmptyMessage next_screen = 5;
  optional .quasar.proto.EmptyMessage previous_screen = 6;
  optional .quasar.proto.EmptyMessage to_start = 7;
  optional .quasar.proto.EmptyMessage to_end = 8;
  optional .quasar.proto.EmptyMessage to_home_screen = 9;
  optional .quasar.proto.SearchResult show_video_list = 10;
  optional .quasar.proto.DescriptionItem show_description = 11;
  optional .quasar.proto.PaymentItem show_payment = 16;
  optional .quasar.proto.TvAnnounce show_tv_announce = 18;
  optional .quasar.proto.EmptyMessage show_bottom_sheet = 12;
  optional .quasar.proto.EmptyMessage hide_bottom_sheet = 13;
  repeated string home_screen_suggests = 14;
  optional string message_id = 15;
  optional .quasar.proto.EmptyMessage leader_lost = 19;
  optional .quasar.proto.EmptyMessage leader_connected = 20;
  optional .quasar.proto.EmptyMessage hdmi_on = 21;
  optional .quasar.proto.EmptyMessage hdmi_off = 22;
  optional .quasar.proto.EmptyMessage go_up = 23;
  optional .quasar.proto.EmptyMessage go_down = 24;
}

message AddUserRequest {
  required string auth_code = 1;
  optional .quasar.proto.AccountType account_type = 2;
  optional bool with_xtoken = 3;
}

message DeleteUserRequest {
  optional int64 id = 1;
}

message ChangeUserRequest {
  optional int64 id = 1;
}

message IssueAuthCodeRequest {
  optional int64 id = 1;
}

message IssueAuthCodeResponse {
  enum Status {
    OK = 0;
    NO_INTERNET = 1;
    WRONG_USER = 2;
  }

  optional .quasar.proto.IssueAuthCodeResponse.Status status = 1;
  optional string auth_code = 2;
}

message AuthTokenUpdateRequest {
  optional string auth_token = 1;
  optional string source = 2;
  optional bool revoke_old_token = 3;
}

message AddUserResponse {
  enum Status {
    OK = 0;
    NO_INTERNET = 4;
    CODE_EXPIRED = 5;
    CRYPTO_ERROR = 6;
    INVALID_TOKEN = 7;
  }

  required .quasar.proto.AddUserResponse.Status status = 1;
  optional string auth_token = 2;
  optional int64 id = 3;
  optional string xtoken = 6;
  optional int64 tag = 7;
}

message DeleteUserResponse {
  enum Status {
    OK = 0;
    WRONG_USER = 1;
  }

  optional .quasar.proto.DeleteUserResponse.Status status = 1;
}

message AuthEvent {
  optional string auth_token = 1;
  optional string passport_uid = 2;
  optional string xtoken = 3;
  optional int64 tag = 4;
  optional .quasar.proto.AccountType type = 5;
  optional bool is_active = 6;
}

message OwnerStartupInfo {
  reserved 5;
  optional string auth_token = 2;
  optional string passport_uid = 3;
  optional string xtoken = 4;
  optional int64 tag = 6;
}

message AllStartupInfo {
  repeated .quasar.proto.AuthEvent accounts = 1;
}

