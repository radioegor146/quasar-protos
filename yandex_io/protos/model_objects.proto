syntax = "proto2";

package quasar.proto;

option java_package = "ru.yandex.quasar.protobuf";
option java_outer_classname = "ModelObjects";

import "alice/megamind/protos/guest/guest_options.proto";
import "alice/megamind/protos/common/events.proto";
import "alice/protos/api/alice_mode_info/alice_mode_info.proto";
import "alice/protos/api/alicekit/common/device_state/device_state.proto";
import "alice/protos/api/alicekit/common/environment_state/environment_state.proto";
import "alice/protos/api/alicekit/directives/directive.proto";
import "alice/protos/api/alicekit/common/uniproxy_options/uniproxy_options.proto";
import "alice/protos/data/dialog_type/dialog_type.proto";
import "alice/protos/data/event_source/event_source.proto";
import "alice/protos/data/music_provider/provider_meta.proto";
import "alice/protos/data/playback_options.proto";
import "alice/protos/data/scenario/music/karaoke_mode.proto";
import "alice/protos/data/scenario/music/switching_streams_metadata.proto";
import "alice/protos/endpoint/capabilities/audio_player/capability.proto";
import "alice/protos/endpoint/capabilities/volume/capability.proto";
import "alice/protos/endpoint/events/events.proto";
import "yandex_io/protos/connection_type/connection_type.proto";
import "yandex_io/sdk/directive_sequencer/protos/directive.proto";
import "yandex_io/sdk/private/endpoint_storage/protos/endpoint.proto";
import "google/protobuf/struct.proto";

message EmptyMessage {
}

message AudioInput {
  required bytes audio_data = 1;
  required double doa_angle = 2;
  optional string channel_name = 3;
  optional string vqe_type = 4;
}

message SetupCredentialsMessage {
  optional bytes setup_credentials = 1;
  optional .quasar.proto.SetupSource source = 2;
  optional int32 protocol_version = 3;
}

message EncryptedSetupCredentialsMessage {
  optional bytes ciphertext = 1;
  optional bytes C = 2;
  optional bytes M = 3;
  optional .quasar.proto.SetupSource source = 4;
}

message SetupStatusMessage {
  enum SetupStatus {
    NONE = 0;
    SOMETHING_WENT_WRONG = 1;
    CANNOT_CONNECT_TO_THE_WIFI = 2;
    WRONG_WIFI_PASSWORD = 3;
    NO_ACCESS_WIFI = 4;
    NO_ACCESS_ETHERNET = 5;
    PROTOCOL_NOT_SUPPORTED = 6;
    GENERIC_BLE_ERROR = 7;
    STARTED = 100;
    NETWORK_CONNECT_OK = 101;
    BACKEND_REGISTER_OK = 102;
    UPDATE_DOWNLOAD_START = 103;
    UPDATE_NOT_REQUIRED = 104;
    UPDATE_DOWNLOAD_FINISH = 105;
    UPDATE_DOWNLOAD_INTERRUPTED = 106;
    UPDATE_IS_REQUIRED = 107;
    CONFIGURATION_FINISHED = 108;
    OK = 109;
  }

  optional .quasar.proto.SetupStatusMessage.SetupStatus status = 1;
}

message BrokenMicInfo {
  repeated .quasar.proto.AudioInput audio_inputs = 1;
  repeated double rms_ratios = 2;
  optional bool detected = 3;
  optional bool first_setup = 4;
}

message GroupAliceState {
  optional .quasar.proto.GroupSpotterMicrophoneState microphone_group_state = 1;
}

message AllStartupSettings {
  optional bool all_startup_info = 1 [default = false];
  optional string auth_token = 2;
  optional string passport_uid = 3;
}

message WebViewState {
  message History {
    repeated string item = 1;
  }

  optional string url = 1;
  optional string scenario = 2;
  optional .quasar.proto.WebViewState.History history = 3;
  optional string backend_scenario_name = 4;
}

message ControlState {
  optional bool has_click_action = 1;
  optional bool has_up = 2;
  optional bool has_down = 3;
  optional bool has_left = 4;
  optional bool has_right = 5;
  optional bool has_back = 6;
}

message AudioOutputDeviceState {
  enum AudioOutputDeviceType {
    SPEAKER = 0;
    HDMI = 1;
  }

  optional .quasar.proto.AudioOutputDeviceState.AudioOutputDeviceType current_device = 1 [default = SPEAKER];
  optional .quasar.proto.AudioOutputDeviceState.AudioOutputDeviceType switching_to = 2 [default = SPEAKER];
}

message SoundNormalization {
  optional double true_peak = 1;
  optional double integrated_loudness = 2;
  optional double target_lufs = 3;
}

message MultiroomParams {
  message MusicParams {
    optional string current_track_id = 1;
    optional string json_track_info = 4;
    optional string uid = 5;
    optional int64 timestamp_ms = 6;
    optional string session_id = 7;
    optional bool is_paused = 3 [default = true];
  }

  optional string url = 1;
  optional int64 basetime_ns = 2;
  optional int64 position_ns = 3;
  optional int64 latency_ns = 4;
  optional .quasar.proto.SoundNormalization normalization = 7;
  optional .quasar.proto.MultiroomParams.MusicParams music_params = 5;
  optional .quasar.proto.AudioClientEvent audio_params = 6;
}

message MultiroomBroadcast {
  reserved 12;
  message MasterHints {
    optional bool quiet_audio_focus = 1;
    repeated .quasar.proto.Directive directives = 2;
    optional .quasar.proto.Audio next_audio = 3;
  }

  enum State {
    NONE = 0;
    PAUSED = 1;
    PLAYING = 2;
  }

  optional string device_id = 1;
  optional string multiroom_token = 3;
  optional int64 session_timestamp_ms = 2;
  repeated string room_device_ids = 11;
  optional string vins_request_id = 4;
  optional .quasar.proto.MultiroomBroadcast.State state = 5;
  optional string net_audio_clock_host = 6;
  optional int32 net_audio_clock_port = 7;
  optional string net_audio_clock_id = 8;
  optional .quasar.proto.MultiroomBroadcast.MasterHints master_hints = 9;
  optional .quasar.proto.MultiroomParams multiroom_params = 10;
  optional uint32 version = 100;
  optional string firmware = 101;
  optional uint32 seqnum = 102;
}

message MultiroomDirective {
  reserved 11;
  reserved 12;
  reserved 16;
  reserved 18;
  reserved 30;
  reserved 32;
  reserved 33;
  reserved 34;
  reserved 35;
  reserved 36;
  message Stop {
    optional string reason = 1;
  }

  message StartBroadcast {
    optional string multiroom_token = 1;
    repeated string room_device_ids = 3;
    optional string vins_request_id = 2;
  }

  message StopBroadcast {
    optional string reason = 1;
  }

  message ResumeBroadcast {
    optional .quasar.proto.MultiroomBroadcast multiroom_broadcast = 1;
  }

  message Command {
    optional string command = 1;
    optional string json_options = 2;
  }

  message AudioFocus {
    optional string initiator_device_id = 1;
    optional bool has_audio_focus = 2;
  }

  message StateRequest {
    optional string reason = 1;
  }

  message PlayerPause {
    optional string reason = 1;
  }

  optional string sender_device_id = 1;
  optional string master_device_id = 2;
  optional int64 session_timestamp_ms = 3;
  optional string multiroom_token = 4;
  optional .quasar.proto.MultiroomDirective.Stop stop = 10;
  optional .quasar.proto.MultiroomDirective.ResumeBroadcast resume_broadcast = 13;
  optional .quasar.proto.MultiroomDirective.Command command = 14;
  optional .quasar.proto.MultiroomDirective.AudioFocus audio_focus = 15;
  optional .quasar.proto.MultiroomDirective.StateRequest state_request = 17;
  optional .quasar.proto.MultiroomDirective.PlayerPause player_pause = 31;
  optional .quasar.proto.ExternalCommandMessage master_external_command = 101;
  optional .quasar.proto.ExternalCommandMessage execute_external_command = 102;
  optional .quasar.proto.ExternalCommandMessage cluster_external_command = 103;
}

message MultiroomState {
  reserved 12;
  reserved 100;
  message Peer {
    optional string device_id = 1;
    optional string ip_address = 2;
  }

  enum Mode {
    NONE = 0;
    MASTER = 1;
    SLAVE = 2;
  }

  enum SlaveSyncLevel {
    NOSYNC = 0;
    WEAK = 1;
    STRONG = 2;
  }

  optional string device_id = 1;
  optional .quasar.proto.MultiroomState.Mode mode = 2;
  optional string ip_address = 3;
  optional string net_audio_clock_host = 4;
  optional int32 net_audio_clock_port = 5;
  optional string net_audio_clock_id = 6;
  optional .quasar.proto.MultiroomBroadcast multiroom_broadcast = 9;
  optional .quasar.proto.MultiroomState.SlaveSyncLevel slave_sync_level = 10;
  optional bool slave_clock_syncing = 11;
  repeated .quasar.proto.MultiroomState.Peer peers = 200;
  repeated string dialog_device_ids = 300;
  optional uint32 version = 1000;
  optional uint32 seqnum = 1001;
  repeated string legacy_device_ids = 1002;
}

message Clock {
  enum SyncLevel {
    NOSYNC = 0;
    WEAK = 1;
    STRONG = 2;
  }

  optional string clock_id = 1;
  optional string device_id = 2;
  optional string host = 3;
  optional int32 port = 4;
  optional .quasar.proto.Clock.SyncLevel sync_level = 5;
  optional bool is_local = 6;
  optional bool is_proxy = 7;
}

message AppState {
  reserved "video";
  reserved 8;
  reserved 10;
  reserved 11;
  reserved 12;
  message ScreenState {
    optional .quasar.proto.AppState.ScreenType screen_type = 1;
    repeated int32 visible_items = 2;
    optional .quasar.proto.SearchResult search_result = 3;
    optional .quasar.proto.PaymentItem payment_item = 4;
    optional .quasar.proto.DescriptionItem description_item = 5;
    optional .quasar.proto.WebViewState web_view_state = 6;
    optional string web_page_state = 7;
    optional string actions = 8;
    optional .quasar.proto.ControlState available_directions = 9;
    optional bool is_hdmi_connected = 10;
    optional bool is_screensaver_on = 11 [default = false];
  }

  message MusicState {
    reserved 19;
    enum TrackType {
      UNKNOWN = 0;
      MUSIC = 1;
      FAIRY_TALE = 2;
      PODCAST = 3;
      AUDIOBOOK = 4;
    }

    optional string current_track_id = 1;
    optional string previous_track_id = 2;
    optional bool is_paused = 3 [default = true];
    optional string json_track_info = 4;
    optional string uid = 5;
    optional int64 timestamp_ms = 6;
    optional string session_id = 7;
    optional double progress = 8;
    optional double duration_ms = 9;
    optional string title = 10;
    optional string artists = 11;
    optional string cover_uri = 12;
    optional .quasar.proto.AppState.MusicState.TrackType next_track_type = 13;
    optional string next_track_title = 14;
    optional string url = 15;
    optional int64 basetime_ns = 16;
    optional int64 position_ns = 17;
    optional string vins_request_id = 18;
    optional string play_pause_id = 20;
    optional .quasar.proto.SoundNormalization normalization = 21;
  }

  message RadioState {
    optional string radio_id = 1;
    optional string uid = 2;
    optional bool is_paused = 3 [default = true];
    optional int64 timestamp_ms = 4;
    optional string radio_title = 5;
    optional string cover_uri = 6;
    optional string color = 7;
  }

  message MediaInfo {
    repeated string supported_screen_resolutions = 1;
    optional string hdcp_level = 2;
    repeated string dynamic_ranges = 3;
  }

  enum ScreenType {
    MAIN = 0;
    GALLERY = 1;
    DESCRIPTION = 2;
    VIDEO_PLAYER = 3;
    PAYMENT = 4;
    MUSIC_PLAYER = 5;
    SEASON_GALLERY = 6;
    SPLASH = 7;
    INITIALIZATION = 8;
    BLUETOOTH = 9;
    BRICK = 10;
    TV_GALLERY = 11;
    RADIO_PLAYER = 12;
    OTHER = 13;
    MORDOVIA_WEBVIEW = 14;
    CALL_SCREEN = 15;
    RCU_SETTINGS = 16;
    SEARCH_RESULTS = 17;
    TV_MAIN = 18;
    CONTENT_DETAILS = 19;
    TV_EXPANDED_COLLECTION = 20;
    TV_GRID = 21;
    SCREENSAVER = 22;
    TV_CATEGORY = 23;
    TV_CATALOG = 24;
    CENTAUR_DEFAULT_SCREEN = 25;
    EXTERNAL_APP = 26;
    SERIAL_NAVIGATOR = 27;
  }

  optional .quasar.proto.AppState.ScreenState screen_state = 1;
  optional .quasar.proto.AppState.MusicState music_state = 2;
  optional .quasar.proto.VideoState video_state = 3;
  optional .quasar.proto.AppState.RadioState radio_state = 4;
  optional .quasar.proto.BluetoothPlayerState bluetooth_player_state = 5;
  optional .quasar.proto.AudioClientEvent audio_player_state = 6;
  optional .quasar.proto.AppState.MediaInfo media_info = 7;
  optional .quasar.proto.RcuState rcu_state = 9;
  optional .quasar.proto.PackagesState packages_state = 13;
  optional .NAlice.NAliceApi.TDeviceState.TVideo alice_video_state = 14;
}

message VideoState {
  reserved 5;
  reserved 6;
  optional .quasar.proto.Video video = 1;
  optional .quasar.proto.Progress progress = 3;
  optional bool is_paused = 2;
  optional int64 timestamp_ms = 4;
}

message RcuState {
  message RcuCapabilities {
    optional bool can_make_sounds = 1;
  }

  enum SetupState {
    NONE = 0;
    LINK = 1;
    AUTO = 2;
    CHECK = 3;
    ADVANCED = 4;
    MANUAL = 5;
  }

  optional bool is_rcu_connected = 1;
  optional int32 total_codesets = 2;
  optional .quasar.proto.RcuState.SetupState setup_state = 3;
  optional .quasar.proto.RcuState.RcuCapabilities rcu_capabilities = 4;
}

message PackagesState {
  message Package {
    optional string name = 1;
    optional string human_readable_name = 2;
  }

  message InstalledPackage {
    optional .quasar.proto.PackagesState.Package package_info = 1;
    optional string main_activity = 2;
  }

  repeated .quasar.proto.PackagesState.InstalledPackage installed = 1;
}

message WifiInfo {
  optional string ssid = 1;
  optional bool secure = 2;
  optional int32 rssi = 3;
  optional string mac = 4;
  optional int32 freq = 5;
  optional int32 channel = 6;
  optional .quasar.proto.WifiType wifi_type = 7;
  optional bool is_connected = 8 [default = false];
  optional bool is_corporate = 9 [default = false];
  optional string flags = 10;
}

message WifiList {
  repeated .quasar.proto.WifiInfo hotspots = 1;
}

message NetworkStatus {
  enum Status {
    NOT_CONNECTED = 0;
    CONNECTING = 1;
    CONNECTED_NO_INTERNET = 2;
    CONNECTED = 3;
    NOT_CHOSEN = 4;
  }

  optional .quasar.proto.NetworkStatus.Status status = 1;
  optional .quasar.proto.ConnectionType type = 4;
  oneof interface_status {
    .quasar.proto.WifiStatus wifi_status = 2;
    .quasar.proto.EthernetStatus ethernet_status = 3;
  }
}

message EthernetStatus {
}

message WifiStatus {
  reserved 2;
  message TimeOverHttp {
    optional int64 steady_clock_us = 1;
    optional int64 system_clock_us = 2;
  }

  enum Status {
    NOT_CONNECTED = 0;
    CONNECTING = 1;
    CONNECTED_NO_INTERNET = 2;
    CONNECTED = 3;
    NOT_CHOSEN = 4;
  }

  enum Speed {
    UNKNOWN = 0;
    LOW = 1;
    MIDDLE = 2;
    FAST = 3;
  }

  enum Signal {
    WEAK = 0;
    GOOD = 1;
    STRONG = 2;
    EXCELLENT = 3;
  }

  optional .quasar.proto.WifiStatus.Status status = 1;
  optional .quasar.proto.WifiStatus.Signal signal = 3;
  optional bool internet_reachable = 4;
  optional .quasar.proto.WifiInfo current_network = 5;
  optional .quasar.proto.WifiStatus.TimeOverHttp time_over_http = 6;
}

message Progress {
  optional int32 played = 1;
  optional int32 duration = 2;
}

message CompleteVideoState {
  message StateEntry {
    optional string key = 1;
    optional .quasar.proto.UserWatchedVideoState value = 2;
  }

  repeated .quasar.proto.CompleteVideoState.StateEntry state = 1;
}

message UserWatchedVideoState {
  message UserStateEntry {
    optional string key = 1;
    optional .quasar.proto.WatchedVideoState value = 2;
  }

  repeated .quasar.proto.UserWatchedVideoState.UserStateEntry user_state = 1;
}

message WatchedVideoState {
  repeated .quasar.proto.VideoState movies = 1;
  repeated .quasar.proto.VideoState episodes = 2;
  repeated .quasar.proto.VideoState video = 3;
}

message Video {
  optional string url = 1;
  optional string session_token = 2;
  optional .quasar.proto.MediaItem item = 3;
  optional .quasar.proto.MediaItem next_item = 4;
  optional .quasar.proto.MediaItem tv_show_item = 5;
  optional int32 start_at = 6;
  optional string raw = 7;
  optional string payload = 8;
  optional string vins_init_request_id = 9;
  optional string audio_language = 10;
  optional string subtitles_language = 11;
}

message AudioTrack {
  optional string language = 1;
  optional string title = 2;
  optional int32 index = 3;
  optional string suggest = 4;
}

message Subtitles {
  optional string language = 1;
  optional string title = 2;
  optional bool enable = 3;
  optional int32 index = 4;
  optional string suggest = 5;
}

message Radio {
  optional string url = 1;
  optional string id = 2;
  optional string title = 3;
  optional string image_url = 4;
  optional string uid = 5;
  optional string color = 7;
  optional string raw = 6;
  optional bool force_restart_player = 8;
}

message Weather {
  optional int32 temperature = 1;
  optional string icon_url = 2;
}

message Location {
  optional double latitude = 1;
  optional double longitude = 2;
  optional double precision = 3;
}

message VolumeState {
  optional int32 current_volume = 7;
  optional bool is_muted = 8;
  optional double current_volume_double = 9;
}

message VolumeSetMessage {
  optional int32 volume_value = 1;
  optional int32 max_volume = 2;
  optional int32 alice_volume_value = 3;
  optional string request_id = 4;
}

message SearchResult {
  optional string question = 1;
  optional string answer = 2;
  repeated .quasar.proto.MediaItem items = 3;
  repeated string suggests = 4;
  optional string background_url = 5;
  optional .quasar.proto.GalleryType gallery_type = 6;
  optional string raw_result = 7;
  optional .quasar.proto.MediaItem tv_show_item = 8;
  optional int32 season = 9;
}

message DescriptionItem {
  optional .quasar.proto.MediaItem media_item = 1;
  optional string raw = 2;
}

message PaymentItem {
  optional .quasar.proto.MediaItem item = 1;
  optional string raw = 2;
  optional .quasar.proto.MediaItem tvShowItem = 3;
}

message TvAnnounce {
  optional string thumbnail_url = 1;
  optional int64 start_time = 2;
  optional string next_episode_name = 3;
}

message MediaItem {
  enum Type {
    MOVIE = 0;
    TV_SHOW = 1;
    VIDEO = 2;
    TV_SHOW_EPISODE = 3;
    MUSIC = 4;
    TV_STREAM = 5;
    CAMERA_STREAM = 6;
  }

  enum StreamType {
    DASH = 0;
    SMOOTH_STREAMING = 1;
    HLS = 2;
    OTHER = 3;
  }

  optional string cover_url = 1;
  optional string name = 2;
  optional string description = 3;
  optional double rating = 4;
  optional bool trailer_available = 5;
  optional bool review_available = 6;
  optional int32 progress_percents = 9;
  optional .quasar.proto.MediaItem.Type type = 10;
  optional int32 seasons = 11;
  optional string release_year = 12;
  optional string directors = 13;
  optional string actors = 14;
  optional string background_url = 15;
  optional string source_host = 16;
  optional string genre = 17;
  optional string age_restriction = 18;
  optional int64 view_count = 19;
  repeated .quasar.proto.ProviderInfo provider_info = 20;
  optional .quasar.proto.Provider provider = 21;
  optional string item_id = 22;
  optional string availability_request = 30;
  optional bool available = 23;
  optional int32 cost_from = 24;
  optional int32 duration = 25;
  optional int32 season = 26;
  optional int32 episode = 27;
  optional bool unauthorized = 28;
  optional string play_uri = 29;
  optional string tv_episode_name = 31;
  optional bool deep_hd = 32;
  optional bool personal_channel = 33;
  repeated .quasar.proto.Season season_numbers = 34;
  repeated .quasar.proto.AudioTrack audio_streams = 35;
  repeated .quasar.proto.Subtitles subtitles = 36;
  repeated .quasar.proto.SkippableFragments skippable_fragments = 37;
  optional string entref = 38;
  optional .quasar.proto.MediaItem.StreamType camera_stream_type = 39;
}

message SkippableFragments {
  enum Type {
    INTRO = 0;
    RECAP = 1;
    CREDITS = 2;
    OTHER = 3;
    NEXT_EPISODE = 4;
  }

  optional .quasar.proto.SkippableFragments.Type type = 1;
  optional int64 start_time_sec = 2;
  optional int64 end_time_sec = 3;
}

message Season {
  optional int32 number = 1;
}

message ProviderInfo {
  optional .quasar.proto.Provider provider = 1;
  optional string item_id = 2;
  optional bool available = 3;
  optional int32 cost_from = 4;
}

message Alarm {
  enum AlarmType {
    ALARM = 0;
    REMINDER = 1;
    TIMER = 2;
    COMMAND_TIMER = 3;
    MEDIA_ALARM = 4;
  }

  required string id = 1;
  required .quasar.proto.Alarm.AlarmType alarm_type = 2;
  optional int64 start_timestamp_ms = 3;
  optional int64 duration_seconds = 4;
  optional string remind_message = 5;
  optional bool currently_playing = 6;
  repeated .quasar.proto.ExternalCommandMessage command_list = 7;
  optional int64 pause_timestamp_sec = 8;
  optional int64 paused_seconds = 9 [default = 0];
  optional int64 delay_seconds = 10 [default = 0];
  optional bool was_prefetched = 11 [default = false];
  optional .quasar.proto.MediaRequest media_request = 12;
}

message TimersState {
  repeated .quasar.proto.Alarm timers = 1;
}

message AlarmsState {
  optional string icalendar_state = 1;
  optional string media_alarm_setting = 2;
  optional .quasar.proto.AlarmsSettings alarms_settings = 3;
}

message AlarmsSettings {
  optional int32 max_volume_level = 1;
  optional int32 min_volume_level = 2;
  optional int32 volume_raise_step_ms = 3;
}

message BluetoothPrevRequest {
  optional bool forced = 1 [default = false];
}

message BluetoothSinkRequest {
  message VisibilityRequest {
    required .quasar.proto.BluetoothVisibility visibility = 1;
    optional int32 timeout = 2 [default = 300];
  }

  optional .quasar.proto.EmptyMessage pause = 1;
  optional .quasar.proto.EmptyMessage play = 2;
  optional .quasar.proto.EmptyMessage next = 3;
  optional .quasar.proto.BluetoothPrevRequest prev = 4;
  optional .quasar.proto.BluetoothSinkRequest.VisibilityRequest set_visibility = 5;
  optional int32 change_volume_abs_percent = 6;
}

message BluetoothNetwork {
  enum BluetoothRole {
    SINK = 1;
    SOURCE = 2;
    NONE = 3;
  }

  optional string name = 1;
  required string address = 2;
  optional .quasar.proto.BluetoothNetwork.BluetoothRole role = 3;
}

message BtConnectionEvent {
  required .quasar.proto.BtConnection connection_event = 1;
  optional .quasar.proto.BluetoothNetwork network = 2;
}

message BluetoothTrackMetaInfo {
  optional string title = 1;
  optional string artist = 2;
  optional string album = 3;
  optional string genre = 4;
  optional int32 song_len_ms = 5 [default = -1];
  optional int32 curr_pos_ms = 6 [default = -1];
}

message BluetoothPlayerState {
  optional bool is_paused = 1 [default = true];
  optional .quasar.proto.BluetoothTrackMetaInfo track_meta_info = 2;
  optional int64 timestamp_ms = 3;
  optional int64 last_play_timestamp_ms = 4;
}

message BluetoothSinkEvent {
  enum BtSinkAudioEvent {
    PLAYING = 1;
    NOT_PLAYING = 2;
  }

  optional .quasar.proto.BtConnectionEvent connection_event = 1;
  optional .quasar.proto.BluetoothVisibility visibility = 3;
  optional .quasar.proto.BluetoothSinkEvent.BtSinkAudioEvent audio_event = 2;
  optional .quasar.proto.AVRCP avrcp_event = 4;
  optional .quasar.proto.BluetoothTrackMetaInfo bluetooth_track_meta_info = 5;
  optional int32 volume_percent = 6 [default = -1];
}

message BluetoothSourceEvent {
  optional .quasar.proto.BtConnectionEvent connection_event = 1;
  optional .quasar.proto.AVRCP avrcp_event = 2;
}

