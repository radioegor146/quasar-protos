syntax = "proto2";

package quasar.proto;

option java_package = "ru.yandex.quasar.protobuf";
option java_outer_classname = "DirectiveProto";

import "alice/protos/data/event_source/event_source.proto";
import "alice/protos/api/source/source.proto";

message Directive {
  reserved "channel";
  reserved 13;
  reserved 17;
  reserved 24;
  message TagsEntry {
    optional string key = 1;
    optional string value = 2;
  }

  optional string name = 1;
  optional string analytics_context_name = 2;
  optional string type = 3;
  optional string request_id = 4;
  optional string parent_request_id = 5;
  optional string parent_message_id = 18;
  optional string text = 7;
  optional string asr_text = 8;
  optional string displayed_text = 9;
  optional bool ignore_answer = 10 [default = false];
  optional bool is_led_silent = 11 [default = true];
  optional bool is_route_locally = 12 [default = false];
  optional string endpoint_id = 14;
  optional bool is_prefetched = 19 [default = false];
  optional .NAlice.TEventSource event_source = 20;
  optional string directive_id = 21;
  optional bool block_subsequent_prefetch = 22;
  optional string pers_id = 23;
  repeated .quasar.proto.Directive.TagsEntry tags = 26;
  optional .NAlice.NAliceApi.TSourceInfo source_info = 27;
  optional bool attach_to_multiroom = 28;
  repeated string room_device_ids = 15;
  optional string multiroom_session_id = 16;
  oneof payload_type {
    string json_payload = 6;
    bytes raw_payload = 25;
  }
}

