syntax = "proto2";

package quasar.proto;

option java_package = "ru.yandex.quasar.protobuf";
option java_outer_classname = "Storage";

import "alice/protos/data/scenario/alarm/alarm.proto";
import "alice/protos/data/scenario/timer/timer.proto";

message AlarmStorage {
  reserved 1;
  reserved 2;
  repeated .NAlice.NData.TAlarm alarms = 3;
  repeated .NAlice.NData.TTimerDescription timers = 4;
}

