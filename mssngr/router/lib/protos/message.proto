syntax = "proto3";

package NMessengerProtocol;

option java_package = "ru.yandex.yandex360.mssngr.router.lib.protos.message";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/mssngr/router/lib/protos";

import "mssngr/router/lib/protos/client.proto";

message TDebugParams {
  string DeliveryAddress = 1;
  string YambAddress = 4;
  string BotPlatformAddress = 5;
  string DeliveryAlias = 6;
  string YambAlias = 7;
  string BotPlatformAlias = 8;
  string XivaAddress = 9;
}

message TPrivilegedParams {
  bool SkipMembershipCheck = 1;
}

message TCommonRequestFields {
  bool IsRetry = 1;
  string UserIp = 2;
  .NMessengerProtocol.EOriginService Origin = 3;
  int32 UserPort = 4;
}

message TPrivilegedInMessage {
  string ChatId = 2;
  .NMessengerProtocol.EMessageType Type = 3;
  string PayloadId = 4;
  bytes PayloadResponse = 5;
  bytes PayloadData = 6;
  uint64 Timestamp = 10;
  string Guid = 1;
  repeated string ToGuids = 7;
  string UserIp = 8;
  .NMessengerProtocol.TDebugParams DebugParams = 9;
  int32 UserPort = 11;
  .NMessengerProtocol.TClientMessage ClientMessage = 101;
  bool ModerationDisabled = 102;
  uint32 ModerationPriority = 104;
  .NMessengerProtocol.TUserInfo CustomFrom = 105;
  uint64 SuggestedTimestamp = 106;
  .NMessengerProtocol.TMessageMeta Meta = 107;
  .NMessengerProtocol.TNotificationMeta NotificationMeta = 108;
  uint64 HistoryVersion = 109;
  bool ShadowEdit = 110;
  .NMessengerProtocol.TWorkspaceNotificationSettings WorkspaceNotificationSettings = 111;
}

message TMessageMeta {
  message TCmntData {
    uint32 Service = 1;
    uint64 OrgPermalink = 4;
  }

  .NMessengerProtocol.EOriginService Origin = 1;
  .NMessengerProtocol.TMessageMeta.TCmntData CmntData = 2;
  string RtxId = 3;
  string MessageLanguage = 4;
}

message TWorkspaceNotificationSettings {
  message TNotifyAllSettings {
    repeated string Workspaces = 1;
  }

  message TNotifyPrioritySettings {
    repeated string Workspaces = 1;
  }

  oneof Strategy {
    .NMessengerProtocol.TWorkspaceNotificationSettings.TNotifyAllSettings All = 1;
    .NMessengerProtocol.TWorkspaceNotificationSettings.TNotifyPrioritySettings Priority = 2;
  }
}

message TInMessage {
  string ChatId = 3;
  .NMessengerProtocol.EMessageType Type = 4;
  string PayloadId = 5;
  bytes PayloadResponse = 7;
  bytes PayloadData = 8;
  string ToGuid = 9;
  uint64 Timestamp = 12;
  string Guid = 2;
  string UserIp = 10;
  .NMessengerProtocol.TDebugParams DebugParams = 11;
  int32 UserPort = 15;
  .NMessengerProtocol.TClientMessage ClientMessage = 101;
  .NMessengerProtocol.TMessageMeta Meta = 102;
  string UserAgent = 104;
  .NMessengerProtocol.TClientTransportId ClientTransportId = 105;
  .NMessengerProtocol.TWorkspaceNotificationSettings WorkspaceNotificationSettings = 106;
}

message TRankingData {
  enum ESource {
    UNSET = 0;
    BERT_CONSTRUCTIVITY = 1;
  }

  .NMessengerProtocol.TRankingData.ESource Source = 1;
  double Value = 2;
}

message TOutMessage {
  string ChatId = 3;
  .NMessengerProtocol.EMessageType Type = 4;
  string PayloadId = 5;
  bytes PayloadResponse = 6;
  bytes PayloadData = 7;
  string Token = 8;
  uint64 Timestamp = 9;
  uint64 PrevTimestamp = 10;
  string FromGuid = 11;
  uint64 SeqNo = 14;
  string MessageText = 15;
  string FileName = 16;
  uint64 LastEditTsMcs = 17;
  uint64 Version = 18;
  bool IsLegacyMessage = 20;
  repeated string Guids = 2;
  string UserIp = 13;
  int32 UserPort = 21;
  .NMessengerProtocol.TServerMessage ServerMessage = 101;
  .NMessengerProtocol.TMessageMeta Meta = 102;
  repeated .NMessengerProtocol.TRankingData RankingData = 104;
  .NMessengerProtocol.TClientTransportId ClientTransportId = 105;
  string ClientWorkspace = 106;
}

message TOutMessageRef {
  string ChatId = 3;
  uint64 Timestamp = 9;
  uint64 Version = 10;
  uint32 AttemptCount = 101;
  uint64 LastAttemptTimestamp = 102;
  .NMessengerProtocol.TServerMessage NonHistoryMessage = 103;
  repeated string ToGuids = 104;
  uint32 Priority = 105;
  repeated uint64 ToPuids = 106;
  uint64 Namespace = 107;
  uint64 Subservice = 108;
  uint64 FromPuid = 109;
  string UserIp = 210;
  int32 UserPort = 211;
  uint32 BotHosts = 212;
  string ClientWorkspace = 213;
}

message TOutMessageRefModeration {
  string ChatId = 3;
  uint64 Timestamp = 9;
  uint64 Version = 10;
  .NMessengerProtocol.TServerMessage NonHistoryMessage = 103;
  uint32 Priority = 105;
  uint64 Namespace = 107;
  uint64 Subservice = 108;
  uint64 FromPuid = 109;
  string ModerationType = 110;
}

message TOutMessageBlock {
  repeated .NMessengerProtocol.TOutMessage Messages = 1;
}

message TCompressedOutMessageBlock {
  bytes CompressedMessages = 1;
  .NMessengerProtocol.ECodec Codec = 2;
  uint32 MessageBlockFlags = 3;
  uint32 AttemptsCount = 4;
  uint64 LastAttemptTimestamp = 5;
}

message TPostprocPushStatus {
}

message TMessageInfo {
  uint64 TimestampMcs = 1;
  uint64 PrevTimestampMcs = 2;
  uint64 SeqNo = 3;
  uint64 Version = 4;
}

message TErrorInfo {
  string Message = 1;
  uint32 WorkerId = 2;
  uint64 TimeMcs = 3;
  uint64 RetryAfter = 4;
}

message TDebugInfo {
  string WorkerAddress = 1;
  string BalancerAddress = 2;
  uint64 PostprocPushTimeMcs = 4;
  uint64 ProcessingTimeMcs = 5;
  uint32 Attempts = 6;
  repeated .NMessengerProtocol.TErrorInfo ErrorInfos = 7;
  uint64 SuccessfulAttemptTimeMcs = 8;
}

message TResponse {
  message TRateLimit {
    uint64 WaitFor = 1;
  }

  .NMessengerProtocol.ECommitStatus Status = 1;
  string Details = 2;
  .NMessengerProtocol.TMessageInfo MessageInfo = 3;
  .NMessengerProtocol.TDebugInfo DebugInfo = 4;
  .NMessengerProtocol.TResponse.TRateLimit RateLimit = 5;
}

message TChatCounters {
  uint64 TotalMessageCount = 1;
  uint64 HiddenMessageCount = 2;
}

message TPinnedMessageInfo {
  uint64 PinnedMessageTs = 1;
  uint64 LastActionTsMcs = 2;
}

message TChatRole {
  .NMessengerProtocol.EChatRole Role = 1;
  uint64 Version = 2;
  uint64 Rights = 3;
  string ProfileId = 4;
  bool IsTransient = 5;
}

message TChatHistoryResponse {
  string ChatId = 1;
  repeated .NMessengerProtocol.TOutMessage Messages = 2;
  uint64 LastEditTsMcs = 3;
  .NMessengerProtocol.EGenericResponseStatus Status = 4;
  .NMessengerProtocol.TChatCounters Counters = 5;
  uint64 LastSeenTsMcs = 6;
  uint64 LastSeenByMeTsMcs = 7;
  uint64 Version = 8;
  uint64 LastSeenSeqNo = 9;
  uint64 LastSeenByMeSeqNo = 10;
  bool Muted = 11;
  .NMessengerProtocol.TTimestampRange LastModeratedRange = 12;
  uint64 ApproximateOnlineUserCount = 13;
  .NMessengerProtocol.TChatInfo ChatInfo = 14;
  uint64 LastSeqNo = 15;
  bool ApprovedByMe = 17;
  .NMessengerProtocol.TUserInfo PartnerInfo = 18;
  uint64 LastTsMcs = 19;
  .NMessengerProtocol.TPinnedMessageInfo PinnedMessageInfo = 20;
  .NMessengerProtocol.TChatRole MyRole = 21;
  uint64 HistoryStartTsMcs = 22;
  repeated uint64 MentionTsMcs = 23;
  .NMessengerProtocol.TPrivateChatInfo PrivateChatInfo = 24;
  .NMessengerProtocol.TServerMessage ThreadParentMessage = 25;
  .NMessengerProtocol.TMeetingInfo MeetingInfo = 26;
  uint64 LastSeenByMeVersion = 27;
  .NMessengerProtocol.TChatEventTypes SupportedEvents = 28;
}

message THistoryResponse {
  repeated .NMessengerProtocol.TChatHistoryResponse Chats = 1;
  repeated .NMessengerProtocol.TErrorInfo ErrorInfos = 2;
  string RequestId = 3;
  .NMessengerProtocol.EGenericResponseStatus Status = 4;
  uint64 UnreadCount = 5;
  uint32 WorkspaceVersion = 8;
  uint64 MinGlobalVersion = 9;
  uint64 MaxGlobalVersion = 10;
}

message TResponseFilter {
  bool ExceptDeletedMessages = 1;
  bool ModerationApprovedOnly = 2;
  bool UnmuteHiddenNamespaces = 3;
}

message TMessageDataFilter {
  bool KeepUids = 1;
  bool DropPayload = 2;
  bool OnlyTimestamps = 3;
  bool IncludeRankingData = 4;
  bool DropThreadParentMessage = 5;
}

message THistoryTranslationDataFilter {
  string LanguageCode = 1;
  repeated uint64 TranslationFor = 2;
}

message THistoryRequest {
  message TExperiments {
    bool Versioning = 1;
  }

  message TChatDataFilter {
    uint64 MinVersion = 1;
    uint32 OrganizationId = 2;
    uint32 Limit = 3;
    uint64 MinKnownGlobalVersion = 4;
    uint64 MaxKnownGlobalVersion = 5;
  }

  string Guid = 1;
  string ChatId = 2;
  uint64 MinTimestamp = 3;
  uint32 Limit = 4;
  uint64 MaxTimestamp = 5;
  uint32 Offset = 6;
  string RequestId = 7;
  string InviteHash = 8;
  .NMessengerProtocol.TMessageDataFilter MessageDataFilter = 9;
  uint64 Uid = 10;
  .NMessengerProtocol.TCommonRequestFields CommonRequestFields = 11;
  bool DropPersonalFields = 12;
  .NMessengerProtocol.TResponseFilter ResponseFilter = 14;
  .NMessengerProtocol.THistoryRequest.TChatDataFilter ChatDataFilter = 15;
  repeated string ChatIds = 16;
  bool Internal = 17;
  .NMessengerProtocol.THistoryRequest.TExperiments Experiments = 18;
  bool Threads = 19;
  bool HasMeeting = 20;
  .NMessengerProtocol.THistoryTranslationDataFilter TranslationDataFilter = 21;
}

message TUnreadCountResponse {
  message TChat {
    string ChatId = 1;
    string Name = 2;
    string AvatarId = 3;
    uint64 UnreadCount = 4;
    uint64 LastTsMcs = 5;
    bool ApprovedByMe = 6;
  }

  message TWorkspaceDetails {
    message NsEntry {
      string key = 1;
      uint64 value = 2;
    }

    message BotsEntry {
      string key = 1;
      uint64 value = 2;
    }

    repeated .NMessengerProtocol.TUnreadCountResponse.TWorkspaceDetails.NsEntry Ns = 1;
    repeated .NMessengerProtocol.TUnreadCountResponse.TWorkspaceDetails.BotsEntry Bots = 2;
  }

  .NMessengerProtocol.EGenericResponseStatus Status = 1;
  .NMessengerProtocol.TErrorInfo ErrorInfo = 2;
  string RequestId = 3;
  uint64 UnreadCount = 4;
  uint64 ChatUnreadCount = 5;
  uint64 LastUnreadTsMcs = 6;
  uint64 Ttl = 7;
  repeated .NMessengerProtocol.TUnreadCountResponse.TChat ImportantChats = 8;
  uint32 ChatCount = 9;
  .NMessengerProtocol.TUnreadCountResponse.TWorkspaceDetails Details = 10;
}

message TUnreadCountRequest {
  string RequestId = 1;
  string ChatId = 2;
  string OtherGuid = 3;
  bool UnmuteHiddenNamespaces = 4;
  string Guid = 5;
  uint64 ImportantChatsLimit = 6;
  bool IgnoreApprovals = 7;
  string Client = 8;
  repeated uint64 Namespaces = 9;
  bool CountChats = 10;
  bool DetailedWorkspace = 11;
}

message TSubscriptionResponse {
  .NMessengerProtocol.EGenericResponseStatus Status = 1;
  string Details = 2;
  string RequestId = 3;
  .NMessengerProtocol.TServerMessage LastMessage = 4;
  .NMessengerProtocol.TTimestampRange LastModeratedRange = 5;
  .NMessengerProtocol.TErrorInfo ErrorInfo = 6;
  repeated .NMessengerProtocol.TServerMessage LastMessages = 7;
  uint64 CurrentTime = 8;
  repeated .NMessengerProtocol.TErrorInfo ErrorInfos = 9;
}

message TTranslationDataFilter {
