  .NMessengerProtocol.EGenericResponseStatus Status = 1;
  .NMessengerProtocol.TErrorInfo ErrorInfo = 2;
  .NMessengerProtocol.TPollResults Results = 3;
  repeated uint32 MyChoices = 4;
  repeated .NMessengerProtocol.TPollInfoResponse.TAnswerVotes AnswerVotes = 5;
