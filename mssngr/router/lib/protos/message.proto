  string Guid = 1;
  string ChatId = 2;
  string InviteHash = 3;
  uint64 Timestamp = 4;
  .NMessengerProtocol.TMessageRef ForwardedMessageRef = 5;
  .NMessengerProtocol.TPrivilegedParams PrivilegedParams = 6;
  .NMessengerProtocol.TCommonRequestFields CommonRequestFields = 7;
  bool ReturnResults = 8;
  uint32 Limit = 9;
  .NMessengerProtocol.TPollInfoRequest.TAnswerFilter AnswerFilter = 10;
}

message TPollInfoResponse {
  message TVote {
    uint64 Timestamp = 1;
    .NMessengerProtocol.TUserInfo UserInfo = 2;
