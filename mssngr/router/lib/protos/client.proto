syntax = "proto3";

package NMessengerProtocol;

option java_package = "ru.yandex.yandex360.mssngr.router.lib.protos.client";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/mssngr/router/lib/protos";

message TTyping {
  enum EType {
    TEXT = 0;
    IMAGE = 1;
    FILE = 2;
    STICKER = 3;
    VOICE = 4;
    VIDEO = 5;
  }

  string ChatId = 1;
  .NMessengerProtocol.TTyping.EType Type = 2;
}

message TTypingEnhanced {
  message TMeta {
    string Locale = 1;
    bytes Context = 2;
  }

  string ChatId = 1;
  string Text = 2;
  string ActionId = 3;
  .NMessengerProtocol.TTypingEnhanced.TMeta Meta = 4;
}

message TChatEventTypes {
  uint64 Types = 1;
  uint64 Version = 2;
}

message THeartbeat {
  enum EType {
    UNKNOWN = 0;
    BACKGROUND = 1;
    FOREGROUND = 2;
  }

  string ChatId = 1;
  uint64 OnlineUntil = 2;
  .NMessengerProtocol.THeartbeat.EType Type = 3;
}

message TSeenMarker {
  string ChatId = 1;
  uint64 Timestamp = 2;
  uint64 SeqNo = 3;
  uint64 Version = 4;
}

message TUnseenMarker {
  string ChatId = 1;
  uint64 SeqNo = 2;
  uint64 Version = 3;
  uint64 Timestamp = 4;
}

message TReadMarker {
  string ChatId = 1;
  repeated uint64 Timestamps = 2;
}

message TListenedMarker {
  string ChatId = 1;
  uint64 Timestamp = 2;
}

message TPin {
  string ChatId = 1;
  uint64 Timestamp = 2;
}

message TUnpin {
  string ChatId = 1;
  uint64 Timestamp = 2;
}

message TChatApproval {
  string ChatId = 1;
}

message TTimestampRange {
  uint64 Min = 1;
  uint64 Max = 2;
}

message TMessageIdRange {
  string ChatId = 1;
  .NMessengerProtocol.TTimestampRange Range = 2;
}

message TStateSync {
  bytes Data = 1;
  string ChatId = 2;
}

message TLogData {
  .NMessengerProtocol.EUserInterface UserInterface = 1;
  string RequestId = 2;
  string UserInterfaceElementId = 3;
  string YandexUid = 4;
  string Puid = 5;
  string ICookie = 6;
}

message TNotificationMeta {
  string OverrideUrl = 1;
  uint32 Appearance = 2;
}

message TFileInfo {
  uint64 Id = 1;
  string Name = 2;
  uint32 Size = 3;
  string Id2 = 4;
  string AssignedChatId = 5;
  .NMessengerProtocol.EFileSource Source = 6;
}

message TMessageRef {
  string ChatId = 1;
  uint64 Timestamp = 2;
  uint64 Version = 3;
}

message TPollResults {
  uint64 Version = 1;
  uint32 VotedCount = 2;
  repeated uint32 Answers = 3;
  repeated .NMessengerProtocol.TUserInfo RecentVoters = 4;
  bool Completed = 5;
}

message TPlain {
  message TCard {
    bytes Card = 1;
  }

  message TText {
    string MessageText = 1;
    .NMessengerProtocol.TPlain.TCard Card = 2;
  }

  message TImage {
    .NMessengerProtocol.TFileInfo FileInfo = 1;
    uint32 Width = 2;
    uint32 Height = 3;
    bool Animated = 4;
  }

  message TMiscFile {
    .NMessengerProtocol.TFileInfo FileInfo = 1;
  }

  message TSticker {
    string Id = 3;
    string SetId = 4;
  }

  message TGallery {
    message TItem {
      oneof Content {
        .NMessengerProtocol.TPlain.TImage Image = 1;
      }
    }

    string Text = 1;
    repeated .NMessengerProtocol.TPlain.TGallery.TItem Items = 2;
  }

  message TVoice {
    .NMessengerProtocol.TFileInfo FileInfo = 1;
    uint32 Duration = 2;
    string Text = 3;
    bool WasRecognized = 4;
    bytes Waveform = 5;
    bool DisableRecognition = 6;
  }

  message TPoll {
    string Title = 1;
    repeated string Answers = 2;
    bool IsAnonymous = 3;
    uint32 MaxChoices = 4;
    .NMessengerProtocol.TPollResults Results = 5;
    repeated uint32 MyChoices = 6;
  }

  message TNeverToBeSupported {
    bytes MysteriousCrap = 1;
  }

  string ChatId = 101;
  uint64 Timestamp = 102;
  repeated .NMessengerProtocol.TMessageRef ForwardedMessageRefs = 103;
  bytes CustomPayload = 105;
  repeated string MentionedUserIds = 106;
  string PayloadId = 107;
  bool UrlPreviewDisabled = 108;
  uint64 Version = 109;
  uint64 ParentTimestamp = 110;
  repeated string ModerationVerdicts = 111;
  repeated .NMessengerProtocol.EAttribute Attributes = 112;
  string NotificationText = 113;
  bool IsImportant = 114;
  bool DontIncrementUnreadCounter = 115;
  oneof Payload {
    .NMessengerProtocol.TPlain.TText Text = 1;
    .NMessengerProtocol.TPlain.TImage Image = 2;
    .NMessengerProtocol.TPlain.TMiscFile MiscFile = 3;
    .NMessengerProtocol.TPlain.TSticker Sticker = 4;
    .NMessengerProtocol.TPlain.TCard Card = 5;
    .NMessengerProtocol.TPlain.TNeverToBeSupported NeverToBeSupported = 6;
    .NMessengerProtocol.TPlain.TGallery Gallery = 7;
    .NMessengerProtocol.TPlain.TVoice Voice = 8;
    .NMessengerProtocol.TPlain.TPoll Poll = 9;
  }
}

message TSuggestButton {
  string Text = 1;
  bytes CallbackData = 2;
}

message TClientTransportId {
  string XivaSubscriptionId = 1;
}

message TSuggest {
  repeated .NMessengerProtocol.TSuggestButton Buttons = 1;
}

message TBotRequest {
  string ChatId = 1;
  bytes CustomPayload = 2;
  .NMessengerProtocol.TClientTransportId ClientTransportId = 3;
  string ActionId = 4;
  oneof Payload {
    .NMessengerProtocol.TSuggest Suggest = 100;
  }
}

message TReport {
  enum EReason {
    SPAM = 0;
    INAPPROPRIATE_CONTENT = 1;
  }

  .NMessengerProtocol.TReport.EReason Reason = 1;
  oneof Target {
    string ChatId = 100;
    string UserId = 101;
    .NMessengerProtocol.TMessageRef MessageRef = 102;
  }
}

message TNotification {
  message TText {
    string NotificationText = 1;
  }

  message TRouteSettings {
    message TSubscriptionFilter {
      string DeviceId = 1;
      string PackageName = 2;
    }

    bool DeliveryDisabled = 1;
    .NMessengerProtocol.TNotification.TRouteSettings.TSubscriptionFilter SubscriptionFilter = 2;
  }

  string ChatId = 101;
  string ToGuid = 102;
  string PayloadId = 103;
  .NMessengerProtocol.TNotification.TRouteSettings RouteSettings = 104;
  repeated string ToGuids = 105;
  oneof Payload {
    .NMessengerProtocol.TNotification.TText Text = 1;
  }
}

message TVote {
  string ChatId = 1;
  uint64 Timestamp = 2;
  repeated uint32 Choices = 3;
  .NMessengerProtocol.EVoteAction Action = 4;
  .NMessengerProtocol.TMessageRef ForwardedMessageRef = 5;
  .NMessengerProtocol.TPollResults Results = 6;
}

message TUserStatus {
  message TCustomStatus {
    string Emoji = 1;
    string Text = 2;
  }

  enum EAvailability {
    AVAILABILITY_DEFAULT = 0;
    AVAILABILITY_AWAY = 1;
    AVAILABILITY_BUSY = 2;
    AVAILABILITY_DND = 3;
  }

  enum ENotificationMode {
    NOTIFICATION_MODE_DEFAULT = 0;
    NOTIFICATION_MODE_DISABLED = 1;
  }

  .NMessengerProtocol.TUserStatus.EAvailability Availability = 1;
  .NMessengerProtocol.TUserStatus.ENotificationMode NotificationMode = 2;
  uint32 Duration = 3;
  optional .NMessengerProtocol.TUserStatus.TCustomStatus CustomStatus = 4;
}

message TUserStatusInfo {
  .NMessengerProtocol.TUserStatus UserStatus = 1;
  uint64 Timestamp = 2;
}

message TEventException {
  message TDetails {
    string Scope = 1;
    string Code = 2;
    string Text = 3;
  }

  string Type = 1;
  string Message = 2;
  .NMessengerProtocol.TEventException.TDetails Details = 3;
}

message TBanInfo {
  uint64 Public = 1;
  uint64 Private = 2;
  uint64 Group = 3;
  uint64 Channel = 4;
}

message TRobotInfo {
  bool IsSupport = 1;
  bool CannotBeBlocked = 2;
  bool IgnoreBans = 3;
  bool DisablePrivates = 4;
  bool CanSendNotifications = 5;
  bool SuggestsEnabled = 6;
}

message TOrganizationInfo {
  uint32 OrganizationId = 1;
  string OrganizationName = 2;
  .NMessengerProtocol.ERegistrationStatus RegistrationStatus = 3;
  bool IsPublic = 4;
  bool Disabled = 5;
  bool IsGuest = 6;
  uint64 Rights = 7;
}

message TUserInfo {
  string AvatarId = 1;
  string DisplayName = 2;
  string Guid = 3;
  string PhoneId = 4;
  uint64 Version = 5;
  uint64 Uid = 6;
  string Nickname = 7;
  .NMessengerProtocol.ERegistrationStatus RegistrationStatus = 8;
  string Phone = 9;
  string Gender = 10;
  bool IsRobot = 11;
  .NMessengerProtocol.TBanInfo BanInfo = 12;
  bool IsOnboarded = 13;
  bool IsDisplayRestricted = 14;
  .NMessengerProtocol.TRobotInfo RobotInfo = 15;
  bool IsConnect = 16;
  bool IsTeam = 17;
  repeated .NMessengerProtocol.TOrganizationInfo OrganizationInfos = 18;
  bool IsLegal = 19;
  bool NeedsMigrationOnboarding = 20;
}

message TChatCreatedInfo {
  .NMessengerProtocol.TChatInfo InitialInfo = 1;
}

message TChatInfo {
  string Name = 1;
  string Description = 2;
  string AvatarUrl = 3;
  bool IsPrivate = 4;
  repeated uint64 PinnedMessageTimestamps = 5;
  uint32 MemberCount = 6;
  uint64 Version = 7;
  string InviteHash = 8;
  bool IsPublic = 9;
  string Alias = 10;
  repeated uint32 OrganizationIds = 11;
  bool Federative = 12;
  bool HasGuests = 13;
}

message TPrivateChatInfo {
  repeated uint32 OrganizationIds = 1;
  uint64 Version = 2;
  bool Federative = 3;
  bool HasGuests = 4;
}

message TGroupInfo {
  uint32 OrganizationId = 1;
  uint32 GroupId = 2;
  string Name = 3;
  uint64 Version = 4;
}

message TDepartmentInfo {
  uint32 OrganizationId = 1;
  uint32 DepartmentId = 2;
  string Name = 3;
  uint64 Version = 4;
}

message TParticipantsChange {
  repeated .NMessengerProtocol.TUserInfo AddedUsers = 1;
  repeated .NMessengerProtocol.TUserInfo RemovedUsers = 2;
}

message TParticipantsChangeV2 {
  repeated .NMessengerProtocol.TUserInfo AddedUsers = 1;
  repeated .NMessengerProtocol.TUserInfo RemovedUsers = 2;
  repeated .NMessengerProtocol.TGroupInfo AddedGroups = 3;
  repeated .NMessengerProtocol.TGroupInfo RemovedGroups = 4;
  repeated .NMessengerProtocol.TDepartmentInfo AddedDepartments = 5;
  repeated .NMessengerProtocol.TDepartmentInfo RemovedDepartments = 6;
  repeated string GuestsGuids = 7;
}

message TGenericMessage {
  string MessageText = 1;
  string LocKey = 2;
}

message TMeetingStartedMessage {
  string MeetingId = 1;
  .NMessengerProtocol.ECallType CallType = 2;
}

message TMeetingEndedMessage {
  string MeetingId = 1;
  .NMessengerProtocol.ECallType CallType = 2;
}

message TPersonalMeetingEndedMessage {
  enum EMeetingEndedReason {
    DECLINED = 0;
    CANCELED = 1;
    USER_DISCONNECTED = 2;
    TIMEOUT = 3;
    EMPTY = 4;
    ABANDONED = 5;
  }

  string MeetingId = 1;
  .NMessengerProtocol.TPersonalMeetingEndedMessage.EMeetingEndedReason Reason = 2;
  uint32 DurationSeconds = 3;
  .NMessengerProtocol.ECallType CallType = 4;
}

message TSystemMessage {
  string ChatId = 1;
  string PayloadId = 2;
  bool IncrementUnreadCounter = 3;
  oneof Payload {
    .NMessengerProtocol.TChatCreatedInfo ChatCreatedInfo = 100;
    .NMessengerProtocol.TChatInfo ChatInfoDiff = 101;
    .NMessengerProtocol.TParticipantsChange ParticipantsChangedDiff = 102;
    .NMessengerProtocol.TUserAction UserAction = 103;
    .NMessengerProtocol.TCallInfo CallInfo = 104;
    .NMessengerProtocol.TGenericMessage GenericMessage = 105;
    .NMessengerProtocol.TParticipantsChangeV2 ParticipantsChangedDiffV2 = 106;
    .NMessengerProtocol.TMeetingStartedMessage MeetingStartedMessage = 107;
    .NMessengerProtocol.TMeetingEndedMessage MeetingEndedMessage = 108;
    .NMessengerProtocol.TPersonalMeetingEndedMessage PersonalMeetingEndedMessage = 109;
  }
}

message TReaction {
  string ChatId = 1;
  uint64 Timestamp = 2;
  uint32 Type = 3;
  bool Remove = 4;
  .NMessengerProtocol.EReactionAction Action = 5;
}

message THighlightedReaction {
  string ChatId = 1;
  uint64 Timestamp = 2;
  bool Remove = 3;
}

message TUserReaction {
  uint32 Type = 1;
  uint64 Timestamp = 2;
  .NMessengerProtocol.TUserInfo UserInfo = 3;
}

message TUpdateFields {
  string ChatId = 1;
  uint64 Timestamp = 2;
  .NMessengerProtocol.EBoolFlag ImportanceFlag = 3;
  .NMessengerProtocol.EBoolFlag UrlPreviewDisabledFlag = 4;
}

message TClearUserHistory {
  string ChatId = 1;
}

message TRemoveUserMessage {
  string ChatId = 1;
  uint64 Timestamp = 2;
}

message TMeetingInfo {
  string MeetingId = 1;
  string ChatId = 2;
  uint64 CreateTimestamp = 3;
  uint64 ParticipantsCount = 4;
  .NMessengerProtocol.EMeetingStatus Status = 5;
  uint64 Version = 6;
}

message TCallSettings {
  bool Camera = 1;
  bool Mic = 2;
  bool SkipConnectionScreen = 3;
}

message TOutgoingRingingEnded {
  string ToGuid = 1;
  .NMessengerProtocol.EEndRingingReason Reason = 2;
}

message TIncomingCall {
  .NMessengerProtocol.TMeetingInfo MeetingInfo = 1;
  .NMessengerProtocol.TCallSettings CallSettings = 2;
}

message TEndRinging {
  .NMessengerProtocol.EEndRingingReason Reason = 1;
  repeated .NMessengerProtocol.EMeetingSupportedFeature SupportedFeatures = 2;
}

message TRingingEnded {
}

message TNotifyRinging {
}

message TMeetingCallingMessage {
  message TRinging {
    string ToGuid = 1;
  }

  message TEndOutgoingRinging {
  }

  string RingingId = 2;
  oneof Body {
    .NMessengerProtocol.TIncomingCall IncomingCall = 3;
    .NMessengerProtocol.TEndRinging EndRinging = 4;
    .NMessengerProtocol.TRingingEnded RingingEnded = 5;
    .NMessengerProtocol.TNotifyRinging NotifyRinging = 6;
    .NMessengerProtocol.TMeetingCallingMessage.TRinging Ringing = 7;
    .NMessengerProtocol.TOutgoingRingingEnded OutgoingRingingEnded = 8;
    .NMessengerProtocol.TMeetingCallingMessage.TEndOutgoingRinging EndOutgoingRinging = 9;
  }
}

message TClientMessage {
  .NMessengerProtocol.TLogData LogData = 100;
  bool IsSilent = 101;
  .NMessengerProtocol.EMirrorNotificationDst MirrorNotificationDst = 102;
  .NMessengerProtocol.ENotificationBehaviour NotificationBehaviour = 103;
  oneof Body {
    .NMessengerProtocol.TTyping Typing = 1;
    .NMessengerProtocol.THeartbeat Heartbeat = 2;
    .NMessengerProtocol.TSeenMarker SeenMarker = 3;
    .NMessengerProtocol.TPlain Plain = 4;
    .NMessengerProtocol.TStateSync StateSync = 5;
    .NMessengerProtocol.TSystemMessage SystemMessage = 6;
    .NMessengerProtocol.TBotRequest BotRequest = 7;
    .NMessengerProtocol.TReport Report = 8;
    .NMessengerProtocol.TMessageIdRange ModeratedRange = 9;
    .NMessengerProtocol.TEventException EventException = 10;
    .NMessengerProtocol.TReaction Reaction = 11;
    .NMessengerProtocol.TCallingMessage CallingMessage = 12;
    .NMessengerProtocol.TPin Pin = 13;
    .NMessengerProtocol.TUnpin Unpin = 14;
    .NMessengerProtocol.TChatApproval ChatApproval = 15;
    .NMessengerProtocol.TReadMarker ReadMarker = 16;
    .NMessengerProtocol.TListenedMarker ListenedMarker = 17;
    .NMessengerProtocol.THighlightedReaction HighlightedReaction = 18;
    .NMessengerProtocol.TUpdateFields UpdateFields = 19;
    .NMessengerProtocol.TClearUserHistory ClearUserHistory = 20;
    .NMessengerProtocol.TNotification Notification = 21;
    .NMessengerProtocol.TVote Vote = 22;
    .NMessengerProtocol.TRemoveUserMessage RemoveUserMessage = 23;
    .NMessengerProtocol.TMeetingCallingMessage MeetingCallingMessage = 24;
    .NMessengerProtocol.TTranslationMessage TranslationMessage = 25;
    .NMessengerProtocol.TUserStatus UserStatus = 26;
    .NMessengerProtocol.TUnseenMarker UnseenMarker = 27;
    .NMessengerProtocol.TTypingEnhanced TypingEnhanced = 28;
  }
}

message TThreadState {
  uint64 LastSeqNo = 1;
  uint64 LastTsMcs = 2;
  uint64 LastSeenByMeSeqNo = 3;
  uint64 LastSeenByMeTsMcs = 4;
  repeated uint64 MentionTsMcs = 5;
  uint64 HistoryStartTsMcs = 6;
  uint64 LastSeenByMeVersion = 7;
}

message TTranslation {
  .NMessengerProtocol.ETranslationStatus Status = 1;
  string Text = 2;
  string LanguageCode = 3;
  string DetectedLanguageCode = 4;
  repeated string InlineButtonsText = 5;
}

message TServerMessage {
  message TServerMessageInfo {
    uint64 Timestamp = 1;
    uint64 PrevTimestamp = 2;
    uint64 SeqNo = 3;
    uint64 LastEditTimestamp = 4;
    uint64 Version = 5;
    .NMessengerProtocol.TUserInfo From = 6;
    repeated uint64 Path = 7;
    .NMessengerProtocol.EModerationAction ModerationAction = 8;
    uint64 HistoryVersion = 9;
    bool Deleted = 10;
    uint64 Views = 11;
    .NMessengerProtocol.TUserInfo CustomFrom = 12;
    bool WasListened = 13;
    uint64 ForwardCount = 14;
    uint64 HighlightedReactionCount = 15;
    bool Removed = 16;
    .NMessengerProtocol.TThreadState ThreadState = 17;
    repeated .NMessengerProtocol.TTranslation Translation = 18;
  }

  message TForwardedMessage {
    .NMessengerProtocol.TPlain Payload = 1;
    .NMessengerProtocol.TServerMessage.TServerMessageInfo ServerMessageInfo = 3;
    repeated .NMessengerProtocol.TUserInfo MentionedUsers = 4;
  }

  message TReactionInfo {
    uint32 Type = 1;
    uint32 Count = 2;
  }

  .NMessengerProtocol.TClientMessage ClientMessage = 1;
  .NMessengerProtocol.TServerMessage.TServerMessageInfo ServerMessageInfo = 2;
  repeated .NMessengerProtocol.TServerMessage.TForwardedMessage ForwardedMessages = 3;
  repeated .NMessengerProtocol.TUserInfo MentionedUsers = 4;
  repeated .NMessengerProtocol.TServerMessage.TReactionInfo Reactions = 5;
  uint64 ReactionsVersion = 6;
  .NMessengerProtocol.TNotificationMeta NotificationMeta = 7;
  repeated .NMessengerProtocol.TUserReaction RecentUserReactions = 8;
}

message TPushNotification {
  string Chat = 1;
  uint64 Ts = 2;
  .NMessengerProtocol.TServerMessage Message = 3;
  string To = 4;
  string ChatName = 5;
  bool ToAnonymous = 6;
  bool Approved = 7;
}

message TCallingMessage {
  message TTransportMessage {
    bytes Payload = 1;
  }

  message TMakeCall {
    bytes DeviceInfo = 1;
    .NMessengerProtocol.ECallType CallType = 2;
  }

  message TAcceptCall {
    bytes DeviceInfo = 1;
  }

  message TCallAccepted {
    string AcceptedDeviceId = 1;
  }

  message TCallDeclined {
  }

  message TEndCall {
  }

  message TIncomingCall {
    .NMessengerProtocol.ECallType CallType = 1;
    bool Retry = 2;
    string Payload = 3;
  }

  message TCallEnded {
  }

  message TDeclineCall {
  }

  message TNotifyRinging {
  }

  message TRinging {
  }

  message TRedirectCall {
    string ChatId = 1;
    string SenderUserId = 2;
    repeated string Participants = 3;
    bytes CallParams = 4;
  }

  string ChatId = 1;
  string CallGuid = 2;
  uint64 SeqNo = 3;
  string DeviceId = 4;
  string PayloadId = 5;
  string ReceiverDeviceId = 6;
  oneof Body {
    .NMessengerProtocol.TCallingMessage.TTransportMessage TransportMessage = 100;
    .NMessengerProtocol.TCallingMessage.TMakeCall MakeCall = 101;
    .NMessengerProtocol.TCallingMessage.TAcceptCall AcceptCall = 102;
    .NMessengerProtocol.TCallingMessage.TCallAccepted CallAccepted = 103;
    .NMessengerProtocol.TCallingMessage.TCallDeclined CallDeclined = 104;
    .NMessengerProtocol.TCallingMessage.TEndCall EndCall = 105;
    .NMessengerProtocol.TCallingMessage.TIncomingCall IncomingCall = 106;
    .NMessengerProtocol.TCallingMessage.TCallEnded CallEnded = 107;
    .NMessengerProtocol.TCallingMessage.TDeclineCall DeclineCall = 110;
    .NMessengerProtocol.TCallingMessage.TNotifyRinging NotifyRinging = 111;
    .NMessengerProtocol.TCallingMessage.TRinging Ringing = 112;
    .NMessengerProtocol.TCallingMessage.TRedirectCall RedirectCall = 113;
  }
}

message TCallInfo {
  string CallGuid = 1;
  .NMessengerProtocol.ECallStatus Status = 2;
  uint32 Duration = 3;
}

message TLastSeenInfo {
  .NMessengerProtocol.TUserInfo User = 1;
  uint64 Timestamp = 2;
}

message TTranslationMessage {
  message TTranslationWithRef {
    string ChatId = 1;
    uint64 Timestamp = 2;
    uint64 Version = 3;
    .NMessengerProtocol.TTranslation Translation = 4;
  }

  .NMessengerProtocol.TTranslationMessage.TTranslationWithRef TranslationWithRef = 1;
  repeated .NMessengerProtocol.TTranslationMessage.TTranslationWithRef ForwardedTranslations = 2;
}

enum EChatEventTypeFlag {
  CHAT_EVENT_TYPE_UNKNOWN = 0;
  CHAT_EVENT_TYPE_OPEN = 1;
  CHAT_EVENT_TYPE_SYNC = 2;
  CHAT_EVENT_TYPE_FOCUS = 4;
  CHAT_EVENT_TYPE_INLINE_SUGGEST = 8;
}

enum EUserInterface {
  NONE = 0;
  DESKTOP = 1;
  PAD = 2;
  TOUCH = 3;
  TV = 4;
}

enum EFileSource {
  MDS = 0;
  DISK = 1;
}

enum EModerationAction {
  UNDEFINED = 0;
  HIDE = 1;
  DELETE = 2;
  KEEP = 3;
}

enum EAttribute {
  FROM_AUTHOR = 0;
  FROM_EXPERT = 1;
  FROM_STAFF = 2;
  REMOVED_BY_ENTITY_MODERATOR = 3;
  FAST_REPLY = 4;
  FROM_ORGANIZATION = 5;
  FROM_NAMED_STAFF = 6;
}

enum EVoteAction {
  VOTE_SET = 0;
  VOTE_REMOVE = 1;
}

enum ERegistrationStatus {
  REGISTRATION_STATUS_L = 0;
  REGISTRATION_STATUS_Lu = 1;
  REGISTRATION_STATUS_U = 2;
}

enum TUserAction {
  LEAVE = 0;
  ENTER = 1;
  ENTER_BY_LINK = 2;
}

enum EReactionAction {
  ADD = 0;
  REMOVE = 1;
  REPLACE = 2;
}

enum EBoolFlag {
  BOOL_UNKNOWN = 0;
  BOOL_SET = 1;
  BOOL_UNSET = 2;
}

enum EMeetingStatus {
  CREATED = 0;
  ACTIVE = 1;
  ENDED = 2;
}

enum EEndRingingReason {
  ACCEPTED = 0;
  DECLINED = 1;
  ALREADY_ON_THIS_MEETING = 2;
  TIMEOUT = 3;
  BUSY = 4;
  NO_RINGING_RESPONSE = 5;
  CANCELED_BY_CALLER = 6;
}

enum EMeetingSupportedFeature {
  END_ACTION = 0;
}

enum EMirrorNotificationDst {
  MIRROR_NONE = 0;
  MIRROR_MOBILE = 1;
  MIRROR_WEB = 2;
}

enum ENotificationBehaviour {
  DEFAULT = 0;
  SILENT = 1;
  IGNORE_MUTES = 2;
}

enum ETranslationStatus {
  PENDING = 0;
  DONE = 1;
}

enum ECallType {
  CALL_TYPE_VIDEO = 0;
  CALL_TYPE_AUDIO = 1;
}

enum ECallStatus {
  CALL_STATUS_NONE = 0;
  CALL_STATUS_SUCCESS = 1;
  CALL_STATUS_MISSED = 2;
  CALL_STATUS_DECLINED = 3;
  CALL_STATUS_FAILED = 4;
  CALL_STATUS_CANCELED = 5;
}

