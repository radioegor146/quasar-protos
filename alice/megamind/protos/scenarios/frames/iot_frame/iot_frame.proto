syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.megamind.protos.scenarios.frames.iot_frame";
option java_outer_classname = "FrameIot";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/megamind/protos/scenarios/frames/iot_frame;iotframe";

import "alice/megamind/protos/scenarios/frames/common/common.proto";
import "alice/protos/endpoint/capabilities/iot_discovery/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotNetworksSlot {
  oneof Value {
    .NAlice.TIotDiscoveryCapability.TNetworks NetworksValue = 1;
  }
}

message TRestoreIotNetworksTypeSlot {
  enum EValue {
    RestoreZigbeeNetworks = 0;
    SyncEndpoints = 1;
    RestoreMatterNetworks = 2;
    RestoreThreadNetworks = 3;
  }

  oneof Value {
    .NAlice.TRestoreIotNetworksTypeSlot.EValue RestoreTypeValue = 1;
  }
}

message TRestoreIotNetworksSemanticFrame {
  repeated .NAlice.TRestoreIotNetworksTypeSlot RestoreIotNetworkTypes = 1;
}

message TSaveIotNetworksSemanticFrame {
  .NAlice.TIotNetworksSlot Networks = 1;
}

message TIoTDiscoveryStartSemanticFrame {
  .NAlice.TStringSlot SSID = 1;
  .NAlice.TStringSlot Password = 2;
  .NAlice.TStringSlot DeviceType = 3;
  .NAlice.TUInt32Slot TimeoutMs = 4;
}

message TIoTDiscoveryFailureSemanticFrame {
  .NAlice.TUInt32Slot TimeoutMs = 1;
  .NAlice.TStringSlot Reason = 2;
  .NAlice.TStringSlot DeviceType = 3;
}

message TStartIotTuyaBroadcastSemanticFrame {
  .NAlice.TStringSlot SSID = 1;
  .NAlice.TStringSlot Password = 2;
}

