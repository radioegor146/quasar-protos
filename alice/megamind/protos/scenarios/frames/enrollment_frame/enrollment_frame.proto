syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.megamind.protos.scenarios.frames.enrollment_frame";
option java_outer_classname = "FrameEnrollment";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/megamind/protos/scenarios/frames/enrollment_frame;enrollmentframe";

import "alice/library/censor/protos/extension.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "alice/megamind/protos/scenarios/frames/common/common.proto";
import "alice/protos/data/scenario/iot/enrollment_status.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TEnrollmentStatusTypeSlot {
  oneof Value {
    .NAlice.NData.NIoT.TEnrollmentStatus EnrollmentStatus = 1;
  }
}

message TEnrollmentStatusSemanticFrame {
  .NAlice.TStringSlot Puid = 1;
  .NAlice.TEnrollmentStatusTypeSlot Status = 2;
  .NAlice.TStringSlot ActiveEnrollmentPersId = 3;
}

message TSelectEnrollmentTypeSemanticFrame {
  .NAlice.TStringSlot EncryptedCode = 1;
  .NAlice.TStringSlot Signature = 2;
  .NAlice.TStringSlot EncryptedSessionKey = 3;
  .NAlice.TStringSlot Puid = 4;
  .NAlice.TTokenTypeSlot TokenType = 5;
  .NAlice.TStringSlot UserType = 6;
}

message TCancelEnrollmentSemanticFrame {
}

message TVoiceprintEnrollmentDoneSemanticFrame {
}

message TGuestEnrollmentStartSemanticFrame {
  .NAlice.TStringSlot Puid = 1;
}

message TGuestEnrollmentFinishSemanticFrame {
}

