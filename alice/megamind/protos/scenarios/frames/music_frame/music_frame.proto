syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.megamind.protos.scenarios.frames.music_frame";
option java_outer_classname = "FrameMusic";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/megamind/protos/scenarios/frames/music_frame;musicframe";

import "alice/megamind/protos/scenarios/frames/common/common.proto";
import "alice/protos/data/scenario/music/show_config.proto";
import "alice/protos/data/scenario/music/show_type.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TMusicSlot {
  reserved 56788;
  oneof Value {
    string GenreValue = 1;
    string MoodValue = 2;
    string ActivityValue = 3;
    string VocalValue = 4;
    string NoveltyValue = 5;
    string PersonalityValue = 6;
    string OrderValue = 7;
    string RepeatValue = 8;
    string RoomValue = 9;
    string StreamValue = 10;
    string GenerativeStationValue = 11;
    string NeedSimilarValue = 12;
    string OffsetValue = 13;
    string ProviderValue = 14;
  }
}

message TMusicPlayObjectTypeSlot {
  enum EValue {
    Track = 0;
    Album = 1;
    Artist = 2;
    Playlist = 3;
    Radio = 4;
    Generative = 5;
    FmRadio = 6;
    ShowTail = 7;
  }

  oneof Value {
    .NAlice.TMusicPlayObjectTypeSlot.EValue EnumValue = 1;
  }
}

message TMusicContentTypeSlot {
  enum EValue {
    Unknown = 0;
    Podcast = 1;
    Audiobook = 2;
    FairyTale = 3;
  }

  oneof Value {
    .NAlice.TMusicContentTypeSlot.EValue EnumValue = 1;
  }
}

message TAmbientSoundSlot {
  oneof Value {
    string AmbientSoundValue = 1;
  }
}

message TAliceShowConfigSlot {
  oneof Value {
    .NAlice.NData.NMusic.TAliceShowConfig ShowConfigValue = 1;
  }
}

message TAliceShowTypeSlot {
  oneof Value {
    .NAlice.NData.NMusic.TAliceShowType ShowTypeValue = 1;
  }
}

message TMusicPlaybackSourceSlot {
  enum EValue {
    Unknown = 0;
    AliceShow = 1;
    Meditation = 2;
    SpecialAlicePlaylist = 3;
  }

  oneof Value {
    .NAlice.TMusicPlaybackSourceSlot.EValue EnumValue = 1;
  }
}

message TFiltrationModeSlot {
  enum EValue {
    Unknown = 0;
    NoFilter = 1;
    Moderate = 2;
    FamilySearch = 3;
    Safe = 4;
  }

  oneof Value {
    .NAlice.TFiltrationModeSlot.EValue EnumValue = 1;
  }
}

message TMusicPlaySemanticFrame {
  reserved "ShowPodcast";
  reserved 2;
  .NAlice.TStringSlot SpecialPlaylist = 1;
  .NAlice.TStringSlot SpecialAnswerInfo = 3;
  .NAlice.TStringSlot ActionRequest = 4;
  .NAlice.TStringSlot Epoch = 5;
  .NAlice.TStringSlot SearchText = 6;
  .NAlice.TMusicSlot Genre = 7;
  .NAlice.TMusicSlot Mood = 8;
  .NAlice.TMusicSlot Activity = 9;
  .NAlice.TLanguageSlot Language = 10;
  .NAlice.TMusicSlot Vocal = 11;
  .NAlice.TMusicSlot Novelty = 12;
  .NAlice.TMusicSlot Personality = 13;
  .NAlice.TMusicSlot Order = 14;
  .NAlice.TMusicSlot Repeat = 15;
  .NAlice.TBoolSlot DisableAutoflow = 16;
  .NAlice.TBoolSlot DisableNlg = 17;
  .NAlice.TBoolSlot PlaySingleTrack = 18;
  .NAlice.TNumSlot TrackOffsetIndex = 19;
  .NAlice.TStringSlot Playlist = 20;
  .NAlice.TStringSlot ObjectId = 21;
  .NAlice.TMusicPlayObjectTypeSlot ObjectType = 22;
  .NAlice.TStringSlot StartFromTrackId = 23;
  .NAlice.TDoubleSlot OffsetSec = 24;
  .NAlice.TStringSlot AlarmId = 25;
  .NAlice.TStringSlot From = 26;
  .NAlice.TBoolSlot DisableHistory = 27;
  .NAlice.TMusicSlot Room = 28;
  .NAlice.TMusicSlot Stream = 29;
  .NAlice.TMusicSlot GenerativeStation = 30;
  .NAlice.TMusicSlot NeedSimilar = 31;
  .NAlice.TLocationSlot Location = 32;
  .NAlice.TMusicSlot Offset = 33;
  .NAlice.TBoolSlot DisableMultiroom = 34;
  .NAlice.TMusicContentTypeSlot ContentType = 35;
  .NAlice.TAmbientSoundSlot AmbientSound = 36;
  .NAlice.TAliceShowConfigSlot ShowTailConfig = 37;
  .NAlice.TAliceShowTypeSlot ShowType = 38;
  .NAlice.TMusicPlaybackSourceSlot PlaybackSource = 39;
  .NAlice.TMusicSlot Provider = 40;
  repeated .NAlice.TLocationSlot LocationGroup = 41;
  .NAlice.TInt64Slot SessionStartTimestamp = 42;
  .NAlice.TBoolSlot DisableAutoflowSoft = 43;
  .NAlice.TBoolSlot Karaoke = 44;
  .NAlice.TFiltrationModeSlot FiltrationMode = 45;
}

message TGetEqualizerSettingsSemanticFrame {
}

message TTurnOnBookmateSemanticFrame {
}

