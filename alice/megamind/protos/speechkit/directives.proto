syntax = "proto3";

package NAlice.NSpeechKit;

option go_package = "a.yandex-team.ru/alice/megamind/protos/speechkit";

import "alice/library/censor/protos/extension.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "alice/megamind/protos/common/directive_importance.proto";
import "alice/protos/api/source/source.proto";
import "alice/protos/uniproxy/directives/datum.proto";
import "alice/protos/uniproxy/directives/prepare_cache_tts_response.proto";
import "yt/yt_proto/yt/formats/extension.proto";
import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

message TUniproxyDirectiveMeta {
  string Puid = 1;
  .EDirectiveImportance DirectiveImportance = 2;
  string HashPuid = 3;
}

message TDirective {
  reserved 56788;
  message TOnFinishEvent {
    oneof Event {
      .google.protobuf.Struct TypedCallbackRequest = 1;
    }
  }

  string Type = 1;
  string Name = 2;
  string AnalyticsType = 3;
  bool IgnoreAnswer = 4;
  repeated string RoomDeviceIds = 7;
  bool IsLedSilent = 8;
  .google.protobuf.StringValue EndpointId = 9;
  .NAlice.NSpeechKit.TUniproxyDirectiveMeta UniproxyDirectiveMeta = 10;
  bool IsParallel = 11;
  uint32 TimeBeforeDropMs = 12;
  .NAlice.NSpeechKit.TDirective.TOnFinishEvent OnFinish = 14;
  .NAlice.NAliceApi.TSourceInfo SourceInfo = 17;
  bool AttachToMultiroom = 18;
  oneof PayloadType {
    .google.protobuf.Struct Payload = 5;
    bytes PayloadRaw = 15;
  }
  oneof OptionalMultiroomSessionId {
    string MultiroomSessionId = 6;
  }
  oneof OptionalPersId {
    string PersId = 13;
  }
  optional string Id = 16;
}

message TProtobufUniproxyDirective {
  message TContextSaveDirective {
    string DirectiveId = 1;
    .google.protobuf.Any Payload = 2;
  }

  message TNonTransparentContextSaveDirective {
    oneof Directive {
      .NAlice.NUniproxyDirectives.TUpdateDatumAddressContextSaveDirective UpdateDatumAddress = 1;
      .NAlice.NUniproxyDirectives.TPrepareCacheTtsResponseContextSaveDirective PrepareCacheTtsResponse = 2;
    }
  }

  .NAlice.NSpeechKit.TUniproxyDirectiveMeta UniproxyDirectiveMeta = 2;
  oneof Directives {
    .NAlice.NSpeechKit.TProtobufUniproxyDirective.TContextSaveDirective ContextSaveDirective = 1;
    .NAlice.NSpeechKit.TProtobufUniproxyDirective.TNonTransparentContextSaveDirective NonTransparentContextSaveDirective = 3;
  }
}

