syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.megamind.protos.blackbox";
option java_outer_classname = "BlackboxUserInfo";
option go_package = "a.yandex-team.ru/alice/megamind/protos/blackbox";

import "alice/library/censor/protos/extension.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TBlackBoxUserInfo {
  message TKpSubscriptions {
    bool HasBasicKinopoisk = 1;
    bool HasAmediateka = 2;
    bool HasSuperPlus = 3;
    bool HasKpStart = 4;
    bool HasMatchPremier = 5;
    bool HasMatchFootball = 6;
  }

  string Uid = 1;
  string Email = 2;
  string FirstName = 3;
  string LastName = 4;
  string Phone = 5;
  bool HasYandexPlus = 6;
  bool IsStaff = 7;
  bool IsBetaTester = 8;
  bool HasMusicSubscription = 9;
  uint64 MusicSubscriptionRegionId = 12;
  bool HasBookmate = 13;
  bool IsChildAccount = 14;
  bool HasAlicePro = 17;
  repeated string OAuthTokenScopes = 20;
  .NAlice.TBlackBoxUserInfo.TKpSubscriptions KpSubscriptions = 21;
  bool HavePassword = 22;
  bool IsFederal = 24;
  optional string MusicRestriction = 15;
  optional string VideoRestriction = 16;
  optional string StaffLogin = 18;
  optional string UserTicket = 19;
  optional string AccountType = 23;
}

enum ECredentialStatus {
  CRED_STATUS_VALID = 0;
  CRED_STATUS_NEED_RESET = 1;
  CRED_STATUS_EXPIRED = 2;
  CRED_STATUS_NOAUTH = 3;
  CRED_STATUS_DISABLED = 4;
  CRED_STATUS_INVALID = 5;
  CRED_STATUS_NEOLITE = 6;
  CRED_STATUS_BORIGIN_MISMATCH = 7;
  CRED_STATUS_WRONG_GUARD = 8;
  CRED_STATUS_NEOLITE_SESSION = 9;
  CRED_STATUS_BORIGIN_MISMATCH_SESSION = 10;
  CRED_STATUS_UNKNOWN = 255;
}

