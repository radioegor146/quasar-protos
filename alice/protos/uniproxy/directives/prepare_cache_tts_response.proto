syntax = "proto3";

package NAlice.NUniproxyDirectives;

option java_package = "ru.yandex.alice.protos.uniproxy.directives";
option go_package = "a.yandex-team.ru/alice/protos/uniproxy/directives";

import "yt/yt_proto/yt/formats/extension.proto";
import "alice/protos/data/language/language.proto";

message TTtsLanguageInfo {
  optional .NAlice.ELang MainRequestLanguage = 1;
  optional .NAlice.ELang EffectiveLanguage = 2;
}

message TPrepareCacheTtsResponseContextSaveDirective {
  message TRequest {
    uint64 Ttl = 2;
    optional string Text = 1;
  }

  .NAlice.NUniproxyDirectives.TPrepareCacheTtsResponseContextSaveDirective.TRequest PrepareCacheTtsResponseDirective = 1;
  optional .NAlice.NUniproxyDirectives.TTtsLanguageInfo TtsLanguageInfo = 2;
}

