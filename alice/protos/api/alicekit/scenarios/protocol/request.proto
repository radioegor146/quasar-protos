message TScenarioBaseRequest {
  reserved "DialogId";
  reserved "ServerTimeMs";
  reserved "Location";
  reserved "Interfaces";
  reserved "State";
  reserved "Options";
  reserved "IsNewSession";
  reserved "UserPreferences";
  reserved "IsSessionReset";
  reserved "UserLanguage";
  reserved "UserClassification";
  reserved "Memento";
  reserved "RequestSource";
  reserved "IsStackOwner";
  reserved "Origin";
  reserved "NluFeatures";
  reserved "StackParams";
  reserved "DialogType";
  reserved "Localization";
  reserved 2;
  reserved 3;
  reserved 6;
  reserved 7;
  reserved 9;
  reserved 11;
  reserved 12;
  reserved 13;
  reserved 14;
  reserved 15;
  reserved 16;
  reserved 17;
  reserved 18;
  reserved 19;
  reserved 20;
  reserved 21;
  reserved 22;
  reserved 23;
  reserved 24;
  string RequestId = 1;
  uint64 RandomSeed = 4;
  .NAlice.TClientInfoProto ClientInfo = 5;
  .NAlice.NAliceApi.TDeviceState DeviceState = 8;
  .google.protobuf.Struct Experiments = 10;
}

message TScenarioRunRequest {
  reserved 3;
  message DataSourcesEntry {
    int32 key = 1;
    .NAlice.NAliceApi.TDataSource value = 2;
  }

  .NAlice.NAliceApi.TScenarioBaseRequest BaseRequest = 1;
  .NAlice.NAliceApi.TInput Input = 2;
  repeated .NAlice.NAliceApi.TScenarioRunRequest.DataSourcesEntry DataSources = 4;
}

message TScenarioApplyRequest {
  reserved 4;
  message DataSourcesEntry {
    int32 key = 1;
    .NAlice.NAliceApi.TDataSource value = 2;
  }

  .NAlice.NAliceApi.TScenarioBaseRequest BaseRequest = 1;
  .google.protobuf.Any Arguments = 2;
  .NAlice.NAliceApi.TInput Input = 3;
  repeated .NAlice.NAliceApi.TScenarioApplyRequest.DataSourcesEntry DataSources = 5;
}

message TExactCapability {
  .google.protobuf.Any Capability = 1;
}

message TExactTypedSemanticFrame {
  .google.protobuf.Any SemanticFrame = 1;
}

message TLocalScenarioRunRequest {
  .NAlice.NAliceApi.TScenarioRunRequest ScenarioRunRequest = 1;
  repeated .NAlice.NAliceApi.TExactCapability Capabilities = 2;
  repeated .NAlice.NAliceApi.TExactTypedSemanticFrame SemanticFrames = 3;
  bool IsPureLocal = 4;
}

message TLocalScenarioApplyRequest {
  .NAlice.NAliceApi.TScenarioApplyRequest ScenarioApplyRequest = 1;
  repeated .NAlice.NAliceApi.TExactCapability Capabilities = 2;
  repeated .NAlice.NAliceApi.TExactTypedSemanticFrame SemanticFrames = 3;
}

