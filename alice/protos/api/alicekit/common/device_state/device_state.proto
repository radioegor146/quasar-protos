    message TCurrentlyPlaying {
      reserved "RawItemDeprecated";
      reserved "RawNextItemDeprecated";
      reserved 5;
      reserved 6;
      reserved 7;
      reserved 3;
      reserved 4;
      message TProgress {
        optional double Played = 1;
