import "yt/yt_proto/yt/formats/extension.proto";

message TUntypedDirective {
  optional string Name = 1;
  optional string Type = 2;
  optional string AnalyticsType = 3;
  optional bool IgnoreAnswer = 4;
  optional .google.protobuf.Struct Payload = 5;
}

message TNavigator {
  message TPoint {
    optional float Lat = 1;
    optional float Lon = 2;
  }

  message TFavorite {
    optional string Name = 1;
    optional float Lat = 2;
    optional float Lon = 3;
    repeated .NAlice.NAliceApi.TNavigator.TPoint ArrivalPoints = 4;
  }

  message TLocation {
    optional float Lat = 1;
    optional float Lon = 2;
    repeated .NAlice.NAliceApi.TNavigator.TPoint ArrivalPoints = 3;
  }

  message TMapView {
    optional float BottomRightLon = 1;
    optional float TopRightLon = 2;
    optional float TopLeftLon = 3;
    optional float BottomLeftLon = 4;
    optional float TopLeftLat = 5;
    optional float BottomLeftLat = 6;
    optional float BottomRightLat = 7;
    optional float TopRightLat = 8;
  }

  message TRoute {
    repeated .NAlice.NAliceApi.TNavigator.TPoint Points = 1;
    optional float DistanceToDestination = 2;
    optional int64 RawTimeToDestination = 3;
    optional int64 ArrivalTimestamp = 4;
    optional int64 TimeToDestination = 5;
    optional int64 TimeInTrafficJam = 6;
    optional float DistanceInTrafficJam = 7;
  }

  message TSpan {
    optional .NAlice.NAliceApi.TNavigator.TPoint SouthWest = 1;
    optional .NAlice.NAliceApi.TNavigator.TPoint NorthEast = 2;
  }

  message TSearchOptions {
    optional .NAlice.NAliceApi.TNavigator.TSpan Span = 1;
  }

  repeated .NAlice.NAliceApi.TNavigator.TFavorite UserFavorites = 1;
  optional .NAlice.NAliceApi.TNavigator.TLocation HomeLocation = 2;
  optional .NAlice.NAliceApi.TNavigator.TLocation WorkLocation = 3;
  optional .NAlice.NAliceApi.TNavigator.TMapView MapView = 4;
  repeated string AvailableVoiceIds = 5;
  optional bool ProjectedMode = 6;
  optional .NAlice.NAliceApi.TNavigator.TRoute CurrentRoute = 7;
  repeated string States = 8;
  optional .NAlice.NAliceApi.TNavigator.TSearchOptions SearchOptions = 9;
}

