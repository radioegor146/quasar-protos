    optional .NAlice.NAliceApi.TDeviceState.TAudioPlayer.TPlayerState PlayerState = 1;
    optional int32 OffsetMs = 2;
    optional .NAlice.NAliceApi.TDeviceState.TAudioPlayer.TCurrentlyPlaying CurrentlyPlaying = 3;
    repeated .NAlice.NAliceApi.TDeviceState.TAudioPlayer.ScenarioMetaEntry ScenarioMeta = 4;
    optional double LastPlayTimestamp = 5;
    optional int32 DurationMs = 6;
    optional double LastStopTimestamp = 7;
    optional int32 PlayedMs = 8;
  }

  message TMusic {
    message TCurrentlyPlaying {
      optional string TrackId = 1;
      optional .google.protobuf.Struct RawTrackInfo = 2;
      optional double LastPlayTimestamp = 3;
