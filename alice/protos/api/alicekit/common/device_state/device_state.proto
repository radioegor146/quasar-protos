    optional .NAlice.NAliceApi.TDeviceState.TMusic.TCurrentlyPlaying CurrentlyPlaying = 1;
    optional string Uid = 2;
    optional string PlaylistOwner = 3;
    optional .NAlice.NAliceApi.TDeviceState.TMusic.TPlayer Player = 4;
    optional uint32 SoundLevel = 5;
    optional bool SoundMuted = 6;
    optional string SessionId = 7;
    optional double LastPlayTimestamp = 8;
    optional double LastStopTimestamp = 9;
