    enum EPlayerCapability {
      nothing = 0;
      stop = 1;
      pause = 2;
      play = 3;
      rewind = 4;
      skip_to_previous = 5;
      skip_to_next = 6;
      fast_forward = 7;
      seek_to = 8;
      play_pause = 9;
