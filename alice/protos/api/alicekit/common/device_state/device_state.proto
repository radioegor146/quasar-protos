syntax = "proto2";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.common.device_state";
option java_outer_classname = "DeviceStateProto";
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/common/device_state;devicestatepb";

import "google/protobuf/struct.proto";
import "alice/library/censor/protos/extension.proto";
import "alice/library/restriction_level/protos/content_settings.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "alice/megamind/protos/common/subscription_state/subscription_state.proto";
import "alice/megamind/protos/common/tandem_state/tandem_state.proto";
import "alice/protos/data/external_entity_description.proto";
import "alice/protos/data/search_result/search_result.proto";
import "alice/protos/data/scenario/reminders/device_state.proto";
