syntax = "proto3";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.events.push";
option java_outer_classname = "Push";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/events/push";

import "alice/protos/api/alicekit/directives/directive.proto";
import "alice/protos/api/matrix/common/analytics_meta_info.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TPush {
  repeated string PushIds = 1;
  repeated .NAlice.NAliceApi.TDirective Directives = 3;
  .NMatrix.NApi.TAnalyticsMetaInfo AnalyticsMetaInfo = 4;
  optional string DeduplicationPushId = 2;
}

