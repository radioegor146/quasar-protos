syntax = "proto3";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.events.ping";
option java_outer_classname = "Ping";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/events/ping";

import "yt/yt_proto/yt/formats/extension.proto";

message TPing {
  uint32 Timestamp = 1;
  uint32 PingTimeoutMilliSeconds = 2;
  uint32 PongTimeoutMilliSeconds = 3;
}

