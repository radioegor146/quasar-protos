syntax = "proto3";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.events.invalid_auth.credential_status";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/events/invalid_auth/credential_status";

enum ECredentialStatus {
  VALID = 0;
  NEED_RESET = 1;
  EXPIRED = 2;
  NOAUTH = 3;
  DISABLED = 4;
  INVALID = 5;
  NEOLITE = 6;
  BORIGIN_MISMATCH = 7;
  WRONG_GUARD = 8;
  NEOLITE_SESSION = 9;
  BORIGIN_MISMATCH_SESSION = 10;
  UNKNOWN = 255;
}

