syntax = "proto3";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.events.data_proxy_request";
option java_outer_classname = "DataProxyRequest";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/events/data_proxy_request";

import "yt/yt_proto/yt/formats/extension.proto";

message TDataProxyRequest {
  message TGetRequest {
    optional string Namespace = 1;
    optional string Key = 2;
  }

  oneof Request {
    .NAlice.NAliceApi.TDataProxyRequest.TGetRequest RequestGet = 2;
  }
  optional string InteractionId = 1;
}

