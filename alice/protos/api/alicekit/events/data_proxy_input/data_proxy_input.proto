syntax = "proto3";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.events.data_proxy_input";
option java_outer_classname = "DataProxyInput";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/events/data_proxy_input";

import "alice/protos/api/alicekit/events/common/data_proxy/data_proxy_response.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TDataProxyInput {
  oneof Response {
    .NAlice.NAliceApi.TDataProxyResponse DataProxyResponse = 2;
  }
  optional string InteractionId = 1;
}

