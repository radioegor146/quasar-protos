syntax = "proto3";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.events.request_stat";
option java_outer_classname = "RequestStat";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/events/request_stat";

import "yt/yt_proto/yt/formats/extension.proto";

message TRequestStat {
  message TTimestamps {
    optional string OnSoundPlayerEndTime = 1;
    optional string OnVinsResponseTime = 2;
    optional string OnInterruptionPhraseSpottedTime = 3;
    optional string OnFirstSynthesisChunkTime = 4;
    optional string OnRecognitionBeginTime = 5;
    optional string OnRecognitionEndTime = 6;
    optional string RequestDurationTime = 7;
    optional string SpotterConfirmationTime = 8;
    optional string OnPhraseSpottedTime = 9;
    optional string PrevSoundPlayerEndTime = 10;
    optional string OnStartVoiceInputTime = 11;
    optional string OnStartVinsRequestTime = 12;
    optional string OnFirstSocketActivityTime = 13;
    optional string OnLastSynthesisChunkTime = 14;
    optional string StartPlayer = 15;
    optional string OnPlayerBegin = 16;
    optional string OnPlayerEnd = 17;
    optional string OnSoundPlayerBeginTime = 18;
    optional string OnFirstMessageMergedTime = 19;
    optional string OnFirstNonEmptyPartialTime = 20;
    optional string OnLastCompletedPartialTime = 21;
  }

  .NAlice.NAliceApi.TRequestStat.TTimestamps Timestamps = 1;
  string RequestMessageId = 2;
  optional string Error = 3;
}

