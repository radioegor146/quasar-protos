syntax = "proto3";

package NAlice.NAliceApi;

option java_package = "ru.yandex.alice.protos.api.alicekit.events.server_subscription_state";
option java_outer_classname = "ServerSubscriptionStateProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/api/alicekit/events/server_subscription_state";

import "yt/yt_proto/yt/formats/extension.proto";

message TServerSubscriptionState {
  message TSubscription {
    message TState {
      message TActive {
      }

      message TReady {
      }

      oneof State {
        .NAlice.NAliceApi.TServerSubscriptionState.TSubscription.TState.TActive Active = 1;
        .NAlice.NAliceApi.TServerSubscriptionState.TSubscription.TState.TReady Ready = 2;
      }
    }

    string Id = 1;
    .NAlice.NAliceApi.TServerSubscriptionState.TSubscription.TState State = 2;
  }

  repeated .NAlice.NAliceApi.TServerSubscriptionState.TSubscription Subscriptions = 1;
}

