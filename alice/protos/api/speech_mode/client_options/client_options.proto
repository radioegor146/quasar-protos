syntax = "proto3";

package NAlice;

option go_package = "a.yandex-team.ru/alice/protos/api/speech_mode/client_options";

import "yt/yt_proto/yt/formats/extension.proto";

message TSpeechModeClientOptions {
  message TNoteOptions {
    message TFinalAction {
      message TSendTextInput {
      }

      .NAlice.TSpeechModeClientOptions.TNoteOptions.TFinalAction.TSendTextInput SendTextInput = 1;
    }

    string PrefixText = 1;
    .NAlice.TSpeechModeClientOptions.TNoteOptions.TFinalAction FinalAction = 2;
  }

  message TMicOptions {
  }

  oneof Options {
    .NAlice.TSpeechModeClientOptions.TNoteOptions NoteOptions = 1;
    .NAlice.TSpeechModeClientOptions.TMicOptions MicOptions = 2;
  }
}

