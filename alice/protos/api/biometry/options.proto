syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.api.biometry";
option java_outer_classname = "OndeviceBiometryOptions";
option go_package = "a.yandex-team.ru/alice/protos/api/biometry";

import "yt/yt_proto/yt/formats/extension.proto";

message TOndeviceBiometryOptions {
  message TScoring {
    bool Enabled = 1;
  }

  message TClassification {
    bool Enabled = 1;
  }

  .NAlice.TOndeviceBiometryOptions.TScoring Scoring = 1;
  bool IgnoreVoiceprintUpdate = 2;
  .NAlice.TOndeviceBiometryOptions.TClassification Classification = 3;
}

