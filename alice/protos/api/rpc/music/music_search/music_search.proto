syntax = "proto3";

package NAlice.NMusic;

option go_package = "a.yandex-team.ru/alice/protos/api/rpc/music/music_search";

import "alice/protos/api/voice_control/voice_control.proto";
import "alice/protos/data/scenario/objects/music.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TMusicSearchRequest {
  enum EMusicSearchType {
    Undefined = 0;
    All = 1;
    Track = 2;
    Artist = 3;
    Album = 4;
    Playlist = 5;
    Podcast = 6;
    Audiobook = 7;
    Clip = 8;
  }

  string Query = 1;
  .NAlice.NMusic.TMusicSearchRequest.EMusicSearchType Type = 2;
  uint32 Offset = 3;
  uint32 Limit = 4;
}

message TMusicSearchResponse {
  message TMusicSearchElement {
    .NAlice.TVoiceControl VoiceControl = 7;
    oneof TElementInfo {
      .NAlice.NData.TTrack Track = 1;
      .NAlice.NData.TArtist Artist = 2;
      .NAlice.NData.TAlbum Album = 3;
      .NAlice.NData.TPlaylist Playlist = 4;
      .NAlice.NData.TPodcastEpisode PodcastEpisode = 5;
      .NAlice.NData.TWave Wave = 6;
    }
  }

  .NAlice.NMusic.TMusicSearchRequest.EMusicSearchType Type = 1;
  repeated .NAlice.NMusic.TMusicSearchResponse.TMusicSearchElement SearchElements = 2;
}

message TMusicSearchHistoryRequest {
}

message TMusicSearchHistoryResponse {
  repeated .NAlice.NMusic.TMusicSearchResponse.TMusicSearchElement SearchElements = 1;
}

message TMusicSearchFeedbackRequest {
}

message TMusicSearchFeedbackResponse {
}

message TMusicSearchNavigationRequest {
  string Query = 1;
  .NAlice.NMusic.TMusicSearchRequest.EMusicSearchType Type = 2;
  uint32 Limit = 3;
}

message TMusicSearchNavigationResponse {
  repeated .NAlice.TVoiceControl VoiceControls = 1;
}

