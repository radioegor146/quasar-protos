syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.div";
option java_outer_classname = "Div2CardProto";
option go_package = "a.yandex-team.ru/alice/protos/div";

import "yt/yt_proto/yt/formats/extension.proto";
import "google/protobuf/struct.proto";
import "alice/protos/div/div2id.proto";
import "alice/protos/div/div_external_variable_sources.proto";

message TDiv2Card {
  message Template {
    oneof TemplateBody {
      .google.protobuf.Struct Body = 1;
      string StringBody = 2;
    }
  }

  message GlobalTemplatesEntry {
    string key = 1;
    .NAlice.TDiv2Card.Template value = 2;
  }

  message TDivPalette {
    message DarkEntry {
      string key = 1;
      string value = 2;
    }

    message LightEntry {
      string key = 1;
      string value = 2;
    }

    repeated .NAlice.TDiv2Card.TDivPalette.DarkEntry Dark = 1;
    repeated .NAlice.TDiv2Card.TDivPalette.LightEntry Light = 2;
  }

  bool HideBorders = 2;
  string Text = 3;
  repeated .NAlice.TDiv2Card.GlobalTemplatesEntry GlobalTemplates = 4;
  string CardName = 5;
  .NAlice.TDiv2Id Id = 7;
  .NAlice.TDiv2Card.TDivPalette Palette = 8;
  repeated .NAlice.TDivExternalVariable ExternalVariables = 9;
  oneof Div2Body {
    .google.protobuf.Struct Body = 1;
    string StringBody = 6;
  }
}

