syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.div";
option java_outer_classname = "DivVariablesProto";
option go_package = "a.yandex-team.ru/alice/protos/div";

import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TDivVariable {
  bool supportsId = 1;
}

message TDivVariables {
  .NAlice.TDivVariable IsAudioPlaying = 1;
  .NAlice.TDivVariable IsRadioPlaying = 2;
  .NAlice.TDivVariable IsAlicePartialTextVisible = 3;
}

