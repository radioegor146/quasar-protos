option java_outer_classname = "ScreenNavigationProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/screen_navigation;screen_navigationpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TScreenNavigationCapability {
  message TParameters {
  }

