syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "CameraSubscriptionCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/camera_subscription;camerasubscriptionpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TCameraSubscriptionCapability {
  message TParameters {
  }

  message TState {
    message TFeatures {
      message TCloudFeatures {
        enum EMode {
          MODE_UNKNOWN = 0;
          MODE_EVENTS_ONLY = 1;
          MODE_ALWAYS_ON = 2;
        }

        bool Available = 1;
        uint32 ResolutionAvailable = 2;
        repeated .NAlice.TCameraSubscriptionCapability.TState.TFeatures.TCloudFeatures.EMode ModesAvailable = 3;
      }

      message TPtzFeatures {
        bool FollowObjectAvailable = 1;
      }

      message TDetectorsFeatures {
        bool DetectionZoneAvailable = 1;
      }

      message TSnapshotFeatures {
        bool SnapshotAvailable = 1;
      }

      .NAlice.TCameraSubscriptionCapability.TState.TFeatures.TCloudFeatures CloudFeatures = 1;
      .NAlice.TCameraSubscriptionCapability.TState.TFeatures.TPtzFeatures PtzFeatures = 2;
      .NAlice.TCameraSubscriptionCapability.TState.TFeatures.TDetectorsFeatures DetectorsFeatures = 3;
      .NAlice.TCameraSubscriptionCapability.TState.TFeatures.TSnapshotFeatures SnapshotFeatures = 4;
    }

    enum ESubscriptionStatus {
      SUBSCRIPTION_STATUS_UNKNOWN = 0;
      SUBSCRIPTION_STATUS_DISABLED = 1;
      SUBSCRIPTION_STATUS_ACTIVE = 2;
    }

    .NAlice.TCameraSubscriptionCapability.TState.ESubscriptionStatus SubscriptionStatus = 1;
    .NAlice.TCameraSubscriptionCapability.TState.TFeatures Features = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TCameraSubscriptionCapability.TParameters Parameters = 2;
  .NAlice.TCameraSubscriptionCapability.TState State = 3;
}

