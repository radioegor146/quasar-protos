syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "YaDiskCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/ya_disk;yadiskpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TYaDiskCapability {
  message TParameters {
  }

  message TState {
  }

  message TYaDiskAlbumItemsDataDirective {
    message TItem {
      string ItemId = 1;
      string Url = 2;
      string MediaType = 3;
      .NAlice.TYaDiskCapability.TYaDiskAlbumItemsDataDirective.TImageMetadata ImageMetadata = 4;
    }

    message TImageMetadata {
      int32 Width = 1;
      int32 Height = 2;
    }

    string Name = 1;
    int32 Limit = 2;
    string LastItemId = 3;
    repeated .NAlice.TYaDiskCapability.TYaDiskAlbumItemsDataDirective.TItem Items = 4;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TYaDiskCapability.TParameters Parameters = 2;
  .NAlice.TYaDiskCapability.TState State = 3;
}

