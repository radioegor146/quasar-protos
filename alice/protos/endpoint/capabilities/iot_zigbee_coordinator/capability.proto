syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotZigbeeCoordinatorCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_zigbee_coordinator;iotzigbeecoordinatorpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotZigbeeCoordinatorCapability {
  message TParameters {
  }

  message TChannelInterferenceLevel {
    .NAlice.TIotZigbeeCoordinatorCapability.EChannelInterferenceLevel Level = 1;
    int32 CcaRssi = 2;
  }

  message TState {
    uint32 Channel = 1;
    .NAlice.TIotZigbeeCoordinatorCapability.TChannelInterferenceLevel Interference = 2;
  }

  message TSetChannelDirective {
    string Name = 1000;
    uint32 Channel = 1;
  }

  message TStartEnergyScanDirective {
    string Name = 1000;
    uint32 TimeScanPerChannelMs = 1;
    uint32 ChannelMask = 2;
  }

  message TUpdateStateEvent {
    .NAlice.TIotZigbeeCoordinatorCapability Capability = 1;
  }

  message TEnergyScanResultEvent {
    message TChannelScanResult {
      uint32 Channel = 1;
      int32 Rssi = 2;
      .NAlice.TIotZigbeeCoordinatorCapability.TChannelInterferenceLevel Interference = 3;
    }

    repeated int32 Rssis = 1;
    repeated .NAlice.TIotZigbeeCoordinatorCapability.TEnergyScanResultEvent.TChannelScanResult ChannelScanResults = 2;
  }

  enum EChannelInterferenceLevel {
    ChannelInterferenceLevelUnknown = 0;
    ChannelInterferenceLevelLow = 1;
    ChannelInterferenceLevelModerate = 2;
    ChannelInterferenceLevelHigh = 3;
    ChannelInterferenceLevelCongested = 4;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotZigbeeCoordinatorCapability.TParameters Parameters = 2;
  .NAlice.TIotZigbeeCoordinatorCapability.TState State = 3;
}

