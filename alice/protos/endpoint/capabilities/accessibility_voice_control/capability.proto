syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AccessibilityVoiceControlCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/accessibility_voice_control;accessibilityvoicecontrolpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAccessibilityVoiceControlCapability {
  message TParameters {
  }

  message TState {
    string Layout = 1;
    .NAlice.TAccessibilityVoiceControlCapability.EControlMode ControlMode = 2;
    .NAlice.TAccessibilityVoiceControlCapability.TApplicationState ApplicationState = 3;
  }

  message TApplicationState {
    string PackageName = 1;
    optional string ScreenName = 2;
  }

  message TAccessibilityPressButtonByIdDirective {
    string Name = 1;
    int32 ButtonId = 2;
    optional string Reason = 3;
  }

  message TAccessibilityWriteTextInInputDirective {
    string Name = 1;
    int32 InputId = 2;
    string Text = 3;
  }

  enum EControlMode {
    Unknown = 0;
    OverlayOnly = 1;
    GptOnly = 2;
    OverlayFirst = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAccessibilityVoiceControlCapability.TParameters Parameters = 2;
  .NAlice.TAccessibilityVoiceControlCapability.TState State = 3;
}

