syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "FaceRecognitionCapability";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/face_recognition;face_recognitionpb";

import "google/protobuf/descriptor.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "alice/megamind/protos/guest/enrollment_headers/enrollment_headers.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TFaceRecognitionCapability {
  message TParameters {
  }

  message TCurrentRecognizedData {
    reserved "Puid";
    reserved 1;
    repeated string Puids = 2;
  }

  message TState {
    message EnrollmentsEntry {
      string key = 1;
      .NAlice.TEnrollmentHeader value = 2;
    }

    repeated .NAlice.TFaceRecognitionCapability.TState.EnrollmentsEntry Enrollments = 1;
    bool FaceIdScopeIsActive = 3;
    optional .NAlice.TFaceRecognitionCapability.TCurrentRecognizedData currentRecognizedData = 2;
  }

  message TStartFaceEnrollmentDirective {
    string Name = 1000;
    string PersId = 1;
    string Puid = 2;
  }

  message TForgetFaceEnrollmentDirective {
    string Name = 1000;
    string PersId = 1;
    string Puid = 2;
  }

  message TForgetAllFacesDirective {
    string Name = 1000;
  }

  message TOpenSmartHomeConfirmQrDirective {
    string Name = 1000;
    string Url = 1;
    string PersId = 2;
    string Puid = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TFaceRecognitionCapability.TParameters Parameters = 2;
  .NAlice.TFaceRecognitionCapability.TState State = 3;
}

