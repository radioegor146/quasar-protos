syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "CoverProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/cover;coverpb";

import "google/protobuf/descriptor.proto";
import "google/protobuf/wrappers.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TCoverCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TCoverCapability.EMode Mode = 1;
    .google.protobuf.DoubleValue Position = 2;
    .NAlice.TCoverCapability.EDirection Direction = 3;
    .NAlice.TCoverCapability.ESpeed Speed = 4;
  }

  message TOpenDirective {
    string Name = 1000;
    .NAlice.TCoverCapability.EMode Mode = 1;
  }

  message TCloseDirective {
    string Name = 1000;
    .NAlice.TCoverCapability.EMode Mode = 1;
  }

  message TStopDirective {
    string Name = 1000;
    .NAlice.TCoverCapability.EMode Mode = 1;
  }

  message TSetPositionDirective {
    string Name = 1000;
    double Position = 1;
  }

  message TSetDirectionDirective {
    string Name = 1000;
    .NAlice.TCoverCapability.EDirection Direction = 1;
  }

  message TSetSpeedDirective {
    string Name = 1000;
    .NAlice.TCoverCapability.ESpeed Speed = 1;
  }

  message TResetLimitsDirective {
    string Name = 1000;
  }

  message TSetLimitDirectiveType {
    string Name = 1000;
    .NAlice.TCoverCapability.ELimit Limit = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TCoverCapability Capability = 1;
  }

  enum EMode {
    Normal = 0;
    Calibration = 1;
  }

  enum EDirection {
    Direct = 0;
    Reversed = 1;
  }

  enum ESpeed {
    Low = 0;
    Medium = 1;
    High = 2;
  }

  enum ELimit {
    None = 0;
    Opened = 1;
    Closed = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TCoverCapability.TParameters Parameters = 2;
  .NAlice.TCoverCapability.TState State = 3;
}

