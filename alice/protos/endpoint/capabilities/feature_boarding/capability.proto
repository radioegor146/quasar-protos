syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "FeatureBoardingCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/feature_boarding;featureboardingpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TFeatureBoardingCapability {
  message TParameters {
  }

  message TState {
    repeated string EnabledFeatures = 1;
    repeated string SupportedFeatures = 2;
  }

  message TStartFeatureBoardingDirective {
    string Name = 1;
    string FeatureId = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TFeatureBoardingCapability.TParameters Parameters = 2;
  .NAlice.TFeatureBoardingCapability.TState State = 3;
}

