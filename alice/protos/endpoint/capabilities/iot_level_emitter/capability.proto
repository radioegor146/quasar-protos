syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotLevelEmitterCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_level_emitter;iotlevelemitterpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotLevelEmitterCapability {
  message TParameters {
  }

  message TState {
  }

  message TUpdateAbsoluteLevelEvent {
    double Level = 1;
    uint32 TransitionTime = 2;
    bool WithOnOff = 3;
  }

  message TUpdateRelativeLevelEvent {
    double Level = 1;
    uint32 TransitionTime = 2;
    bool WithOnOff = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotLevelEmitterCapability.TParameters Parameters = 2;
  .NAlice.TIotLevelEmitterCapability.TState State = 3;
}

