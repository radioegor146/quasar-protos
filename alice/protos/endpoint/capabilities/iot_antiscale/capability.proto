syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotAntiscaleCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_antiscale;iotantiscalepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotAntiscaleCapability {
  message TParameters {
  }

  message TState {
    bool Enabled = 1;
  }

  message TSetIotAntiscaleDirective {
    string Name = 1000;
    bool Enabled = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotAntiscaleCapability Capability = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotAntiscaleCapability.TParameters Parameters = 2;
  .NAlice.TIotAntiscaleCapability.TState State = 3;
}

