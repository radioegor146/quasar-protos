syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AliceProProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/alice_pro;alicepropb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAliceProCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TAliceProCapability.ESubscriptionStatus SubscriptionStatus = 1;
  }

  message TOpenProPurchaseScreenDirective {
    string Name = 1;
  }

  message TForceSubscriptionCheckDirective {
  }

  message TShowAliceProBannerDirective {
  }

  enum ESubscriptionStatus {
    NoSubscription = 0;
    SubscriptionActive = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAliceProCapability.TParameters Parameters = 2;
  .NAlice.TAliceProCapability.TState State = 3;
}

