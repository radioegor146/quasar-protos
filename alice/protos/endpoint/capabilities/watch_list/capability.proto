syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "WatchListCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/watch_list;watchlistpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/analytics/client_analytics/tv_client_carousel_analytics.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TWatchListCapability {
  message TParameters {
  }

  message TState {
  }

  message TAddToWatchListDirective {
    string Name = 1000;
    string OntoId = 1;
    string ContentId = 2;
    .NAlice.NAnalytics.TTvClientCarouselAnalytics ClientAnalytics = 4;
    optional string Title = 3;
  }

  message TRemoveFromWatchListDirective {
    string Name = 1000;
    string OntoId = 1;
    string ContentId = 2;
    .NAlice.NAnalytics.TTvClientCarouselAnalytics ClientAnalytics = 4;
    optional string Title = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TWatchListCapability.TParameters Parameters = 2;
  .NAlice.TWatchListCapability.TState State = 3;
}

