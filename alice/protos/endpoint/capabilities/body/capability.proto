syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AutomotiveBodyCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/body;bodypb";

import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAutomotiveBodyCapability {
  message TParameters {
    message TPropertyConfigParameters {
      .NAlice.TAutomotiveBodyCapability.EPropertyId PropertyId = 1;
      .NAlice.TAutomotiveBodyCapability.TVehiclePropertyValueBounds PropertyValueBounds = 2;
    }

    repeated .NAlice.TAutomotiveBodyCapability.TParameters.TPropertyConfigParameters PropertyConfigParameters = 1;
  }

  message TVehicleArea {
    oneof VehicleArea {
      .NAlice.TAutomotiveBodyCapability.EVehicleAreaWindow Window = 1;
      .NAlice.TAutomotiveBodyCapability.EVehicleAreaMirror Mirror = 2;
      .NAlice.TAutomotiveBodyCapability.EVehicleAreaDoor Door = 3;
    }
  }

  message TVehiclePropertyValueBounds {
    message IntValueBounds {
      int32 Min = 1;
      int32 Max = 2;
    }

    oneof ValueType {
      .NAlice.TAutomotiveBodyCapability.TVehiclePropertyValueBounds.IntValueBounds IntValue = 1;
    }
  }

  message TVehiclePropertyValue {
    message TIntValue {
      int32 Value = 1;
    }

    message TBoolValue {
      bool Value = 1;
    }

    oneof ValueType {
      .NAlice.TAutomotiveBodyCapability.TVehiclePropertyValue.TIntValue IntValue = 1;
      .NAlice.TAutomotiveBodyCapability.TVehiclePropertyValue.TBoolValue BoolValue = 2;
    }
  }

  message TState {
    repeated .NAlice.TAutomotiveBodyCapability.TVehiclePropertyState VehiclePropertyStates = 1;
  }

  message TVehiclePropertyState {
    message TStateByArea {
      .NAlice.TAutomotiveBodyCapability.TVehicleArea Area = 1;
      .NAlice.TAutomotiveBodyCapability.TVehiclePropertyValue Value = 2;
    }

    .NAlice.TAutomotiveBodyCapability.EPropertyId PropertyId = 1;
    repeated .NAlice.TAutomotiveBodyCapability.TVehiclePropertyState.TStateByArea StateByAreas = 2;
    .NAlice.TAutomotiveBodyCapability.TVehiclePropertyValue GlobalStateValue = 3;
  }

  message TOpenBodySideMirrorsDirective {
    string Name = 1000;
    bool Opened = 1;
  }

  message TOpenBodyTrunkDirective {
    message TTrunkState {
      bool Opened = 1;
    }

    string Name = 1000;
    .NAlice.TAutomotiveBodyCapability.TOpenBodyTrunkDirective.TTrunkState TrunkState = 1;
  }

  message TOpenBodySunVisorDirective {
    message TSunVisorState {
      int32 VisorLevel = 1;
    }

    string Name = 1000;
    .NAlice.TAutomotiveBodyCapability.TOpenBodySunVisorDirective.TSunVisorState SunVisorState = 1;
  }

  message TOpenBodyTrapdoorDirective {
    message TTrapdoorState {
      int32 TrapdoorLevel = 1;
    }

    string Name = 1000;
    .NAlice.TAutomotiveBodyCapability.TOpenBodyTrapdoorDirective.TTrapdoorState TrapdoorState = 1;
  }

  message TOpenBodyWindowDirective {
    message TWindowState {
      int32 Level = 1;
      .NAlice.TAutomotiveBodyCapability.EVehicleAreaWindow Window = 2;
    }

    string Name = 1000;
    repeated .NAlice.TAutomotiveBodyCapability.TOpenBodyWindowDirective.TWindowState WindowState = 1;
  }

  enum EPropertyId {
    PROPERTY_UNKNOWN = 0;
    MIRROR_POS = 1;
    DOOR_POS = 2;
    SUN_VISOR_POS = 3;
    WINDOW_POS = 4;
  }

  enum EVehicleAreaWindow {
    WINDOW_UNKNOWN = 0;
    WINDOW_FRONT_WINDSHIELD = 1;
    WINDOW_REAR_WINDSHIELD = 2;
    WINDOW_ROW_1_LEFT = 3;
    WINDOW_ROW_1_RIGHT = 4;
    WINDOW_ROW_2_LEFT = 5;
    WINDOW_ROW_2_RIGHT = 6;
    WINDOW_ROW_3_LEFT = 7;
    WINDOW_ROW_3_RIGHT = 8;
    WINDOW_ROOF_TOP_1 = 9;
    WINDOW_ROOF_TOP_2 = 10;
  }

  enum EVehicleAreaMirror {
    MIRROR_UNKNOWN = 0;
    MIRROR_DRIVER_LEFT = 1;
    MIRROR_DRIVER_RIGHT = 2;
  }

  enum EVehicleAreaDoor {
    DOOR_UNKNOWN = 0;
    DOOR_REAR = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAutomotiveBodyCapability.TParameters Parameters = 2;
  .NAlice.TAutomotiveBodyCapability.TState State = 3;
}

