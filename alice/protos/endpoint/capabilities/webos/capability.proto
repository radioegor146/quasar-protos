syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/webos;onoffpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TWebOSCapability {
  message TState {
    string ForegroundAppId = 1;
  }

  message TParameters {
    message TAppInfo {
      string AppId = 1;
    }

    repeated .NAlice.TWebOSCapability.TParameters.TAppInfo AvailableApps = 1;
    bool IsYoutubePlayerSupported = 2;
  }

  message TWebOSLaunchAppDirective {
    string Name = 1000;
    string AppId = 1;
    bytes ParamsJson = 2;
  }

  message TWebOSShowGalleryDirective {
    string Name = 1000;
    repeated bytes ItemsJson = 1;
  }

  message TWebOSManageAppDirective {
    string Name = 1000;
    string AppId = 1;
    bytes ParamsJson = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TWebOSCapability.TParameters Parameters = 2;
  .NAlice.TWebOSCapability.TState State = 3;
}

