syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotIdentifyCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_identify;iotidentifypb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotIdentifyCapability {
  message TParameters {
    message TRange {
      uint32 Min = 1;
      uint32 Max = 2;
    }

    .NAlice.TIotIdentifyCapability.TParameters.TRange IdentifyTimeRangeSec = 1;
  }

  message TState {
  }

  message TStartIdentifyDirective {
    string Name = 1000;
    uint32 IdentifyTimeSec = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotIdentifyCapability.TParameters Parameters = 2;
  .NAlice.TIotIdentifyCapability.TState State = 3;
}

