syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "TeasersCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/teaser;teaserpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";
import "alice/protos/data/scenario/centaur/teasers/teaser_settings.proto";
import "alice/protos/div/div2card.proto";
import "google/protobuf/struct.proto";

message TTeaserCapability {
  message TParameters {
    bool SupportsVoiceControls = 1;
    bool SupportsS3VideoTeasers = 2;
  }

  message TState {
    repeated string CurrentStickyTeasers = 1;
  }

  message TAddTeaserDirective {
    enum EOrientationType {
      Any = 0;
      LandscapeOnly = 1;
      PortraitOnly = 2;
    }

    string Name = 1;
    string TeaserId = 2;
    uint32 TeaserShowTimeSec = 3;
    .NAlice.TDiv2Card Div2Card = 4;
    .google.protobuf.Struct Div2Templates = 5;
    .NAlice.NData.TCentaurTeaserConfigData TeaserConfig = 6;
    string TeaserGroupId = 7;
    .NAlice.TTeaserCapability.TAddTeaserDirective.EOrientationType SupportedOrientations = 8;
    bool IsStickyTeaser = 9;
  }

  message TYaDiskTeasersInfo {
    string AlbumUrl = 1;
  }

  message TRotateTeasersDirective {
    string Name = 1;
    bool SettingsChanged = 2;
    bool YaDiskAlbumIsEmpty = 3;
    .NAlice.TTeaserCapability.TYaDiskTeasersInfo YaDiskTeasersInfo = 4;
  }

  message TRemoveTeaserDirective {
    string Name = 1;
    string TeaserId = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TTeaserCapability.TParameters Parameters = 2;
  .NAlice.TTeaserCapability.TState State = 3;
}

