syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotEnableClientCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_enable_client;iotenableclientpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotEnableClientCapability {
  message TParameters {
  }

  message TState {
    bool Enable = 1;
  }

  message TSetIotEnableClientDirective {
    string Name = 1000;
    bool Enable = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotEnableClientCapability Capability = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotEnableClientCapability.TParameters Parameters = 2;
  .NAlice.TIotEnableClientCapability.TState State = 3;
}

