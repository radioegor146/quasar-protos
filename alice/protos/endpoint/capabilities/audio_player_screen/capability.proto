syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AudioPlayerScreenCapabilitiesProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/audio_player_screen;audioplayerscreenpb";

import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAudioPlayerScreenCapability {
  message TParameters {
    bool UseNativeScreen = 1;
  }

  message TState {
  }

  message TShowAudioPlayerScreenDirective {
    string Name = 1000;
    string TrackId = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAudioPlayerScreenCapability.TParameters Parameters = 2;
  .NAlice.TAudioPlayerScreenCapability.TState State = 3;
}

