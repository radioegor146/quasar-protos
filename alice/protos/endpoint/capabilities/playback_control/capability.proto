syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "PlaybackControlCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/playback_control;playback_controlpb";

import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TPlaybackControlCapability {
  message TTrackInfo {
    string Id = 1;
    string Type = 2;
  }

  message TEntityInfo {
    string Id = 1;
    string Type = 2;
    string Description = 3;
    .NAlice.TPlaybackControlCapability.TTrackInfo Prev = 4;
    .NAlice.TPlaybackControlCapability.TTrackInfo Next = 5;
    bool Shuffled = 6;
    string RepeatMode = 7;
  }

  message TParameters {
  }

  message TState {
    message ExtraEntry {
      string key = 1;
      string value = 2;
    }

    string Id = 1;
    string RawType = 2;
    string RawPlayerType = 3;
    .NAlice.TPlaybackControlCapability.EPlayerType PlayerType = 4;
    bool HasPause = 5;
    bool HasPlay = 6;
    bool HasNext = 7;
    bool HasPrev = 8;
    bool HasLike = 9;
    bool HasDislike = 10;
    int64 PositionTimePoint = 11;
    uint32 PositionSec = 12;
    uint32 DurationSec = 13;
    string Title = 14;
    string Subtitle = 15;
    bool HasProgressBar = 16;
    bool ShowPlayer = 17;
    string LiveStreamText = 18;
    .NAlice.TPlaybackControlCapability.TEntityInfo EntityInfo = 19;
    string ProviderName = 20;
    bool HideProgressBar = 21;
    repeated .NAlice.TPlaybackControlCapability.TState.ExtraEntry Extra = 22;
  }

  enum EPlayerType {
    Unknown = 0;
    Music = 1;
    Radio = 2;
    Bluetooth = 3;
    Video = 4;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TPlaybackControlCapability.TParameters Parameters = 2;
  .NAlice.TPlaybackControlCapability.TState State = 3;
}

