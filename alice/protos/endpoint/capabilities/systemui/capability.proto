option java_outer_classname = "SystemUiCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/systemui;systemuipb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TSystemUiCapability {
  message TParameters {
  }

  message TState {
  }

  message TShowVolumeDirective {
