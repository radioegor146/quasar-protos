syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "ClockCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/clock;clockpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/data/time/time_format.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TClockCapability {
  message TParameters {
  }

  message TState {
    .NAlice.NData.TTimeFormat Format = 1;
    bool IsShown = 2;
  }

  message TShowClockDirective {
    string Name = 1;
  }

  message THideClockDirective {
    string Name = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TClockCapability.TParameters Parameters = 2;
  .NAlice.TClockCapability.TState State = 3;
}

