syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "EnrollmentScreenUiCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/enrollment_screen_ui;enrollmentscreenuipb";

import "google/protobuf/descriptor.proto";
import "alice/library/censor/protos/extension.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "alice/protos/api/typed_callbacks/typed_callback_request.proto";
import "alice/protos/api/voice_control/voice_control.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TEnrollmentScreenUiCapability {
  message TParameters {
    bool ShouldLaunchOnboarding = 1;
  }

  message TState {
  }

  message TStartEnrollmentOnboardingDirective {
    string Name = 1;
    string Puid = 4;
    string BackgroundVideoUrl = 5;
    .NAlice.TTypedCallbackRequest OnSuccess = 2;
    .NAlice.TTypedCallbackRequest OnFail = 3;
    repeated .NAlice.TVoiceControl SuccessButtonVoiceControls = 6;
  }

  message TShowEnrollmentUserAvatarDirective {
    string Name = 1;
    string Puid = 2;
    string Text = 3;
    string BackgroundVideoUrl = 4;
  }

  message TShowEnrollmentPhraseDirective {
    string Name = 1;
    string Text = 2;
    string BackgroundVideoUrl = 3;
    string TransitionInVideoUrl = 4;
    uint32 TotalSteps = 5;
    uint32 CurrentStep = 6;
  }

  message TFinishEnrollmentUiDirective {
    string Name = 1;
    string FinishVideoUrl = 2;
  }

  message TShowVoiceprintRemoveSuccessDirective {
    string Name = 1;
    string Puid = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TEnrollmentScreenUiCapability.TParameters Parameters = 2;
  .NAlice.TEnrollmentScreenUiCapability.TState State = 3;
}

