syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "PhoneCallsCapabilitiesProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/phone_calls;phonecallspb";

import "alice/protos/api/alicekit/directives/directive.proto";
import "alice/protos/data/lat_lon.proto";
import "alice/protos/data/telecom/providers.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TPhoneCallsCapability {
  message TCredentials {
    oneof Credentials {
      .NAlice.TPhoneCallsCapability.TSipCredentials SipCredentials = 1;
      .NAlice.TPhoneCallsCapability.TMtsCredentials MtsCredentials = 2;
    }
  }

  message TSupportedProtocol {
    .NAlice.TPhoneCallsCapability.ETelephoneServiceProvider Provider = 1;
    .NAlice.TPhoneCallsCapability.EProtocol Protocol = 2;
    .NAlice.NTelecom.EProvider TelecomProvider = 3;
    bool OnDemandConnection = 4;
    repeated .NAlice.TPhoneCallsCapability.EMediaType SupportedMedia = 5;
  }

  message TParameters {
    repeated .NAlice.TPhoneCallsCapability.TSupportedProtocol SupportedProtocols = 1;
  }

  message TMediaState {
    enum EMuteSource {
      UnknownMuteSource = 0;
      HardwareMute = 1;
      SoftwareMute = 2;
    }

    bool IsMicMuted = 1;
    .NAlice.TPhoneCallsCapability.TMediaState.EMuteSource MuteSource = 2;
  }

  message TCallParams {
    repeated .NAlice.TPhoneCallsCapability.EMediaType MediaTypes = 1;
  }

  message TCall {
    reserved "PhoneNumber";
    reserved 2;
    string Id = 1;
    .NAlice.NTelecom.TProviderContactInfo ProviderContactInfo = 3;
    bool IsConfirmed = 4;
    string AccountId = 5;
    .NAlice.NTelecom.TCallInfo CallInfo = 6;
    .NAlice.TPhoneCallsCapability.TMediaState MediaState = 7;
    .NAlice.TPhoneCallsCapability.TCallParams CallParams = 8;
  }

  message TAccount {
    reserved "Number";
    reserved 1;
    enum EConnectStatus {
      UnknownConnectStatus = 0;
      Disconnected = 1;
      Connecting = 2;
      Connected = 3;
    }

    enum EDisconnectReason {
      UnknownDisconnectReason = 0;
      BackendError = 1;
      AccountExpired = 2;
      ValidationFailed = 3;
    }

    .NAlice.TPhoneCallsCapability.TSupportedProtocol Protocol = 2;
    bool IsConnected = 3;
    .NAlice.TPhoneCallsCapability.TAccount.EConnectStatus ConnectStatus = 6;
    .NAlice.TPhoneCallsCapability.TAccount.EDisconnectReason DisconnectReason = 7;
    .NAlice.NTelecom.TProviderContactInfo ProviderContactInfo = 4;
    string Id = 5;
  }

  message TState {
    .NAlice.TPhoneCallsCapability.TAccount Account = 1;
    .NAlice.TPhoneCallsCapability.TCall CurrentCall = 2;
    .NAlice.TPhoneCallsCapability.TCall IncomingCall = 3;
    .NAlice.TPhoneCallsCapability.TCall OutgoingCall = 4;
    repeated .NAlice.TPhoneCallsCapability.TAccount Accounts = 5;
  }

  message TSipCredentials {
    reserved "OAuthToken";
    reserved 6;
    message THeader {
      string Name = 1;
      string Value = 2;
    }

    string Number = 1;
    string Password = 2;
    string Realm = 3;
    string RegistrarIP = 4;
    string AppID = 5;
    repeated .NAlice.TPhoneCallsCapability.TSipCredentials.THeader SipHeaders = 7;
  }

  message TMtsCredentials {
    message TAuthorization {
      message TPermanentCredentials {
        string InstanceId = 1;
        string MyConnectToken = 2;
        string AcsToken = 3;
        string Msisdn = 4;
        string PartnerId = 5;
        uint64 ExpirationTimestampSec = 6;
      }

      oneof Authorization {
        string OttToken = 1;
        .NAlice.TPhoneCallsCapability.TMtsCredentials.TAuthorization.TPermanentCredentials PermanentCredentials = 2;
      }
    }

    message TLocation {
      .NAlice.NData.TLatLon LatLon = 1;
      uint64 TimestampSec = 2;
    }

    .NAlice.TPhoneCallsCapability.TMtsCredentials.TAuthorization Authorization = 1;
    string UserAgent = 2;
    string DeviceId = 3;
    .NAlice.TPhoneCallsCapability.TMtsCredentials.TLocation Location = 4;
    string Server = 5;
    .NAlice.NData.TLatLon LaasRealLocation = 7;
    optional string WssUrl = 6;
  }

  message TAddAccountDirective {
    string Name = 1;
    string CredentialsKey = 3;
    string AccountId = 4;
    .NAlice.TPhoneCallsCapability.TSupportedProtocol Protocol = 6;
    .NAlice.TPhoneCallsCapability.ELifetimePolicy LifetimePolicy = 7;
    oneof Credentials {
      .NAlice.TPhoneCallsCapability.TSipCredentials SipCredentials = 2;
      .NAlice.TPhoneCallsCapability.TMtsCredentials MtsCredentials = 5;
    }
  }

  message TConnectDirective {
    string Name = 1;
    string AccountId = 2;
    string ForcedTerminalId = 3;
  }

  message TDeleteAccountDirective {
    string Name = 1;
    string AccountId = 2;
  }

  message TRefreshAccountDirective {
    string Name = 1;
    string AccountId = 2;
  }

  message TMakeCallDirective {
    string Name = 1;
    string Number = 2;
    .NAlice.NTelecom.TProviderContact ProviderContact = 3;
    string CallId = 4;
    string AccountId = 5;
    .NAlice.NTelecom.TCallInfo CallInfo = 6;
    .NAlice.TPhoneCallsCapability.TCallParams CallParams = 10;
    repeated .NAlice.NAliceApi.TDirective OnAccepted = 7;
    repeated .NAlice.NAliceApi.TDirective OnDeclined = 8;
    repeated .NAlice.NAliceApi.TDirective OnEnded = 9;
  }

  message TAcceptCallDirective {
    reserved "Call";
    reserved 2;
    string Name = 1;
    string CallId = 3;
    .NAlice.NTelecom.TCallInfo CallInfo = 4;
    repeated .NAlice.NAliceApi.TDirective OnEnded = 5;
  }

  message THangUpCallDirective {
    reserved "Call";
    reserved 2;
    string Name = 1;
    string CallId = 3;
  }

  message TProcessIncomingCallDirective {
    reserved 4;
    string Name = 1;
    string CallId = 2;
    .NAlice.NTelecom.TCallInfo CallInfo = 3;
    repeated .NAlice.NAliceApi.TDirective OnEnded = 5;
    repeated .NAlice.NAliceApi.TDirective OnAccepted = 6;
  }

  message TIgnoreIncomingCallDirective {
    string Name = 1;
    string CallId = 2;
  }

  message TOpenDeviceCallUiDirective {
    message TCallableDeviceInfo {
      string DeviceId = 1;
      string DeviceName = 2;
      string DevicePlatform = 3;
      string RoomName = 4;
      string HouseholdName = 5;
      string DeviceIconUrl = 6;
      bool RadioNannyEnabled = 7;
      bool DropInEnabled = 8;
    }

    string Name = 1;
    .NAlice.TPhoneCallsCapability.TOpenDeviceCallUiDirective.TCallableDeviceInfo DeviceInfo = 2;
  }

  message TSetMicMuteDirective {
    string Name = 1;
    bool IsMicMuted = 2;
    .NAlice.TPhoneCallsCapability.TMediaState.EMuteSource MuteSource = 3;
    string CallId = 4;
  }

  message TPhoneCallsAddAccountEvent {
    enum EStatus {
      OK = 0;
      Failed = 1;
    }

    string CredentialsKey = 1;
    .NAlice.TPhoneCallsCapability.TPhoneCallsAddAccountEvent.EStatus Status = 2;
    string AccountId = 3;
    string Message = 4;
  }

  message TPhoneCallsDeleteAccountEvent {
    enum EStatus {
      OK = 0;
      Failed = 1;
    }

    .NAlice.TPhoneCallsCapability.TPhoneCallsDeleteAccountEvent.EStatus Status = 1;
    string AccountId = 2;
    string Message = 3;
  }

  message TPhoneCallsAccountInvalidateEvent {
    enum EReason {
      UnknownReason = 0;
      Expired = 1;
      OutOfRangeLocation = 2;
      WifiChange = 3;
    }

    string AccountId = 1;
    .NAlice.TPhoneCallsCapability.TPhoneCallsAccountInvalidateEvent.EReason Reason = 3;
  }

  message TPhoneCallsRegStateChangedEvent {
    .NAlice.TPhoneCallsCapability.TAccount Account = 1;
    int32 StatusCode = 2;
  }

  message TPhoneCallsCallFailedEvent {
  }

  message TPhoneCallsCallEndedEvent {
    string CallId = 1;
    int32 StatusCode = 2;
  }

  enum EProtocol {
    UnknownProtocol = 0;
    Sip = 1;
    Webrtc = 2;
  }

  enum ELifetimePolicy {
    Undefined = 0;
    Unlimitied = 1;
    Config = 2;
  }

  enum ETelephoneServiceProvider {
    UnknownTSP = 0;
    Megafon = 1;
    Ats = 2;
    Mts = 3;
  }

  enum EMediaType {
    Unknown = 0;
    Audio = 1;
    Video = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TPhoneCallsCapability.TParameters Parameters = 2;
  .NAlice.TPhoneCallsCapability.TState State = 3;
}

