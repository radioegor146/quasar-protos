syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "SetupProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/setup;setuppb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TSetupCapability {
  message TParameters {
  }

  message TState {
  }

  message TStartSetupDirective {
    enum EMode {
      Unknown = 0;
      FirstSetup = 1;
      Setup = 2;
      AddNetwork = 3;
    }

    .NAlice.TSetupCapability.TStartSetupDirective.EMode SetupMode = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TSetupCapability.TParameters Parameters = 2;
  .NAlice.TSetupCapability.TState State = 3;
}

