syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AppsMarketCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/apps_market;appsmarketpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAppsMarketCapability {
  message TParameters {
  }

  message TState {
    enum EStoreType {
      UnknownStoreType = 0;
      DialogsSmartScreen = 1;
      DialogsTV = 2;
    }

    .NAlice.TAppsMarketCapability.TState.EStoreType StoreType = 1;
  }

  message TOpenAppDetailsDirective {
    string Name = 1;
    string PackageToOpen = 2;
    string AppId = 3;
  }

  message TOpenAppsMarketDirective {
    string Name = 1;
  }

  message TInstallMarketAppDirective {
    string Name = 1;
    string VersionName = 2;
    string DownloadUrl = 3;
    string PackageName = 4;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAppsMarketCapability.TParameters Parameters = 2;
  .NAlice.TAppsMarketCapability.TState State = 3;
}

