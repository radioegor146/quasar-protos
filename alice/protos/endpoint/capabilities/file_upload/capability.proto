syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "FileUploadProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/file_upload;fileuploadpb";

import "alice/protos/api/alicekit/events/file_upload_response/file_upload_response.proto";
import "alice/protos/api/files/file_info.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TFileUploadCapability {
  message TParameters {
  }

  message TState {
  }

  message TPollingOptions {
    uint64 TimeoutMs = 1;
  }

  message TFileDescription {
    string InputSourceId = 1;
    string Title = 2;
    string MimeType = 3;
    uint64 Size = 4;
  }

  message TStartFileUploadDirective {
    string Name = 1000;
    string InteractionId = 1;
    .NAlice.TFileUploadCapability.TFileDescription FileDescription = 2;
    .NAlice.TFileUploadCapability.TPollingOptions AutoPolling = 3;
  }

  message TStartFilePollingDirective {
    string Name = 1000;
    string InteractionId = 1;
    repeated string FileGuids = 2;
    .NAlice.TFileUploadCapability.TPollingOptions PollingOptions = 3;
  }

  message TFileUploadStatusEvent {
    message TUploadStart {
    }

    message TUploadFinish {
      .NAlice.NAliceApi.TFileUploadResponse.TFileUploadFinish ProtocolResponse = 1;
    }

    message TUploadError {
      message TClientError {
      }

      oneof Error {
        .NAlice.NAliceApi.TFileUploadResponse.TFileUploadError ProtocolError = 1;
        .NAlice.TFileUploadCapability.TFileUploadStatusEvent.TUploadError.TClientError ClientError = 2;
      }
    }

    string InteractionId = 1;
    oneof Status {
      .NAlice.TFileUploadCapability.TFileUploadStatusEvent.TUploadStart UploadStart = 2;
      .NAlice.TFileUploadCapability.TFileUploadStatusEvent.TUploadFinish UploadFinish = 3;
      .NAlice.TFileUploadCapability.TFileUploadStatusEvent.TUploadError UploadError = 4;
    }
  }

  message TFilePollingStatusEvent {
    message TPollingStart {
    }

    message TPollingFinish {
    }

    message TPollingError {
      message TPollingTimeout {
      }

      message TPollingServerError {
        .NAlice.NApi.NFiles.TFileInfo.EFileServiceStatus Status = 1;
      }

      message TPollingClientError {
      }

      oneof Error {
        .NAlice.TFileUploadCapability.TFilePollingStatusEvent.TPollingError.TPollingTimeout PollingTimeout = 1;
        .NAlice.TFileUploadCapability.TFilePollingStatusEvent.TPollingError.TPollingServerError ServerError = 2;
        .NAlice.TFileUploadCapability.TFilePollingStatusEvent.TPollingError.TPollingClientError ClientError = 3;
      }
    }

    string InteractionId = 1;
    string Guid = 5;
    oneof Status {
      .NAlice.TFileUploadCapability.TFilePollingStatusEvent.TPollingStart PollingStart = 2;
      .NAlice.TFileUploadCapability.TFilePollingStatusEvent.TPollingFinish PollingFinish = 3;
      .NAlice.TFileUploadCapability.TFilePollingStatusEvent.TPollingError PollingError = 4;
    }
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TFileUploadCapability.TParameters Parameters = 2;
  .NAlice.TFileUploadCapability.TState State = 3;
}

