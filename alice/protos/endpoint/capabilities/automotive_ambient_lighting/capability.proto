syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AutomotiveAmbientLightingCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/automotive_ambient_lighting;automotive_ambient_lightingpb";

import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAutomotiveAmbientLightingCapability {
  message TParameters {
    message TPropertyConfigParameters {
      .NAlice.TAutomotiveAmbientLightingCapability.EPropertyId PropertyId = 1;
      .NAlice.TAutomotiveAmbientLightingCapability.TVehiclePropertyValueBounds PropertyValueBounds = 2;
    }

    repeated .NAlice.TAutomotiveAmbientLightingCapability.TParameters.TPropertyConfigParameters PropertyConfigParameters = 1;
  }

  message TVehiclePropertyValueBounds {
    message TColorValueBounds {
      repeated .NAlice.TAutomotiveAmbientLightingCapability.EAmbientLightingColor AllowedValues = 1;
    }

    oneof ValueType {
      .NAlice.TAutomotiveAmbientLightingCapability.TVehiclePropertyValueBounds.TColorValueBounds ColorValueBounds = 1;
    }
  }

  message TState {
    repeated .NAlice.TAutomotiveAmbientLightingCapability.TVehiclePropertyState VehiclePropertyStates = 1;
  }

  message TVehiclePropertyState {
    .NAlice.TAutomotiveAmbientLightingCapability.EPropertyId PropertyId = 1;
    .NAlice.TAutomotiveAmbientLightingCapability.TVehiclePropertyValue GlobalStateValue = 2;
  }

  message TVehiclePropertyValue {
    oneof ValueType {
      .NAlice.TAutomotiveAmbientLightingCapability.EAmbientLightingColor ColorValue = 1;
    }
  }

  message TSetAmbientLightingStateDirective {
    string Name = 1000;
    bool Enabled = 1;
  }

  message TChangeAmbientLightingColorDirective {
    string Name = 1000;
    .NAlice.TAutomotiveAmbientLightingCapability.EAmbientLightingColor Color = 1;
  }

  enum EPropertyId {
    Unknown = 0;
    AmbientLightingColor = 1;
  }

  enum EAmbientLightingColor {
    AmbientLightColorUnknown = 0;
    White = 1;
    Blue = 2;
    Green = 3;
    Yellow = 4;
    Red = 5;
    Pink = 6;
    Purple = 7;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAutomotiveAmbientLightingCapability.TParameters Parameters = 2;
  .NAlice.TAutomotiveAmbientLightingCapability.TState State = 3;
}

