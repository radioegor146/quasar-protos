syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotDisplayOrientationCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_display_orientation;iotdisplayorientationpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotDisplayOrientationCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TIotDisplayOrientationCapability.EOrientation Orientation = 1;
  }

  message TSetIotDisplayOrientationDirective {
    string Name = 1000;
    .NAlice.TIotDisplayOrientationCapability.EOrientation Orientation = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotDisplayOrientationCapability Capability = 1;
  }

  enum EOrientation {
    VERTICAL = 0;
    VERTICAL_REVERSE = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotDisplayOrientationCapability.TParameters Parameters = 2;
  .NAlice.TIotDisplayOrientationCapability.TState State = 3;
}

