syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "SensorSoundAlarmMuteCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/sensor_sound_alarm_mute;sensor_sound_alarm_mutepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TSensorSoundAlarmMuteCapability {
  message TParameters {
  }

  message TState {
    bool Mute = 1;
  }

  message TMuteDirective {
    string Name = 1000;
    bool Mute = 1;
  }

  message TToggleDirective {
    string Name = 1000;
  }

  message TUpdateStateEvent {
    .NAlice.TSensorSoundAlarmMuteCapability Capability = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TSensorSoundAlarmMuteCapability.TParameters Parameters = 2;
  .NAlice.TSensorSoundAlarmMuteCapability.TState State = 3;
}

