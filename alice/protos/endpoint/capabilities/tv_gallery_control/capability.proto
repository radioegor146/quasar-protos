syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "TvGalleryControlCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/tv_gallery_control;tvgallerycontrolpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TTvGalleryControlCapability {
  message TParameters {
  }

  message TState {
  }

  message THideFromDelayedDirective {
    oneof HideTarget {
      string KpId = 1;
      string Url = 2;
    }
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TTvGalleryControlCapability.TParameters Parameters = 2;
  .NAlice.TTvGalleryControlCapability.TState State = 3;
}

