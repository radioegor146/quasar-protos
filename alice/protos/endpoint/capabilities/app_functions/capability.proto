syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AppFunctionsCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/app_functions;appfunctionspb";

import "google/protobuf/descriptor.proto";
import "google/protobuf/struct.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAppFunctionsCapability {
  message TParameters {
  }

  message TState {
    repeated .NAlice.TAppFunctionsCapability.TApplicationState ApplicationStates = 1;
  }

  message TApplicationState {
    string PackageName = 1;
    repeated .NAlice.TAppFunctionsCapability.TAppFunctionSpecification AppFunctionSpecifications = 2;
  }

  message TAppFunctionSpecification {
    string Name = 1;
    string Description = 2;
    string ArgumentSchema = 3;
  }

  message TInvokeAppFunctionDirective {
    string Name = 4;
    string PackageName = 1;
    string FunctionName = 2;
    .google.protobuf.Struct Argument = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAppFunctionsCapability.TParameters Parameters = 2;
  .NAlice.TAppFunctionsCapability.TState State = 3;
}

