syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "CradleProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/cradle;cradlepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TCradleCapability {
  message TParameters {
  }

  message TState {
    repeated string ConnectedCradlesIds = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TCradleCapability Capability = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TCradleCapability.TParameters Parameters = 2;
  .NAlice.TCradleCapability.TState State = 3;
}

