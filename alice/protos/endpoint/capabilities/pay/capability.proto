syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/pay;paypb";

import "google/protobuf/descriptor.proto";
import "alice/protos/data/avatar/avatar.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TPayCapability {
  message TParameters {
  }

  message TState {
  }

  message TVideo {
    string ProviderItemId = 1;
    string Title = 2;
    string ContentType = 3;
    string ViewOptionsType = 4;
    string BillingFeatureName = 5;
    .NAlice.TAvatarMdsImage Poster = 6;
    .NAlice.TAvatarMdsImage Thumbnail = 7;
  }

  message TPurchaseVideoDirective {
    string Name = 1000;
    .NAlice.TPayCapability.TVideo video = 1;
  }

  message TPurchaseSubscriptionDirective {
    enum ETarget {
      GENERAL = 0;
      CHANNELS = 1;
      MUSIC = 2;
      VIDEO = 3;
      SPORT = 4;
    }

    string Name = 1000;
    .NAlice.TPayCapability.TPurchaseSubscriptionDirective.ETarget TargetName = 1;
    repeated string Features = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TPayCapability.TParameters Parameters = 2;
  .NAlice.TPayCapability.TState State = 3;
}

