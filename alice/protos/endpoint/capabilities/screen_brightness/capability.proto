syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "ScreenBrightnessCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/screen_brightness;screen_brightnesspb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TScreenBrightnessCapability {
  message TParameters {
    uint32 MaxBrightnessLevel = 1;
  }

  message TState {
    uint32 BrightnessLevel = 1;
    bool BrightnessAutoModeEnabled = 2;
    bool NoIndication = 3;
  }

  message TSetBrightnessLevelDirective {
    string Name = 1000;
    uint32 BrightnessLevel = 1;
    bool NoIndication = 2;
  }

  message TSetAutoBrightnessDirective {
    string Name = 1000;
    bool AutoBrightnessEnabled = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TScreenBrightnessCapability.TParameters Parameters = 2;
  .NAlice.TScreenBrightnessCapability.TState State = 3;
}

