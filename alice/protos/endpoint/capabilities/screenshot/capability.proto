syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "ScreenshotProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/screenshot;srcinput";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TScreenshotCapability {
  message TParameters {
  }

  message TState {
  }

  message TTakeScreenshotDirective {
    enum EPurpose {
      Undefined = 0;
      ImageSearch = 1;
      AliceVision = 2;
    }

    string Name = 1;
    .NAlice.TScreenshotCapability.TTakeScreenshotDirective.EPurpose Purpose = 2;
    string Query = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TScreenshotCapability.TParameters Parameters = 2;
  .NAlice.TScreenshotCapability.TState State = 3;
}

