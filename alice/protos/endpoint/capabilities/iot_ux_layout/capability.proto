syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotUxLayoutCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_ux_layout;iotuxlayoutpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotUxLayoutCapability {
  message TParameters {
    uint32 MinIndex = 1;
    uint32 MaxIndex = 2;
  }

  message TState {
    uint32 Index = 1;
  }

  message TSetUxLayoutDirective {
    string Name = 1000;
    uint32 Index = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotUxLayoutCapability Capability = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotUxLayoutCapability.TParameters Parameters = 2;
  .NAlice.TIotUxLayoutCapability.TState State = 3;
}

