syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "VideoObjectDetection";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/video_object_detection;video_object_detection";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TVideoObjectDetectionCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TVideoObjectDetectionCapability.EObjectPresenceState ObjectPresenceState = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TVideoObjectDetectionCapability Capability = 1;
  }

  enum EObjectPresenceState {
    OBJECT_PRESENCE_STATE_UNKNOWN = 0;
    OBJECT_PRESENCE_STATE_NOT_PRESENT = 1;
    OBJECT_PRESENCE_STATE_PRESENT = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TVideoObjectDetectionCapability.TParameters Parameters = 2;
  .NAlice.TVideoObjectDetectionCapability.TState State = 3;
}

