syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotCameraPositioningCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_camera_positioning;camerapositioningpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotCameraPositioningCapability {
  message TMovement {
    uint32 Value = 1;
    uint32 Speed = 2;
  }

  message TParameters {
    .NAlice.TIotCameraPositioningCapability.TMovement HorizontalLimit = 1;
    .NAlice.TIotCameraPositioningCapability.TMovement VerticalLimit = 2;
  }

  message TState {
    .NAlice.TIotCameraPositioningCapability.EMovementState MovementState = 1;
  }

  message TMoveCameraRelativeDirective {
    string Name = 1000;
    .NAlice.TIotCameraPositioningCapability.EDirection Direction = 1;
  }

  message TCalibrateCameraDirective {
    string Name = 1000;
  }

  message TMoveCameraToPositionDirective {
    string Name = 1000;
    .NAlice.TIotCameraPositioningCapability.TMovement Movement = 1;
    .NAlice.TIotCameraPositioningCapability.EAxis Axis = 2;
  }

  enum EAxis {
    UnknownAxis = 0;
    HorizontalAxis = 1;
    VerticalAxis = 2;
  }

  enum EDirection {
    UnknownDirection = 0;
    TopDirection = 1;
    RightDirection = 2;
    BottomDirection = 3;
    LeftDirection = 4;
  }

  enum EMovementState {
    MOVEMENT_STATE_UNKNOWN = 0;
    MOVEMENT_STATE_IDLE = 1;
    MOVEMENT_STATE_MOVING = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotCameraPositioningCapability.TParameters Parameters = 2;
  .NAlice.TIotCameraPositioningCapability.TState State = 3;
}

