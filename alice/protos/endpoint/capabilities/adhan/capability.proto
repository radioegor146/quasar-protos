syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AdhanProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/adhan;adhanpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/data/scenario/adhan/adhan.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAdhanCapability {
  message TParameters {
  }

  message TState {
    repeated .NAlice.NData.TAdhan Adhans = 1;
    uint32 SoundLevel = 2;
    .NAlice.NData.TAdhanMuezzinSettings AdhanMuezzinSettings = 3;
    bool CurrentlyPlaying = 4;
  }

  message TAdhanSetSoundLevelDirective {
    string Name = 1000;
    uint32 SoundLevel = 1;
  }

  message TAdhanSetMuezzinSettingsDirective {
    string Name = 1000;
    .NAlice.NData.TAdhanMuezzinSettings AdhanMuezzinSettings = 1;
  }

  message TAdhanAddOrUpdateDirective {
    message TAdhanWithActivationTimes {
      .NAlice.NData.TAdhan Adhan = 1;
      repeated uint64 ActivationTimestamps = 2;
    }

    string Name = 1000;
    repeated .NAlice.TAdhanCapability.TAdhanAddOrUpdateDirective.TAdhanWithActivationTimes AdhansWithActivationTimes = 1;
  }

  message TAdhanRemoveDirective {
    string Name = 1000;
    repeated string AdhanIds = 1;
  }

  message TAdhanUpdateActivationTimesDirective {
    message TAdhanActivationTimes {
      string AdhanId = 1;
      repeated uint64 ActivationTimestamps = 2;
    }

    string Name = 1000;
    repeated .NAlice.TAdhanCapability.TAdhanUpdateActivationTimesDirective.TAdhanActivationTimes AdhansActivationTimes = 1;
  }

  message TAdhanStopDirective {
    string Name = 1000;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAdhanCapability.TParameters Parameters = 2;
  .NAlice.TAdhanCapability.TState State = 3;
}

