syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "VideoPlayerCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/video_player;videoplayerpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TVideoPlayerCapability {
  message TParameters {
    bool UseNativeScreen = 1;
  }

  message TState {
    bool IsTvStreamSupported = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TVideoPlayerCapability.TParameters Parameters = 2;
  .NAlice.TVideoPlayerCapability.TState State = 3;
}

