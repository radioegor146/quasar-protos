syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "DeeplinkCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/deeplink;deeplinkpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TDeeplinkCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TDeeplinkCapability.TSupportedDeeplinks supported = 1;
  }

  message TSupportedDeeplinks {
    repeated string Prefixes = 1;
  }

  message TOpenDeeplinkDirective {
    string Name = 1;
    string Uri = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TDeeplinkCapability.TParameters Parameters = 2;
  .NAlice.TDeeplinkCapability.TState State = 3;
}

