syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "PlayerControlCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/player_control;player_controlpb";

import "google/protobuf/descriptor.proto";
import "google/protobuf/struct.proto";
import "alice/protos/data/music_entities/repeat_mode.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TPlayerControlCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TPlayerControlCapability.TAudioPlayerState AudioPlayerState = 1;
  }

  message TAvailableCommands {
    bool CanPlayNext = 1;
    bool CanPlayPrev = 2;
    bool CanPause = 3;
    bool CanResume = 4;
    bool CanShuffle = 5;
    bool CanUnshuffle = 6;
    bool CanRepeat = 7;
    bool CanReplay = 8;
    bool CanRewind = 9;
    bool CanFastForward = 10;
    bool CanLike = 11;
    bool CanDislike = 12;
    bool CanUndoLike = 13;
    bool CanUndoDislike = 14;
  }

  message TDuration {
    message TUnlimited {
    }

    message TUnavailable {
    }

    message TExact {
      double DurationSec = 1;
    }

    oneof Duration {
      .NAlice.TPlayerControlCapability.TDuration.TUnlimited Unlimited = 1;
      .NAlice.TPlayerControlCapability.TDuration.TUnavailable Unavailable = 2;
      .NAlice.TPlayerControlCapability.TDuration.TExact Exact = 3;
    }
  }

  message TStreamInfo {
    .NAlice.TPlayerControlCapability.TDuration Duration = 1;
    string Title = 2;
    repeated string Artists = 3;
  }

  message TShuffleInfo {
    oneof Shuffled {
      bool IsShuffled = 1;
      uint64 ShuffleSeed = 2;
    }
  }

  message TPlaybackInfo {
    double PositionSec = 1;
    .NAlice.TPlayerControlCapability.TShuffleInfo ShuffleInfo = 2;
    .NAlice.NData.ERepeatMode RepeatMode = 3;
  }

  message TPlayingState {
    message TPlaying {
      .NAlice.TPlayerControlCapability.TStreamInfo StreamInfo = 1;
      .NAlice.TPlayerControlCapability.TPlaybackInfo PlaybackInfo = 2;
    }

    message TPaused {
      .NAlice.TPlayerControlCapability.TStreamInfo StreamInfo = 1;
      .NAlice.TPlayerControlCapability.TPlaybackInfo PlaybackInfo = 2;
    }

    message TBuffering {
      .NAlice.TPlayerControlCapability.TStreamInfo StreamInfo = 1;
      .NAlice.TPlayerControlCapability.TPlaybackInfo PlaybackInfo = 2;
    }

    message TStopped {
    }

    message TFinished {
    }

    oneof PlayingState {
      .NAlice.TPlayerControlCapability.TPlayingState.TPlaying Playing = 1;
      .NAlice.TPlayerControlCapability.TPlayingState.TPaused Paused = 2;
      .NAlice.TPlayerControlCapability.TPlayingState.TBuffering Buffering = 3;
      .NAlice.TPlayerControlCapability.TPlayingState.TStopped Stopped = 4;
      .NAlice.TPlayerControlCapability.TPlayingState.TFinished Finished = 5;
    }
  }

  message TAudioPlayerState {
    .NAlice.TPlayerControlCapability.TPlayingState PlayingState = 1;
    .NAlice.TPlayerControlCapability.TAvailableCommands AvailableCommands = 2;
  }

  message TPlayerControlPlayDirective {
    message TPlayerMeta {
      message TYandexMusicSDK {
        .google.protobuf.Struct PlaybackRequest = 1;
      }

      oneof Meta {
        .NAlice.TPlayerControlCapability.TPlayerControlPlayDirective.TPlayerMeta.TYandexMusicSDK YandexMusicSDK = 1;
      }
    }

    string Name = 1;
    .NAlice.TPlayerControlCapability.TPlayerControlPlayDirective.TPlayerMeta PlayerMeta = 2;
  }

  message TPlayerControlNextTrackDirective {
    string Name = 1;
  }

  message TPlayerControlPrevTrackDirective {
    string Name = 1;
  }

  message TPlayerControlPauseDirective {
    string Name = 1;
  }

  message TPlayerControlResumeDirective {
    string Name = 1;
  }

  message TPlayerControlShuffleDirective {
    string Name = 1;
  }

  message TPlayerControlUnshuffleDirective {
    string Name = 1;
  }

  message TPlayerControlRepeatDirective {
    string Name = 1;
  }

  message TPlayerControlReplayDirective {
    string Name = 1;
  }

  message TPlayerControlRewindDirective {
    string Name = 1;
    double IntervalSec = 2;
  }

  message TPlayerControlFastForwardDirective {
    string Name = 1;
    double IntervalSec = 2;
  }

  message TPlayerControlLikeDirective {
    string Name = 1;
  }

  message TPlayerControlDislikeDirective {
    string Name = 1;
  }

  message TPlayerControlUndoLikeDirective {
    string Name = 1;
  }

  message TPlayerControlUndoDislikeDirective {
    string Name = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TPlayerControlCapability.TParameters Parameters = 2;
  .NAlice.TPlayerControlCapability.TState State = 3;
}

