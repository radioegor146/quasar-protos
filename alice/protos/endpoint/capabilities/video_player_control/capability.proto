syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "VideoPlayerControlCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/video_player_control;videoplayercontrolpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/data/video/video_track.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TVideoPlayerControlCapability {
  message TParameters {
  }

  message TState {
    repeated .NAlice.TTrackVariant VideoTrack = 1;
    repeated .NAlice.TTrackVariant AudioTrack = 2;
    repeated .NAlice.TTrackVariant SubtitlesTrack = 3;
    bool IsAdvertisementPlaying = 4;
    double PlaybackSpeed = 5;
  }

  message TChangeVideoPlayerTrackDirective {
    .NAlice.ETrackType Type = 1;
    string TrackId = 2;
    string Name = 3;
  }

  message TShowVideoPlayerTrackSettingsDirective {
    .NAlice.ETrackType Type = 1;
    string Name = 2;
  }

  message TVideoSkipAdvertisementDirective {
    string Name = 1;
  }

  message TCancelAutoskipDirective {
    string Name = 1;
  }

  message TVideoSetSpeedLevelDirective {
    string Name = 2;
    optional double PlaybackSpeed = 1;
  }

  message TSetFullScreenModeDirective {
    string Name = 2;
    bool Enabled = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TVideoPlayerControlCapability.TParameters Parameters = 2;
  .NAlice.TVideoPlayerControlCapability.TState State = 3;
}

