syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "TvUpdateCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/tv_update;tvupdatepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TTvUpdateCapability {
  message TParameters {
  }

  message TState {
  }

  message TInstallTvUpdateDirective {
    string Name = 1;
  }

  message TDownloadTvUpdateDirective {
    string Name = 1;
  }

  message THideTvUpdateDirective {
    string Name = 1;
  }

  message TRetryTvUpdateDirective {
    string Name = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TTvUpdateCapability.TParameters Parameters = 2;
  .NAlice.TTvUpdateCapability.TState State = 3;
}

