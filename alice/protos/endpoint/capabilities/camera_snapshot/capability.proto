syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "CameraSnapshotCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/camera_snapshot;camera_snapshotpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TCameraSnapshotCapability {
  message TParameters {
  }

  message TState {
  }

  message TSendDataInput {
    string InteractionId = 1;
  }

  message TTakePictureDirective {
    .NAlice.TCameraSnapshotCapability.EFormat Format = 1;
    oneof Action {
      .NAlice.TCameraSnapshotCapability.TSendDataInput SendDataInput = 10;
    }
    optional int32 QualityLevel = 2;
    optional uint32 Width = 3;
    optional uint32 Height = 4;
  }

  enum EFormat {
    FMT_UNKNOWN = 0;
    FMT_JPEG = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TCameraSnapshotCapability.TParameters Parameters = 2;
  .NAlice.TCameraSnapshotCapability.TState State = 3;
}

