syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AutomotiveInstrumentPanelCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/automotive_instrument_panel;automotive_instrument_panelpb";

import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAutomotiveInstrumentPanelCapability {
  message TParameters {
    message TPropertyConfigParameters {
      .NAlice.TAutomotiveInstrumentPanelCapability.EPropertyId PropertyId = 1;
      .NAlice.TAutomotiveInstrumentPanelCapability.TVehiclePropertyValueBounds PropertyValueBounds = 2;
    }

    repeated .NAlice.TAutomotiveInstrumentPanelCapability.TParameters.TPropertyConfigParameters PropertyConfigParameters = 1;
  }

  message TState {
    repeated .NAlice.TAutomotiveInstrumentPanelCapability.TVehiclePropertyState VehiclePropertyStates = 2;
  }

  message TVehiclePropertyState {
    .NAlice.TAutomotiveInstrumentPanelCapability.EPropertyId PropertyId = 1;
    .NAlice.TAutomotiveInstrumentPanelCapability.TVehiclePropertyValue GlobalStateValue = 2;
  }

  message TVehiclePropertyValue {
    message TIntValue {
      int32 Value = 1;
    }

    oneof ValueType {
      .NAlice.TAutomotiveInstrumentPanelCapability.TVehiclePropertyValue.TIntValue IntValue = 1;
    }
  }

  message TVehiclePropertyValueBounds {
    message IntValueBounds {
      int32 Min = 1;
      int32 Max = 2;
    }

    oneof ValueType {
      .NAlice.TAutomotiveInstrumentPanelCapability.TVehiclePropertyValueBounds.IntValueBounds IntValue = 1;
    }
  }

  message TSetInstrumentPanelBrightnessDirective {
    string Name = 1000;
    int32 Brightness = 1;
  }

  enum EPropertyId {
    Unknown = 0;
    InstrumentPanelBrightness = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAutomotiveInstrumentPanelCapability.TParameters Parameters = 2;
  .NAlice.TAutomotiveInstrumentPanelCapability.TState State = 3;
}

