syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "InformersCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/informers;informerspb";

import "google/protobuf/descriptor.proto";
import "alice/protos/data/scenario/weather/weather.proto";
import "alice/protos/data/timezone.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TInformersCapability {
  message TParameters {
  }

  message TState {
  }

  message TUpdateInformerDirective {
    string Name = 1000;
    oneof InformerState {
      .NAlice.TInformersCapability.TReminderInformerState ReminderInformerState = 1;
      .NAlice.TInformersCapability.TWeatherInformerState WeatherInformerState = 2;
    }
  }

  message TUpdateAllInformersDirective {
    string Name = 1000;
    .NAlice.TInformersCapability.TReminderInformerState ReminderInformerState = 1;
    .NAlice.TInformersCapability.TWeatherInformerState WeatherInformerState = 2;
  }

  message TReminderInformerState {
    string ReminderText = 1;
    uint64 ReminderDate = 2;
    uint32 RemindersCounter = 3;
    .NAlice.NData.TDateTime ShootAt = 4;
  }

  message TWeatherInformerState {
    string Degrees = 1;
    string Icon = 2;
    double Temperature = 3;
    string IconType = 5;
    .NAlice.NData.TWeatherCondition Condition = 6;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TInformersCapability.TParameters Parameters = 2;
  .NAlice.TInformersCapability.TState State = 3;
}

