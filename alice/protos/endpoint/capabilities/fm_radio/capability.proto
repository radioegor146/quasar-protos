syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "FmRadioCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/fm_radio;fm_radiopb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TFmRadioCapability {
  message TParameters {
  }

  message TState {
    repeated .NAlice.TFmRadioCapability.TFmRadioStation AvailableFmRadioStations = 1;
  }

  message TFmRadioStation {
    int32 FrequencyMhzX100 = 1;
    string Name = 2;
    bool IsFavorite = 3;
    string Id = 4;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TFmRadioCapability.TParameters Parameters = 2;
  .NAlice.TFmRadioCapability.TState State = 3;
}

