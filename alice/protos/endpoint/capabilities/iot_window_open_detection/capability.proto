syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotWindowOpenDetectionCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_window_open_detection;iotwindowopendetectionpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotWindowOpenDetectionCapability {
  message TParameters {
  }

  message TState {
    bool Enable = 1;
    bool IsOpen = 2;
  }

  message TSetIotWindowOpenDetectionDirective {
    string Name = 1000;
    bool Enable = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotWindowOpenDetectionCapability Capability = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotWindowOpenDetectionCapability.TParameters Parameters = 2;
  .NAlice.TIotWindowOpenDetectionCapability.TState State = 3;
}

