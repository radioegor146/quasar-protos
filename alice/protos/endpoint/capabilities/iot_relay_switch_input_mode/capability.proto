syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotRelaySwitchInputModeCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_relay_switch_input_mode;iotrelayswitchinputmodepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotRelaySwitchInputModeCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TIotRelaySwitchInputModeCapability.EMode Mode = 1;
  }

  message TSetModeDirective {
    string Name = 1000;
    .NAlice.TIotRelaySwitchInputModeCapability.EMode Mode = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotRelaySwitchInputModeCapability Capability = 1;
  }

  enum EMode {
    Undefined = 0;
    Native = 1;
    Pulse = 2;
    PulseWireless = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotRelaySwitchInputModeCapability.TParameters Parameters = 2;
  .NAlice.TIotRelaySwitchInputModeCapability.TState State = 3;
}

