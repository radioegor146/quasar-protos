syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "WaterLeakSensorProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/water_leak_sensor;waterleaksensorpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/endpoint/events/events.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TWaterLeakSensorCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TTypedCapabilityEvent LastEvent = 1;
  }

  message TResetLeakDirective {
    string Name = 1000;
  }

  message TTriggerLeakDirective {
    string Name = 1000;
  }

  message TWaterLeakSensorLeakEvent {
  }

  message TWaterLeakSensorDryEvent {
  }

  message TCondition {
    repeated .NAlice.TCapability.EEventType Events = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TWaterLeakSensorCapability.TParameters Parameters = 2;
  .NAlice.TWaterLeakSensorCapability.TState State = 3;
}

