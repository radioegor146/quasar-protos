syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotZigbeeNodeCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_zigbee_node;iotzigbeenodepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotZigbeeNodeCapability {
  message TParameters {
    .NAlice.TIotZigbeeNodeCapability.TType Type = 1;
  }

  message TSignalQuality {
    .NAlice.TIotZigbeeNodeCapability.ESignalQualityStatus SignalQualityStatus = 1;
    uint32 Lqi = 2;
    int32 Rssi = 3;
  }

  message TState {
    .NAlice.TIotZigbeeNodeCapability.TSignalQuality SignalQuality = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotZigbeeNodeCapability Capability = 1;
  }

  enum TType {
    UNKNOWN = 0;
    ROUTER = 1;
    END_DEVICE = 2;
  }

  enum ESignalQualityStatus {
    Unknown = 0;
    Bad = 1;
    Weak = 2;
    Ok = 3;
    Good = 4;
    Excellent = 5;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotZigbeeNodeCapability.TParameters Parameters = 2;
  .NAlice.TIotZigbeeNodeCapability.TState State = 3;
}

