syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "DivViewProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/div_view;divviewpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";
import "alice/protos/div/div2id.proto";
import "alice/protos/div/div_external_variable_sources.proto";

message TDivViewCapability {
  message TParameters {
    enum EUIFamily {
      Unknown = 0;
      SmartScreen = 1;
      TV = 2;
      CloudUI = 3;
      SearchApp = 4;
      WebTouch = 5;
      WebDesktop = 6;
      YabroDesktop = 7;
      WebStandaloneDesktop = 8;
      WebStandaloneTouch = 9;
      AliceApp = 10;
    }

    enum EDivKitFeature {
      TextCenteringDivKit39Fix = 0;
    }

    bool SupportsStringDiv2Card = 1;
    bool SupportsCardStashing = 2;
    .NAlice.TDivViewCapability.TParameters.EUIFamily UIFamily = 3;
    repeated .NAlice.TDivViewCapability.TParameters.EDivKitFeature DivKitFeatures = 4;
    repeated .NAlice.TDivExternalVariable.ESourceType availableExternalSources = 5;
  }

  message TState {
    repeated string GlobalTemplatesCache = 1;
  }

  message TStashViewDirective {
    string Name = 1;
    .NAlice.TDiv2Id CardSearchCriteria = 2;
  }

  message TUnstashViewDirective {
    string Name = 1;
    .NAlice.TDiv2Id CardSearchCriteria = 2;
  }

  message TSetDivVariablesDirective {
    message TSetVariable {
      enum EVariableType {
        Global = 0;
        Local = 1;
        Mixed = 2;
      }

      string VariableName = 4;
      .NAlice.TDivViewCapability.TSetDivVariablesDirective.TSetVariable.EVariableType VariableType = 5;
      oneof SetVariable {
        bool BoolValue = 1;
        string StringValue = 2;
        int64 LongValue = 3;
      }
    }

    string Name = 1;
    repeated .NAlice.TDivViewCapability.TSetDivVariablesDirective.TSetVariable SetVariable = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TDivViewCapability.TParameters Parameters = 2;
  .NAlice.TDivViewCapability.TState State = 3;
}

