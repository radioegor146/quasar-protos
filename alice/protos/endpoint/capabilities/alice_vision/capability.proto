syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AliceVisionCapabilitiesProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/alice_vision;alicevisionpb";

import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAliceVisionCapability {
  message TParameters {
  }

  message TState {
    enum ECameraState {
      Undefined = 0;
      Off = 1;
      On = 2;
    }

    .NAlice.TAliceVisionCapability.TState.ECameraState CameraState = 1;
  }

  message TSendVideoFrameCallbackDirective {
    string Name = 1000;
    string Query = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAliceVisionCapability.TParameters Parameters = 2;
  .NAlice.TAliceVisionCapability.TState State = 3;
}

