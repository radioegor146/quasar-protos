syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotPowerProfileCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_power_profile;iotpowerprofilepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotPowerProfileCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TIotPowerProfileCapability.EProfile Profile = 1;
  }

  message TSetProfileDirective {
    string Name = 1000;
    .NAlice.TIotPowerProfileCapability.EProfile Profile = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotPowerProfileCapability Capability = 1;
  }

  enum EProfile {
    Undefined = 0;
    FullPower = 1;
    NormalPower = 2;
    SavingPower = 3;
    FullPowerDetectedByHw = 4;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotPowerProfileCapability.TParameters Parameters = 2;
  .NAlice.TIotPowerProfileCapability.TState State = 3;
}

