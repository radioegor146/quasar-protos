syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "BuzzerCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/buzzer;buzzerpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TBuzzerCapability {
  message TParameters {
    repeated .NAlice.TBuzzerCapability.ESoundFormat SupportedSoundFormats = 1;
  }

  message TState {
  }

  message TSound {
    oneof Sound {
      bytes Midi = 1;
    }
  }

  message TPlayDirective {
    string Name = 1000;
    .NAlice.TBuzzerCapability.TSound Sound = 1;
  }

  enum ESoundFormat {
    Unknown = 0;
    Midi = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TBuzzerCapability.TParameters Parameters = 2;
  .NAlice.TBuzzerCapability.TState State = 3;
}

