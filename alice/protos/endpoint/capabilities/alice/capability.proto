syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AliceCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/alice;alicepb";

import "alice/protos/api/alicekit/annotations/annotations.proto";
import "alice/protos/api/alicekit/cards/card.proto";
import "alice/protos/api/alicekit/client/alice_request/alice_request.proto";
import "alice/protos/api/alicekit/directives/directive.proto";
import "alice/protos/api/alicekit/suggests/suggest.proto";
import "alice/protos/api/alice_mode_info/alice_mode_info.proto";
import "alice/protos/api/speech_mode/mode/speech_mode.proto";
import "alice/protos/data/connection/connection.proto";
import "alice/protos/data/dialog_state/dialog_state.proto";
import "alice/protos/data/tts_interruption_timings/tts_interruption_timings.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAliceCapability {
  message TBlocker {
    string Id = 1;
  }

  message TParameters {
  }

  message TSpeechState {
    message TListening {
      float VoicePower = 1;
      optional string Text = 2;
    }

    message TThinking {
    }

    message TSpeaking {
    }

    message TIdle {
    }

    .NAlice.TSpeechMode SpeechMode = 4;
    oneof State {
      .NAlice.TAliceCapability.TSpeechState.TListening Listening = 1;
      .NAlice.TAliceCapability.TSpeechState.TThinking Thinking = 2;
      .NAlice.TAliceCapability.TSpeechState.TSpeaking Speaking = 3;
      .NAlice.TAliceCapability.TSpeechState.TIdle Idle = 5;
    }
  }

  message TAliceState {
    message TRequestState {
      message TFileDescription {
        optional string Guid = 1;
      }

      bool IsRecognitionStarted = 2;
      bool IsFinal = 3;
      repeated .NAlice.TAliceCapability.TAliceState.TRequestState.TFileDescription Files = 4;
      optional string Text = 1;
    }

    message TResponseState {
      message TRequestRef {
        string RequestId = 1;
      }

      bool IsFinal = 1;
      bool IsCanceled = 2;
      repeated .NAlice.NAliceApi.TCard Cards = 4;
      repeated .NAlice.NAliceApi.TSuggest Suggests = 5;
      .NAlice.NAliceApi.TRequestAnnotation RequestAnnotation = 6;
      .NAlice.NApi.NAlice2Mode.TAlice2ModeInfo Alice2ModeInfo = 7;
      .NAlice.NApi.NAlice2Mode.TAlice2TrialState Alice2TrialState = 8;
      .NAlice.TAliceCapability.TAliceState.TResponseState.TRequestRef RequestRef = 9;
      optional string Text = 3;
    }

    message TActiveRequest {
      string RequestId = 1;
      .NAlice.TAliceCapability.TAliceState.TRequestState RequestState = 3;
      .NAlice.TAliceCapability.TAliceState.TResponseState ResponseState = 4;
      optional string DialogId = 2;
    }

    message TListening {
      float VoicePower = 1;
    }

    message TThinking {
    }

    message TSpeaking {
    }

    message TIdle {
    }

    message TResponding {
      .NAlice.TAliceCapability.TAliceState.TSpeaking Speaking = 1;
    }

    .NAlice.TAliceCapability.TAliceState.TActiveRequest ActiveRequest = 5;
    .NAlice.TDialogState ActiveDialog = 6;
    oneof State {
      .NAlice.TAliceCapability.TAliceState.TListening Listening = 1;
      .NAlice.TAliceCapability.TAliceState.TThinking Thinking = 2;
      .NAlice.TAliceCapability.TAliceState.TSpeaking Speaking = 3;
      .NAlice.TAliceCapability.TAliceState.TIdle Idle = 4;
      .NAlice.TAliceCapability.TAliceState.TResponding Responding = 7;
    }
  }

  message TJingleState {
    bool JingleEnabled = 1;
  }

  message TState {
    enum ETtsState {
      UnknownTtsState = 0;
      NoActiveTts = 1;
      ActiveTts = 2;
    }

    .NAlice.TTtsInterruptionTimings TtsInterruptionTimings = 1;
    repeated .NAlice.TAliceCapability.TBlocker Blockers = 3;
    .NAlice.TConnectionStatus ConnectionStatus = 5;
    .NAlice.TAliceCapability.TSpeechState SpeechState = 6;
    .NAlice.TAliceCapability.TAliceState AliceState = 7;
    optional string Uuid = 2;
    optional .NAlice.TAliceCapability.TState.ETtsState TtsState = 4;
  }

  message TGetEnvironmentStateOptions {
    bool IncludeLocalEndpoints = 1;
    bool IncludeEmbeddedEndpoints = 2;
    bool IncludeRemoteEndpoints = 3;
  }

  message TBlockDirective {
    string Name = 1000;
    .NAlice.TAliceCapability.TBlocker Blocker = 1;
  }

  message TUnblockDirective {
    string Name = 1000;
    .NAlice.TAliceCapability.TBlocker Blocker = 1;
  }

  message TUpdateTtsPlaceholderDirective {
    message TaggedDirective {
      string Tag = 1;
      .NAlice.NAliceApi.TDirective Directive = 2;
    }

    string Name = 1000;
    repeated .NAlice.TAliceCapability.TUpdateTtsPlaceholderDirective.TaggedDirective TaggedDirectives = 1;
  }

  message TVocalizeDirective {
    enum ESynthesisMode {
      Unknown = 0;
      Append = 1;
      Interrupt = 2;
    }

    optional string Text = 1;
    optional .NAlice.TAliceCapability.TVocalizeDirective.ESynthesisMode SynthesisMode = 2;
  }

  message TStartVoiceInputDirective {
    .NAlice.NAliceApi.TVoiceInput VoiceInput = 1;
  }

  message TStopConversationDirective {
    message TClientOptions {
      bool DisableJingle = 1;
      bool DisableSendCancel = 2;
    }

    .NAlice.TAliceCapability.TStopConversationDirective.TClientOptions ClientOptions = 1;
  }

  message TStartTextInputDirective {
    .NAlice.NAliceApi.TTextInput TextInput = 1;
  }

  message TSetActiveDialogDirective {
    .NAlice.TDialogState DialogState = 1;
  }

  message TCompleteStreamingResponseDirective {
    string RequestId = 1;
  }

  message TCompleteTtsResponseDirective {
  }

  message TStartSpeechInputDirective {
    string Name = 1000;
    .NAlice.NAliceApi.TSpeechInput SpeechInput = 1;
  }

  message TStartRecordInputDirective {
  }

  message TSetJingleStateDirective {
    .NAlice.TAliceCapability.TJingleState JingleState = 1;
  }

  message TStartDataInputDirective {
    .NAlice.TAliceCapability.TGetEnvironmentStateOptions GetEnvironmentStateOptions = 2;
    optional string InteractionId = 1;
  }

  message TRequestErrorEvent {
    message TBlockError {
      repeated .NAlice.TAliceCapability.TBlocker Blockers = 1;
    }

    message TServerError {
    }

    message TNetworkError {
    }

    message TDeviceNotReadyError {
    }

    message TTimeoutError {
    }

    message TAudioError {
    }

    message TInterruptedError {
    }

    message TSpottingRejectedError {
    }

    message TNoSpeechDetectedError {
    }

    string RequestId = 10;
    oneof Error {
      .NAlice.TAliceCapability.TRequestErrorEvent.TBlockError BlockError = 1;
      .NAlice.TAliceCapability.TRequestErrorEvent.TServerError ServerError = 2;
      .NAlice.TAliceCapability.TRequestErrorEvent.TNetworkError NetworkError = 3;
      .NAlice.TAliceCapability.TRequestErrorEvent.TDeviceNotReadyError DeviceNotReadyError = 4;
      .NAlice.TAliceCapability.TRequestErrorEvent.TTimeoutError TimeoutError = 5;
      .NAlice.TAliceCapability.TRequestErrorEvent.TAudioError AudioError = 6;
      .NAlice.TAliceCapability.TRequestErrorEvent.TInterruptedError InterruptedError = 7;
      .NAlice.TAliceCapability.TRequestErrorEvent.TSpottingRejectedError SpottingRejectedError = 8;
      .NAlice.TAliceCapability.TRequestErrorEvent.TNoSpeechDetectedError NoSpeechDetectedError = 9;
    }
    optional string Text = 11;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAliceCapability.TParameters Parameters = 2;
  .NAlice.TAliceCapability.TState State = 3;
}

