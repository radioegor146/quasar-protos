syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "HybridAsrProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/hybrid_asr;hybrid_asrpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message THybridAsrCapability {
  message TParameters {
    optional bool EnabledHybridAsr = 1;
    optional string LingwareVersion = 2;
    optional string LingwareHash = 3;
    optional string DeviceType = 4;
    optional bool UltimatelyEnabledHybridAsr = 5;
  }

  message TState {
    repeated string PreparedHybridPartials = 1;
  }

  message TRecognitionResultEvent {
    string Partial = 1;
    bool EndOfUtterance = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.THybridAsrCapability.TParameters Parameters = 2;
  .NAlice.THybridAsrCapability.TState State = 3;
}

