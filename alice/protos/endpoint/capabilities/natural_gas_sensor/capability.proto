syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "NaturalGasSensorProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/natural_gas_sensor;naturalgassensorpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/endpoint/events/events.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TNaturalGasSensorCapability {
  message TParameters {
  }

  message TState {
    .NAlice.TTypedCapabilityEvent LastEvent = 1;
  }

  message TNaturalGasSensorDetectedEvent {
  }

  message TNaturalGasSensorNotDetectedEvent {
  }

  message TNaturalGasSensorHighEvent {
  }

  message TCondition {
    repeated .NAlice.TCapability.EEventType Events = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TNaturalGasSensorCapability.TParameters Parameters = 2;
  .NAlice.TNaturalGasSensorCapability.TState State = 3;
}

