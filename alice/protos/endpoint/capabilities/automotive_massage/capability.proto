syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AutomotiveMassageCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/automotive_massage;automotive_massagepb";

import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAutomotiveMassageCapability {
  message TParameters {
    message TPropertyConfigParameters {
      .NAlice.TAutomotiveMassageCapability.EPropertyId PropertyId = 1;
      repeated .NAlice.TAutomotiveMassageCapability.TVehicleArea SupportedAreas = 2;
      .NAlice.TAutomotiveMassageCapability.TVehiclePropertyValueBounds PropertyValueBounds = 3;
    }

    repeated .NAlice.TAutomotiveMassageCapability.TParameters.TPropertyConfigParameters PropertyConfigParameters = 1;
    repeated .NAlice.TAutomotiveMassageCapability.TInfoProperty InfoProperties = 2;
  }

  message TState {
    repeated .NAlice.TAutomotiveMassageCapability.TVehiclePropertyState VehiclePropertyStates = 1;
  }

  message TInfoPropertyValue {
    oneof ValueType {
      .NAlice.TAutomotiveMassageCapability.EVehicleAreaSeat Seat = 1;
    }
  }

  message TInfoProperty {
    .NAlice.TAutomotiveMassageCapability.EInfoPropertyId InfoPropertyId = 1;
    .NAlice.TAutomotiveMassageCapability.TInfoPropertyValue InfoPropertyValue = 2;
  }

  message TVehicleArea {
    oneof VehicleArea {
      .NAlice.TAutomotiveMassageCapability.EVehicleAreaSeat Seat = 1;
    }
  }

  message TVehiclePropertyValueBounds {
    message IntValueBounds {
      int32 Min = 1;
      int32 Max = 2;
    }

    oneof ValueType {
      .NAlice.TAutomotiveMassageCapability.TVehiclePropertyValueBounds.IntValueBounds IntValue = 1;
    }
  }

  message TVehiclePropertyValue {
    message TIntValue {
      int32 Value = 1;
    }

    message TBoolValue {
      bool Value = 1;
    }

    oneof ValueType {
      .NAlice.TAutomotiveMassageCapability.TVehiclePropertyValue.TIntValue IntValue = 1;
      .NAlice.TAutomotiveMassageCapability.TVehiclePropertyValue.TBoolValue BoolValue = 2;
    }
  }

  message TVehiclePropertyState {
    message TStateByArea {
      .NAlice.TAutomotiveMassageCapability.TVehicleArea Area = 1;
      .NAlice.TAutomotiveMassageCapability.TVehiclePropertyValue Value = 2;
    }

    .NAlice.TAutomotiveMassageCapability.EPropertyId PropertyId = 1;
    repeated .NAlice.TAutomotiveMassageCapability.TVehiclePropertyState.TStateByArea StateByAreas = 2;
    .NAlice.TAutomotiveMassageCapability.TVehiclePropertyValue GlobalStateValue = 3;
  }

  message TSetMassageSeatSpeedDirective {
    message TSeatSpeedState {
      .NAlice.TAutomotiveMassageCapability.EVehicleAreaSeat Seat = 1;
      int32 Speed = 2;
    }

    string Name = 1000;
    repeated .NAlice.TAutomotiveMassageCapability.TSetMassageSeatSpeedDirective.TSeatSpeedState SeatSpeedStates = 1;
  }

  message TSetMassageModeDirective {
    reserved "Mode";
    reserved 1;
    message TSeatMassageModeState {
      .NAlice.TAutomotiveMassageCapability.EVehicleAreaSeat Seat = 1;
      .NAlice.TAutomotiveMassageCapability.TSetMassageModeDirective.EMassageMode Mode = 2;
    }

    enum EMassageMode {
      MassageModeUnknown = 0;
      MassageModeWave = 1;
      MassageModePoint = 2;
      MassageModeNeck = 3;
      MassageModeWaist = 4;
      MassageModeShoulders = 5;
    }

    string Name = 1000;
    repeated .NAlice.TAutomotiveMassageCapability.TSetMassageModeDirective.TSeatMassageModeState SeatMassageModeStates = 2;
  }

  enum EInfoPropertyId {
    InfoPropertyUnknown = 0;
    InfoDriverSeat = 1;
  }

  enum EVehicleAreaSeat {
    SeatUnknown = 0;
    SeatRow1Left = 1;
    SeatRow1Center = 2;
    SeatRow1Right = 3;
    SeatRow2Left = 4;
    SeatRow2Center = 5;
    SeatRow2Right = 6;
    SeatRow3Left = 7;
    SeatRow3Center = 8;
    SeatRow3Right = 9;
  }

  enum EPropertyId {
    PropertyUnknown = 0;
    MassageSeatSpeed = 1;
    MassageSeatMode = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAutomotiveMassageCapability.TParameters Parameters = 2;
  .NAlice.TAutomotiveMassageCapability.TState State = 3;
}

