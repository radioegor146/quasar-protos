syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "CategoryCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/category;categorypb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TCategoryCapability {
  message TParameters {
  }

  message TState {
    repeated .NAlice.TCategoryCapability.Category Categories = 1;
    optional .NAlice.TCategoryCapability.Category CurrentCategory = 2;
    optional bool IsCategoriesVisible = 3;
  }

  message Category {
    string CategoryId = 1;
    optional string CategoryName = 2;
  }

  message TOpenCategoryDirective {
    string Name = 1000;
    string CategoryId = 1;
  }

  message TShowTvCategoriesDirective {
    string Name = 1000;
  }

  message THideTvCategoriesDirective {
    string Name = 1000;
  }

  message TShowWhatYouCanDirective {
    string Name = 1000;
    string VideoUrl = 1;
    string PlaceholderUrl = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TCategoryCapability.TParameters Parameters = 2;
  .NAlice.TCategoryCapability.TState State = 3;
}

