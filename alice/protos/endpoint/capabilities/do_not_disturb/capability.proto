syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "DoNotDisturbProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/do_not_disturb;do_not_disturbpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TDoNotDisturbCapability {
  message TParameters {
  }

  message TFeatures {
    bool AllowIncomingCalls = 1;
  }

  message TState {
    bool IsDoNotDisturbEnabled = 1;
    .NAlice.TDoNotDisturbCapability.TFeatures Features = 2;
  }

  message TSetDoNotDisturbStateDirective {
    enum EForceDoNotDisturbState {
      NoForceState = 0;
      ForceDisable = 1;
      ForceEnable = 2;
    }

    string Name = 1000;
    .NAlice.TDoNotDisturbCapability.TSetDoNotDisturbStateDirective.EForceDoNotDisturbState ForceDoNotDisturbState = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TDoNotDisturbCapability.TParameters Parameters = 2;
  .NAlice.TDoNotDisturbCapability.TState State = 3;
}

