syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AndroidSettingsCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/android_settings;androidsettingspb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAndroidSettingsCapability {
  message TParameters {
    bool ExtendedSettingsDuringPlayback = 1;
  }

  message TState {
    reserved "AvailableCategories";
    reserved "PlaybackActive";
    reserved 1;
    reserved 2;
    repeated .NAlice.TAndroidSettingsCapability.ECategory EnabledCategories = 3;
  }

  message TOpenAndroidSettingsDirective {
    .NAlice.TAndroidSettingsCapability.ECategory Category = 1;
    string Name = 1000;
  }

  enum ECategory {
    UNKNOWN = 0;
    MAIN = 1;
    WIFI = 2;
    DISPLAY = 3;
    FAST_WAKEUP = 4;
    ACCOUNT = 5;
    MANAGEMENT = 6;
    BLUETOOTH = 7;
    SOUND = 8;
    SUPPORT = 9;
    PARENT_CONTROL = 10;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAndroidSettingsCapability.TParameters Parameters = 2;
  .NAlice.TAndroidSettingsCapability.TState State = 3;
}

