syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "IotInterlockCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/iot_interlock;iotinterlockpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TIotInterlockCapability {
  message TParameters {
  }

  message TState {
    bool Value = 1;
  }

  message TSetIotInterlockDirective {
    string Name = 1000;
    bool Value = 1;
  }

  message TUpdateStateEvent {
    .NAlice.TIotInterlockCapability Capability = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TIotInterlockCapability.TParameters Parameters = 2;
  .NAlice.TIotInterlockCapability.TState State = 3;
}

