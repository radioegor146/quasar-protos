syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "AliceChatProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/alice_chat;alicechatpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/api/alicekit/directives/directive.proto";
import "alice/protos/api/alice_mode_info/alice_mode_info.proto";
import "alice/protos/div/div2card.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TAliceChatCapability {
  message TParameters {
  }

  message TState {
  }

  message TFillChatInputDirective {
    string Name = 1;
    string Text = 2;
  }

  message TShowProPurchaseScreenDirective {
    string Name = 1;
  }

  message TShowFullscreenImageGalleryDirective {
    message TButton {
      string Title = 1;
      string IconUrl = 2;
      bool IsEnabled = 4;
      .NAlice.NAliceApi.TDirective Directive = 3;
    }

    message TImage {
      string ImageUrl = 1;
      repeated .NAlice.TAliceChatCapability.TShowFullscreenImageGalleryDirective.TButton Buttons = 2;
    }

    string Name = 1;
    uint32 CurrentImage = 2;
    repeated .NAlice.TAliceChatCapability.TShowFullscreenImageGalleryDirective.TImage Images = 3;
  }

  message TZoomImageDirective {
    string Name = 1;
    int32 Step = 2;
  }

  message TDownloadImageDirective {
    string Name = 1;
    string ImageUrl = 2;
  }

  message TShareImageDirective {
    string Name = 1;
    string ImageUrl = 2;
  }

  message TShowPromoScreenDirective {
    string Name = 1;
    string PromoId = 2;
  }

  message TSetChatRequestModeDirective {
    string Name = 1;
    .NAlice.NApi.NAlice2Mode.TAlice2ModeInfo.EMode Mode = 2;
    .NAlice.NApi.NAlice2Mode.TAlice2ModeInfo RequestModeInfo = 3;
    string Id = 4;
  }

  message TAddChatDiv2CardDirective {
    message TRenderRequestParams {
      string CardId = 1;
    }

    string Name = 1;
    string DialogId = 4;
    oneof DivCard {
      .NAlice.TDiv2Card Div2Card = 2;
      .NAlice.TAliceChatCapability.TAddChatDiv2CardDirective.TRenderRequestParams RenderRequestParams = 3;
    }
  }

  message TFinishChatDirective {
    string Name = 1;
  }

  message TLimitExceededBannerDirective {
    string Name = 1;
    string Text = 2;
    string Title = 3;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TAliceChatCapability.TParameters Parameters = 2;
  .NAlice.TAliceChatCapability.TState State = 3;
}

