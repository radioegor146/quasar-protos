syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "YaBrowserCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/ya_browser;yabrowserpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TYaBrowserCapability {
  message TParameters {
  }

  message TState {
  }

  message TOpenUrlDirective {
    string Name = 1;
    string Url = 2;
  }

  message TOpenBrowserDirective {
    string Name = 1;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TYaBrowserCapability.TParameters Parameters = 2;
  .NAlice.TYaBrowserCapability.TState State = 3;
}

