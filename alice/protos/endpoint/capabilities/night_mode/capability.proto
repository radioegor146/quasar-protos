syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "NightModeCapabilityProto";
option java_multiple_files = true;
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/night_mode;nightmodepb";

import "google/protobuf/descriptor.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TNightModeCapability {
  message TParameters {
  }

  message TState {
    bool Enabled = 1;
  }

  message TSetNightModeDirective {
    string Name = 1000;
    bool Enabled = 1;
    bool ManuallyToggled = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TNightModeCapability.TParameters Parameters = 2;
  .NAlice.TNightModeCapability.TState State = 3;
}

