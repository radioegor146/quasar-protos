syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.capabilities";
option java_outer_classname = "SerialNavigatorCapabilityProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/capabilities/serial_navigator;serialnavigatorpb";

import "google/protobuf/descriptor.proto";
import "alice/protos/data/tv/carousel.proto";
import "alice/protos/data/tv/serial_navigator/serial_navigator_position.proto";
import "alice/protos/data/tv/serial_navigator/wrappers.proto";
import "alice/protos/endpoint/capability.proto";
import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TSerialNavigatorCapability {
  message TParameters {
  }

  message TState {
    string ProviderItemId = 1;
    string OntoId = 2;
    int32 SelectedSeasonNumber = 3;
  }

  message TShowEpisodeDirective {
    .NAlice.NTv.TSerialInfoWrapper SerialInfo = 1;
    repeated .NAlice.NTv.TCarouselItemWrapper Episodes = 2;
    .NAlice.NTv.TSerialNavigatorPosition Position = 3;
    string Name = 4;
  }

  message TOpenPurchaseDirective {
    string Name = 1;
    string ProviderItemId = 2;
  }

  .NAlice.TCapability.TMeta Meta = 1;
  .NAlice.TSerialNavigatorCapability.TParameters Parameters = 2;
  .NAlice.TSerialNavigatorCapability.TState State = 3;
}

