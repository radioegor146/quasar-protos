syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.endpoint.events";
option java_outer_classname = "EventsProto";
option go_package = "a.yandex-team.ru/alice/protos/endpoint/events;eventspb";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "alice/protos/api/source/source.proto";
import "alice/protos/endpoint/endpoint.proto";
import "alice/protos/endpoint/capability.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TCapabilityEvent {
  reserved "IsEnvironmentStateDependant";
  reserved 5;
  message TEnvironmentStateMode {
    bool IncludeLocalEndpoint = 1;
    bool IncludeEmbeddedEndpoints = 2;
    bool IncludeRemoteEndpoints = 3;
    bool IncludeRemoteCapabilities = 4;
  }

  .google.protobuf.Timestamp Timestamp = 1;
  .google.protobuf.Any Event = 2;
  bool IsLocal = 3;
  bool NonRetryable = 4;
  .NAlice.TCapabilityEvent.TEnvironmentStateMode EnvironmentStateMode = 6;
  .NAlice.NAliceApi.TSourceInfo SourceInfo = 7;
}

message TEndpointCapabilityEvents {
  string EndpointId = 1;
  repeated .NAlice.TCapabilityEvent Events = 2;
}

message TEndpointEvents {
  string EndpointId = 1;
  .NAlice.TEndpoint.TStatus EndpointStatus = 2;
  repeated .NAlice.TCapabilityEvent CapabilityEvents = 3;
  string EndpointPlatform = 4;
}

message TEndpointEventsBatch {
  repeated .NAlice.TEndpointEvents Batch = 1;
}

message TTypedCapabilityEvent {
  .NAlice.TCapabilityEvent Event = 1;
  .NAlice.TCapability.EEventType EventType = 2;
}

