syntax = "proto3";

package NAlice.NOrder;

option java_package = "ru.yandex.alice.protos.data.scenario.order";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/order";

import "alice/protos/data/lat_lon.proto";
import "alice/protos/data/price.proto";
import "yt/yt_proto/yt/formats/extension.proto";
import "google/protobuf/timestamp.proto";

message TItem {
  message TImage {
    enum EImageSize {
      UnknownSize = 0;
      SizeOriginal = 1;
      Size128_128 = 2;
      Size300_300 = 3;
    }

    .NAlice.NOrder.TItem.TImage.EImageSize Size = 1;
    string Url = 2;
  }

  message TSubcategory {
    string Id = 1;
    string Title = 2;
  }

  message TCategory {
    string Id = 1;
    string Title = 2;
    optional string DeepLink = 3;
  }

  message TCatalogPath {
    repeated .NAlice.NOrder.TItem.TCategory Categories = 1;
  }

  message TAmount {
    .NAlice.NData.TDecimal Value = 1;
    string Units = 2;
  }

  enum ERestriction {
    UnknownRestiction = 0;
    AdultOnly = 1;
    DoNotReduceTitle = 2;
    DoNotShowTitle = 3;
  }

  string Id = 1;
  string Title = 2;
  .NAlice.NData.TDecimal Quantity = 3;
  .NAlice.NData.TPrice ActualPrice = 4;
  .NAlice.NData.TPrice FullPrice = 5;
  repeated string Categories = 6;
  repeated .NAlice.NOrder.EItemSource Sources = 7;
  repeated .NAlice.NOrder.TItem.TImage Images = 8;
  repeated .NAlice.NOrder.TItem.ERestriction Restrictions = 9;
  repeated .NAlice.NOrder.TItem.TSubcategory Subcategories = 10;
  repeated .NAlice.NOrder.TItem.TCatalogPath CatalogPaths = 11;
  .NAlice.NOrder.TItem.TAmount Amount = 12;
  string InCartId = 13;
}

message TSearchRequest {
  string Text = 1;
  .NAlice.NData.TLatLon Geo = 2;
  uint32 Limit = 3;
  bool BoostFavourite = 4;
  bool BoostRecent = 5;
  string ProviderName = 6;
  repeated string DebugExpNames = 7;
}

message TSearchResponse {
  enum EStatus {
    UnknownStatus = 0;
    Ok = 1;
    NotInRegion = 2;
  }

  repeated .NAlice.NOrder.TItem Items = 1;
  .NAlice.NOrder.TSearchResponse.EStatus Status = 2;
}

message TUserListRequest {
  .NAlice.NOrder.EItemSource ListType = 1;
  .NAlice.NData.TLatLon Geo = 2;
  uint32 Limit = 3;
  string ProviderName = 4;
}

message TUserListResponse {
  repeated .NAlice.NOrder.TItem Items = 1;
}

message TCart {
  repeated .NAlice.NOrder.TItem Items = 1;
  .NAlice.NData.TLatLon Geo = 2;
  string CartId = 3;
}

message TUpdateCartRequest {
  message TItemRequest {
    string Id = 1;
    .NAlice.NData.TDecimal Quantity = 2;
    optional .NAlice.NData.TPrice Price = 3;
  }

  repeated .NAlice.NOrder.TUpdateCartRequest.TItemRequest DiffItems = 2;
  string ProviderName = 3;
  optional .NAlice.NData.TLatLon Geo = 1;
}

message TUpdateCartResponse {
  .NAlice.NOrder.TCart Cart = 1;
}

message TCurrentCartRequest {
  string ProviderName = 2;
  optional .NAlice.NData.TLatLon Geo = 1;
}

message TCurrentCartResponse {
  .NAlice.NOrder.TCart Cart = 1;
}

message TCheckoutPushRequest {
  string ProviderName = 1;
  string CartId = 2;
}

message TRecentGeoRequest {
  string ProviderName = 1;
  uint32 Limit = 2;
}

message TRecentGeoResponse {
  message TRecentGeo {
    .google.protobuf.Timestamp Time = 1;
    .NAlice.NData.TLatLon LocationLatLon = 2;
    string LocationTextAddress = 3;
  }

  repeated .NAlice.NOrder.TRecentGeoResponse.TRecentGeo Locations = 1;
}

enum EItemSource {
  IS_UNKNOWN = 0;
  IS_RECENT = 2;
  IS_FAVOURITE = 3;
}

