  }

  repeated .NAlice.NData.NMusic.TProviderFmRadioMeta.FmRadioMetaEntry FmRadioMeta = 1;
}

message TMusicPlatformMetaStorage {
  message ProviderMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderMeta value = 2;
  }

  repeated .NAlice.NData.NMusic.TMusicPlatformMetaStorage.ProviderMetaEntry ProviderMeta = 1;
}

message TProviderMeta {
  message TrackMetaRecordsEntry {
    string key = 1;
    .NAlice.NData.NMusic.TTrackMetaRecord value = 2;
  }

  message AlbumMetaRecordsEntry {
    string key = 1;
    .NAlice.NData.NMusic.TAlbumMetaRecord value = 2;
  }

  message ArtistMetaRecordsEntry {
    string key = 1;
    .NAlice.NData.NMusic.TArtistMetaRecord value = 2;
  }

  message PlaylistMetaRecordsEntry {
    string key = 1;
    .NAlice.NData.NMusic.TPlaylistMetaRecord value = 2;
  }

  message RecommendationsMetaRecordsEntry {
    string key = 1;
    .NAlice.NData.NMusic.TRecommendationsMetaRecord value = 2;
  }

  message GenerativeMetaRecordsEntry {
    string key = 1;
    .NAlice.NData.NMusic.TGenerativeMetaRecord value = 2;
  }

  message FmRadioMetaRecordsEntry {
    string key = 1;
    .NAlice.NData.NMusic.TFmRadioMetaRecord value = 2;
  }

  repeated .NAlice.NData.NMusic.TProviderMeta.TrackMetaRecordsEntry TrackMetaRecords = 1;
  repeated .NAlice.NData.NMusic.TProviderMeta.AlbumMetaRecordsEntry AlbumMetaRecords = 2;
  repeated .NAlice.NData.NMusic.TProviderMeta.ArtistMetaRecordsEntry ArtistMetaRecords = 3;
  repeated .NAlice.NData.NMusic.TProviderMeta.PlaylistMetaRecordsEntry PlaylistMetaRecords = 4;
  repeated .NAlice.NData.NMusic.TProviderMeta.RecommendationsMetaRecordsEntry RecommendationsMetaRecords = 5;
  repeated .NAlice.NData.NMusic.TProviderMeta.GenerativeMetaRecordsEntry GenerativeMetaRecords = 6;
  repeated .NAlice.NData.NMusic.TProviderMeta.FmRadioMetaRecordsEntry FmRadioMetaRecords = 7;
}

message TTrackMetaRecord {
  .Alice.Music.TrackMeta TrackMeta = 1;
  .Alice.Music.LikeStatus LikeStatus = 2;
}

message TAlbumMetaRecord {
  .Alice.Music.AlbumMeta AlbumMeta = 1;
  .Alice.Music.LikeStatus LikeStatus = 2;
}

message TArtistMetaRecord {
  .Alice.Music.ArtistMeta ArtistMeta = 1;
  .Alice.Music.LikeStatus LikeStatus = 2;
}

message TPlaylistMetaRecord {
  .Alice.Music.PlaylistMeta PlaylistMeta = 1;
  .Alice.Music.LikeStatus LikeStatus = 2;
}

message TRecommendationsMetaRecord {
  .Alice.Music.RecommendationsMeta RecommendationsMeta = 1;
}

message TGenerativeMetaRecord {
  .Alice.Music.GenerativeMeta GenerativeMeta = 1;
}

message TFmRadioMetaRecord {
  .Alice.Music.FmRadioMeta FmRadioMeta = 1;
}

