syntax = "proto3";

package NAlice.NData.NMusic;

option java_package = "ru.yandex.alice.protos.data.scenario.music";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/music";

import "alice/protos/data/music_provider/provider_meta.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TMetaStorage {
  message ProviderAlbumMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderAlbumMeta value = 2;
  }

  message ProviderArtistMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderArtistMeta value = 2;
  }

  message ProviderPlaylistMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderPlaylistMeta value = 2;
  }

  message ProviderTrackMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderTrackMeta value = 2;
  }

  message ProviderRecommendationsMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderRecommendationsMeta value = 2;
  }

  message ProviderGenerativeMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderGenerativeMeta value = 2;
  }

  message ProviderFmRadioMetaEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderFmRadioMeta value = 2;
  }

  message ProviderInfoEntry {
    string key = 1;
    .NAlice.NData.NMusic.TProviderInfo value = 2;
  }

  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderAlbumMetaEntry ProviderAlbumMeta = 1;
  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderArtistMetaEntry ProviderArtistMeta = 2;
  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderPlaylistMetaEntry ProviderPlaylistMeta = 3;
  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderTrackMetaEntry ProviderTrackMeta = 4;
  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderRecommendationsMetaEntry ProviderRecommendationsMeta = 5;
  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderGenerativeMetaEntry ProviderGenerativeMeta = 6;
  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderFmRadioMetaEntry ProviderFmRadioMeta = 7;
  repeated .NAlice.NData.NMusic.TMetaStorage.ProviderInfoEntry ProviderInfo = 8;
}

message TProviderInfo {
  string TvImageUrl = 1;
  string ScreenDevicesImageUrl = 2;
  string ProviderHumanReadable = 3;
}

message TProviderTrackMeta {
  message TrackMetaEntry {
    string key = 1;
    .Alice.Music.TrackMeta value = 2;
  }

  repeated .NAlice.NData.NMusic.TProviderTrackMeta.TrackMetaEntry TrackMeta = 1;
}

message TProviderAlbumMeta {
  message AlbumMetaEntry {
    string key = 1;
    .Alice.Music.AlbumMeta value = 2;
  }

  repeated .NAlice.NData.NMusic.TProviderAlbumMeta.AlbumMetaEntry AlbumMeta = 1;
}

message TProviderArtistMeta {
  message ArtistMetaEntry {
    string key = 1;
    .Alice.Music.ArtistMeta value = 2;
  }

  repeated .NAlice.NData.NMusic.TProviderArtistMeta.ArtistMetaEntry ArtistMeta = 1;
}

message TProviderPlaylistMeta {
  message PlaylistMetaEntry {
    string key = 1;
    .Alice.Music.PlaylistMeta value = 2;
  }

  repeated .NAlice.NData.NMusic.TProviderPlaylistMeta.PlaylistMetaEntry PlaylistMeta = 1;
}

message TProviderRecommendationsMeta {
  message RecommendationsMetaEntry {
    string key = 1;
    .Alice.Music.RecommendationsMeta value = 2;
