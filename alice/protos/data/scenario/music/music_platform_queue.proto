syntax = "proto3";

package NAlice.NData.NMusic;

option java_package = "ru.yandex.alice.protos.data.scenario.music";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/music";

import "alice/protos/data/music_provider/provider_meta.proto";
import "alice/protos/data/scenario/music/content_id.proto";
import "alice/protos/data/scenario/music/meta_storage.proto";
import "alice/library/yt/extensions/alice_options.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TMusicPlatformQueue {
  repeated .NAlice.NData.NMusic.TPlaybackEntityWithProvider Entities = 1;
  .NAlice.NData.NMusic.TMusicPlatformMetaStorage MusicPlatformMetaStorage = 3;
  optional uint32 CurrentEntityIndex = 2;
}

message TPlaybackEntityWithProvider {
  .Alice.Music.MusicProvider MusicProvider = 1;
  .NAlice.NData.NMusic.TPlaybackEntity PlaybackEntity = 2;
}

message TOperatingFeatures {
  optional bool IsPodcast = 1;
  optional bool IsAliceShow = 2;
  optional bool IsFairytale = 3;
  optional bool IsTrackRemovedOnDislike = 4;
  optional bool IsAudiobook = 5;
}

message TPlaybackEntity {
  .NAlice.NData.NMusic.TEndOfQueueHandlePolicy EndOfQueueHandlePolicy = 101;
  .NAlice.NData.NMusic.TOperatingFeatures OperatingFeatures = 103;
  oneof Entity {
    .NAlice.NData.NMusic.TTrackEntity TrackEntity = 1;
    .NAlice.NData.NMusic.TAlbumEntity AlbumEntity = 2;
    .NAlice.NData.NMusic.TArtistEntity ArtistEntity = 3;
    .NAlice.NData.NMusic.TPlaylistEntity PlaylistEntity = 4;
    .NAlice.NData.NMusic.TFmRadioEntity FmRadioEntity = 5;
  }
  optional bool IsTrial = 102;
}

message TPlatformTrack {
  string Uuid = 3;
  optional string Id = 1;
  optional uint32 PositionInsideEntity = 2;
}

message TTrackEntity {
  .NAlice.NData.NMusic.TPlatformTrack Track = 1;
  .Alice.Music.RepeatType RepeatType = 2;
  string Uuid = 3;
}

message TAlbumEntity {
  .NAlice.NData.NMusic.TMusicContainerInfo MusicContainerInfo = 1;
}

message TArtistEntity {
  .NAlice.NData.NMusic.TMusicContainerInfo MusicContainerInfo = 1;
}

message TPlaylistEntity {
  .NAlice.NData.NMusic.TMusicContainerInfo MusicContainerInfo = 1;
}

message TFmRadioEntity {
  .NAlice.NData.NMusic.TFmRadioStationsContainer RadioStationsContainer = 1;
}

message TFmRadioStationsContainer {
  string Uuid = 1;
  .NAlice.NData.NMusic.TFmRadioStationsPlayback RadioStationsPlayback = 4;
  optional uint32 HistoryStartPosition = 2;
  optional uint32 QueueFinishPosition = 3;
}

message TFmRadioStationsPlayback {
  repeated .NAlice.NData.NMusic.TFmRadioStation RadioStations = 1;
  optional uint32 CurrentRadioStationIndex = 2;
  optional uint32 CurrentGlobalPosition = 3;
}

message TFmRadioStation {
  string Uuid = 1;
  optional string Id = 2;
  optional uint32 PositionInsideEntity = 3;
}

message TMusicContainerInfo {
  .NAlice.NData.NMusic.TTracksPlayback TracksPlayback = 4;
  .Alice.Music.RepeatType RepeatType = 6;
  string Uuid = 7;
  optional string Id = 1;
  optional uint32 HistoryStartPosition = 2;
  optional uint32 QueueFinishPosition = 3;
  optional uint64 ShuffleSeed = 5;
  optional uint32 TotalTracksCount = 8;
}

message TEndOfQueueHandlePolicy {
  message TPlayContentPolicy {
    .NAlice.NData.NMusic.TContentIdWithProvider ContentIdWithProvider = 1;
  }

  message TDoNothingPolicy {
  }

  oneof Policy {
    .NAlice.NData.NMusic.TEndOfQueueHandlePolicy.TPlayContentPolicy PlayContentPolicy = 1;
    .NAlice.NData.NMusic.TEndOfQueueHandlePolicy.TDoNothingPolicy DoNothingPolicy = 2;
  }
}

message TTracksPlayback {
  repeated .NAlice.NData.NMusic.TPlatformTrack Tracks = 1;
  optional uint32 CurrentTrackIndex = 2;
  optional uint32 CurrentGlobalPosition = 3;
}

