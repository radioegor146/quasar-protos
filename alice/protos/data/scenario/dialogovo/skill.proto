syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data.scenario.dialogovo";
option java_outer_classname = "DialogovoScenarioDataProto";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/dialogovo";

import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TDialogovoSkillCardData {
  message TSkillInfo {
    string Name = 1;
    string Logo = 2;
    string SkillId = 3;
    string PaletteId = 4;
  }

  message TSkillRequest {
    string Text = 1;
  }

  message TSkillResponse {
    message TButton {
      string Text = 1;
      string Url = 2;
      string Payload = 3;
    }

    message TSuggest {
      string Text = 1;
      string Url = 2;
      string Payload = 3;
    }

    message TTextResponse {
      string Text = 1;
    }

    message TImageItem {
      string ImageUrl = 1;
      string Title = 2;
      string Description = 3;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TButton Button = 4;
    }

    message TBigImageResponse {
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TImageItem ImageItem = 1;
    }

    message TImageGalleryResponse {
      repeated .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TImageItem ImageItems = 1;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TItemsListHeader ItemsListHeader = 2;
    }

    message TItemsListHeader {
      string Text = 1;
    }

    message TItemsListFooter {
      string Text = 1;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TButton Button = 2;
    }

    message TItemsListResponse {
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TItemsListHeader ItemsLisetHeader = 1;
      repeated .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TImageItem ImageItems = 2;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TItemsListFooter ItemsLisetFooter = 3;
    }

    message TFullScreenResponse {
      string BackgroundImageUrl = 1;
      string Title = 2;
      string Body = 3;
    }

    repeated .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TButton buttons = 5;
    repeated .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TSuggest suggests = 6;
    bool EndSession = 7;
    oneof ResponseCard {
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TTextResponse TextResponse = 1;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TBigImageResponse BigImageResponse = 2;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TImageGalleryResponse ImageGalleryResponse = 3;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TItemsListResponse ItemsListResponse = 4;
      .NAlice.NData.TDialogovoSkillCardData.TSkillResponse.TFullScreenResponse FullScreenResponse = 8;
    }
  }

  .NAlice.NData.TDialogovoSkillCardData.TSkillInfo SkillInfo = 1;
  .NAlice.NData.TDialogovoSkillCardData.TSkillRequest SkillRequest = 2;
  .NAlice.NData.TDialogovoSkillCardData.TSkillResponse SkillResponse = 3;
}

message TDialogovoSkillTeaserData {
  message TSkillInfo {
    string Name = 1;
    string Logo = 2;
    string SkillId = 3;
    string PaletteId = 4;
  }

  .NAlice.NData.TDialogovoSkillTeaserData.TSkillInfo SkillInfo = 1;
  string ImageUrl = 2;
  string Text = 3;
  string Title = 4;
  string Action = 5;
}

message TSkillInfo {
  string Name = 1;
  string Logo = 2;
  string SkillId = 3;
  string PaletteId = 4;
}

message TDialogovoDeactivateSkillData {
  .NAlice.NData.TSkillInfo SkillInfo = 1;
  string Text = 2;
  string Request = 3;
}

