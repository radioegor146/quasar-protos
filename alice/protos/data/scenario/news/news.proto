syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data.scenario.news";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/news";

import "yt/yt_proto/yt/formats/extension.proto";
import "alice/protos/data/news_provider.proto";

message TNewsItem {
  message TImage {
    string Src = 1;
    int32 Width = 2;
    int32 Height = 3;
  }

  string Text = 1;
  string Url = 2;
  .NAlice.NData.TNewsItem.TImage Image = 3;
  string Messages = 5;
  string TurboIconUrl = 6;
  string Agency = 7;
  string Logo = 8;
  uint64 PubDate = 9;
  repeated .NAlice.NData.TNewsItem ExtendedNews = 10;
}

message TNewsGalleryData {
  repeated .NAlice.NData.TNewsItem NewsItems = 1;
  int32 CurrentNewsItem = 2;
  string Topic = 3;
  string Tz = 4;
}

message TNewsTeaserData {
  .NAlice.NData.TNewsItem NewsItem = 1;
  string Topic = 2;
  string Tz = 3;
  bool NewsSourceSelected = 4;
}

message TNewsMainScreenData {
  repeated .NAlice.NData.TNewsItem NewsItems = 1;
  string Topic = 2;
  string Tz = 3;
}

message TNewsSettingData {
  message TNewsProviderData {
    .NAlice.NData.TNewsProvider ProviderConfig = 1;
    string Agency = 2;
    string Logo = 3;
    bool IsChosen = 4;
  }

  repeated .NAlice.NData.TNewsSettingData.TNewsProviderData NewsProviderData = 1;
  string ProviderNamePrefix = 2;
  repeated string AvaliablePrefixes = 3;
  bool IsNewsRequest = 4;
}

