syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data.scenario.timer";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/timer";

import "yt/yt_proto/yt/formats/extension.proto";

message TTimerDescription {
  message TTimerAction {
    string SerializedAction = 1;
  }

  enum ETimerType {
    DEFAULT = 0;
    COMMAND = 1;
  }

  string TimerId = 1;
  uint64 UpdateTimestamp = 9;
  uint64 StartTimestamp = 2;
  uint32 Duration = 3;
  uint32 Remaining = 4;
  bool CurrentlyPlaying = 5;
  bool Paused = 6;
  .NAlice.NData.TTimerDescription.ETimerType TimerType = 7;
  repeated .NAlice.NData.TTimerDescription.TTimerAction TimerActions = 8;
  string Title = 10;
  bool Disabled = 11;
}

