syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data.scenario.centaur.teasers";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/centaur/teasers";

import "yt/yt_proto/yt/formats/extension.proto";
import "alice/protos/data/scenario/news/news.proto";
import "alice/protos/data/scenario/photoframe/screen_saver.proto";
import "alice/protos/data/scenario/afisha/afisha.proto";
import "alice/protos/data/scenario/music/teasers.proto";
import "alice/protos/data/scenario/weather/weather.proto";
import "alice/protos/data/scenario/dialogovo/skill.proto";
import "alice/protos/data/scenario/universal_scenario/universal_scenario.proto";
import "alice/protos/data/scenario/onboarding/proactivity_teaser.proto";
import "alice/protos/data/scenario/ya_disk/ya_disk.proto";
import "alice/protos/extensions/extensions.proto";

message TCentaurTeaserConfigData {
  string TeaserType = 1;
  string TeaserId = 2;
}

message TTeaserSettingsData {
  message TeaserSetting {
    .NAlice.NData.TCentaurTeaserConfigData TeaserConfigData = 1;
    bool IsChosen = 3;
  }

  repeated .NAlice.NData.TTeaserSettingsData.TeaserSetting TeaserSettings = 1;
}

message TTeaserPreviewScenarioData {
  oneof PreviewScenarioData {
    .NAlice.NData.TNewsTeaserData NewsTeaserData = 1;
    .NAlice.NData.TScreenSaverData ScreenSaverData = 2;
    .NAlice.NData.TAfishaTeaserData AfishaTeaserData = 3;
    .NAlice.NData.TWeatherTeaserData WeatherTeaserData = 4;
    .NAlice.NData.TDialogovoSkillTeaserData DialogovoTeaserCardData = 5;
    .NAlice.NData.TProactivityTeaserData ProactivityTeaserData = 6;
    .NAlice.NData.TUniversalScenarioTeaserCardData UniversalScenarioTeaserCardData = 7;
    .NAlice.NData.NMusic.TMusicTeaserData MusicTeaserData = 8;
    .NAlice.NData.TYaDiskTeasersInstructionData YaDiskTeasersInstructionData = 9;
  }
}

message TTeaserSettingsWithContentData {
  message TeaserSettingWithPreview {
    .NAlice.NData.TCentaurTeaserConfigData TeaserConfigData = 1;
    bool IsChosen = 2;
    string TeaserName = 3;
    .NAlice.NData.TTeaserPreviewScenarioData TeaserPreviewScenarioData = 4;
    bool IsNotConfigured = 5;
    string PreviewImage = 6;
    string TeaserDescription = 7;
  }

  repeated .NAlice.NData.TTeaserSettingsWithContentData.TeaserSettingWithPreview TeaserSettingsWithPreview = 1;
}

message TTeasersPreviewData {
  message TTeaserPreview {
    .NAlice.NData.TCentaurTeaserConfigData TeaserConfigData = 1;
    string TeaserName = 2;
    .NAlice.NData.TTeaserPreviewScenarioData TeaserPreviewScenarioData = 3;
    bool IsNotConfigured = 4;
  }

  repeated .NAlice.NData.TTeasersPreviewData.TTeaserPreview TeaserPreviews = 1;
}

