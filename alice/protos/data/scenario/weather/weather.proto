syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data.scenario.weather";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/weather";

import "yt/yt_proto/yt/formats/extension.proto";
import "alice/protos/data/scenario/suggests/suggests.proto";

message TWeatherCondition {
  string Title = 1;
  double FeelsLike = 2;
  double Cloudness = 3;
  double PrecStrength = 4;
  uint32 PrecType = 5;
  string Season = 6;
  optional uint32 SeasonType = 7;
}

message TWeatherLocation {
  string City = 1;
  string CityPrepcase = 2;
}

message TDaylightHours {
  string Sunrise = 1;
  string Sunset = 2;
}

message TWeatherTeaserData {
  repeated .NAlice.NData.TWeatherHourItem HourItems = 1;
  string Date = 2;
  .NAlice.NData.TWeatherLocation GeoLocation = 3;
  string Tz = 4;
  string UserTime = 5;
  string Sunrise = 6;
  string Sunset = 7;
  double Temperature = 8;
  string Icon = 9;
  .NAlice.NData.TWeatherCondition Condition = 10;
  string IconType = 11;
  string UserDate = 12;
  bool ActiveConsumption = 13;
}

message TWeatherMainScreenData {
  string Date = 1;
  .NAlice.NData.TWeatherLocation GeoLocation = 2;
  string Tz = 3;
  string UserTime = 4;
  string Sunrise = 5;
  string Sunset = 6;
  double Temperature = 7;
  string Icon = 8;
  .NAlice.NData.TWeatherCondition Condition = 9;
  string IconType = 10;
  string UserDate = 11;
}

message TWeatherHourItem {
  uint32 Hour = 1;
  uint64 Timestamp = 2;
  double Temperature = 3;
  string Icon = 4;
  string IconType = 5;
  double PrecStrength = 6;
  uint32 PrecType = 7;
}

message TWeatherDayHoursData {
  repeated .NAlice.NData.TWeatherHourItem HourItems = 1;
  string Date = 2;
  .NAlice.NData.TWeatherLocation GeoLocation = 3;
  string DayPartType = 4;
  string Tz = 5;
  string UserTime = 6;
  string Sunrise = 7;
  string Sunset = 8;
  double Temperature = 9;
  string Icon = 10;
  .NAlice.NData.TWeatherCondition Condition = 11;
  .NAlice.NData.TDaylightHours TodayDaylight = 12;
  string IconType = 13;
  string UserDate = 14;
  repeated .NAlice.NData.TSuggest SuggestButtons = 15;
  bool ActiveConsumption = 16;
  double TemperatureMin = 17;
  double TemperatureMax = 18;
  string WeatherUri = 19;
}

message TWeatherDayPartData {
  string Date = 1;
  .NAlice.NData.TWeatherLocation GeoLocation = 2;
  string DayPartType = 3;
  string Tz = 4;
  string UserTime = 5;
  string Sunrise = 6;
  string Sunset = 7;
  double Temperature = 8;
  string Icon = 9;
  .NAlice.NData.TWeatherCondition Condition = 10;
  .NAlice.NData.TDaylightHours TodayDaylight = 11;
  string IconType = 12;
  string UserDate = 13;
  repeated .NAlice.NData.TSuggest SuggestButtons = 14;
  repeated .NAlice.NData.TWeatherDayPartItem DayPartItems = 15;
  bool ActiveConsumption = 16;
  string WeatherUri = 17;
}

message TWeatherDayPartItem {
  string DayPartType = 1;
  double Temperature = 2;
  string Icon = 3;
  .NAlice.NData.TWeatherCondition Condition = 4;
  string IconType = 5;
}

message TWeatherDayData {
  repeated .NAlice.NData.TWeatherDayPartItem DayPartItems = 1;
  string Date = 2;
  .NAlice.NData.TWeatherLocation GeoLocation = 3;
  string Tz = 4;
  string UserTime = 5;
  string Sunrise = 6;
  string Sunset = 7;
  double Temperature = 8;
  string Icon = 9;
  .NAlice.NData.TWeatherCondition Condition = 10;
  .NAlice.NData.TDaylightHours TodayDaylight = 11;
  string IconType = 12;
  string UserDate = 13;
  repeated .NAlice.NData.TSuggest SuggestButtons = 14;
  bool ActiveConsumption = 15;
  double TemperatureMin = 16;
  double TemperatureMax = 17;
  string WeatherUri = 18;
}

message TWeatherDayItem {
  string Date = 1;
  string Tz = 2;
  uint32 WeekDay = 3;
  double DayTemp = 4;
  double NightTemp = 5;
  string Icon = 6;
  .NAlice.NData.TWeatherCondition Condition = 7;
  string Url = 8;
  string IconType = 9;
}

message TWeatherDaysRangeData {
  repeated .NAlice.NData.TWeatherDayItem DayItems = 1;
  .NAlice.NData.TWeatherLocation GeoLocation = 2;
  string Tz = 3;
  string UserTime = 4;
  .NAlice.NData.TDaylightHours TodayDaylight = 5;
  string UserDate = 6;
  repeated .NAlice.NData.TSuggest SuggestButtons = 7;
  .NAlice.NData.TWeatherCondition CurrentCondition = 8;
  double CurrentTemperature = 9;
  bool ActiveConsumption = 10;
  string WeatherUri = 11;
}

message TWeatherInformerData {
  double Temperature = 1;
  string Icon = 2;
  .NAlice.NData.TWeatherCondition Condition = 3;
  string IconType = 4;
}

message TWeatherAdditionalComponent {
  message TWindDirectionData {
    message TDayPartItem {
      string DayPartType = 1;
      double Speed = 2;
      string Icon = 3;
    }

    double Speed = 1;
    double Gust = 2;
    string Icon = 3;
    repeated .NAlice.NData.TWeatherAdditionalComponent.TWindDirectionData.TDayPartItem DayPartItems = 4;
  }

  message THumidityData {
    int32 Humidity = 1;
    string Icon = 2;
  }

  message TPressureData {
    int32 Pressure = 1;
    string Icon = 2;
  }

  message TUvIndexData {
    int32 UvIndex = 1;
    string Description = 2;
    string Icon = 3;
  }

  message TSunriseAndSunsetData {
    message TSunriseData {
      string Sunrise = 1;
      string Icon = 2;
    }

    message TSunsetData {
      string Sunset = 1;
      string Icon = 2;
    }

    .NAlice.NData.TWeatherAdditionalComponent.TSunriseAndSunsetData.TSunriseData SunriseData = 1;
    .NAlice.NData.TWeatherAdditionalComponent.TSunriseAndSunsetData.TSunsetData SunsetData = 2;
  }

  message TMoonPhaseData {
    string MoonPhase = 1;
    string Icon = 2;
  }

  message TFeelsLikeData {
    double FeelsLike = 1;
    string Icon = 2;
  }

  message TWaterTemperatureData {
    int32 WaterTemperature = 1;
    string Icon = 2;
  }

  oneof ComponentData {
    .NAlice.NData.TWeatherAdditionalComponent.TWindDirectionData WindDirectionData = 1;
    .NAlice.NData.TWeatherAdditionalComponent.THumidityData HumidityData = 2;
    .NAlice.NData.TWeatherAdditionalComponent.TPressureData PressureData = 3;
    .NAlice.NData.TWeatherAdditionalComponent.TUvIndexData UvIndexData = 4;
    .NAlice.NData.TWeatherAdditionalComponent.TSunriseAndSunsetData SunriseAndSunsetData = 5;
    .NAlice.NData.TWeatherAdditionalComponent.TMoonPhaseData MoonPhaseData = 6;
    .NAlice.NData.TWeatherAdditionalComponent.TFeelsLikeData FeelsLikeData = 7;
    .NAlice.NData.TWeatherAdditionalComponent.TWaterTemperatureData WaterTemperatureData = 8;
  }
}

message TWeatherDayShortData {
  message TDayPartItem {
    string DayPartType = 1;
    double Temperature = 2;
    string Icon = 3;
  }

  .NAlice.NData.TWeatherLocation GeoLocation = 1;
  string DayPartType = 2;
  string Date = 3;
  string UserDate = 4;
  double Temperature = 5;
  string AlertText = 6;
  string Icon = 7;
  repeated .NAlice.NData.TWeatherDayShortData.TDayPartItem DayPartItems = 8;
  repeated .NAlice.NData.TWeatherAdditionalComponent AdditionalComponents = 9;
  repeated .NAlice.NData.TSuggest SuggestButtons = 10;
}

message TWeatherAdditionalComponentData {
  .NAlice.NData.TWeatherLocation GeoLocation = 1;
  .NAlice.NData.TWeatherAdditionalComponent Component = 2;
  repeated .NAlice.NData.TSuggest SuggestButtons = 3;
}

message TWeatherUserConfig {
  message TWeatherSettings {
    bool WindDirection = 1;
    bool Humidity = 2;
    bool Pressure = 3;
    bool UvIndex = 4;
    bool WaterTemperature = 5;
    bool SunriseAndSunset = 6;
    bool MoonPhase = 7;
    bool FeelsLike = 8;
  }

  .NAlice.NData.TWeatherUserConfig.TWeatherSettings WeatherSettings = 1;
}

