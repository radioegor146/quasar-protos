syntax = "proto3";

package NAlice.NData.NReminders;

option java_package = "ru.yandex.alice.protos.data.scenario.reminders";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/reminders";

import "alice/protos/data/language/language.proto";
import "alice/protos/data/scenario/reminders/extensions.proto";
import "google/protobuf/timestamp.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TState {
  message TWeekdaysTriggerPolicy {
    repeated uint64 InitivalInvocations = 1;
  }

  message TTriggerPolicy {
    oneof Type {
      .NAlice.NData.NReminders.TState.TWeekdaysTriggerPolicy WeekdaysTriggerPolicy = 1;
    }
  }

  message TReminder {
    reserved "Epoch";
    reserved "ClientTimeDeltaSeconds";
    reserved 3;
    reserved 7;
    string Id = 1;
    string Text = 2;
    string TimeZone = 4;
    string Origin = 5;
    uint64 ShootAt = 6;
    .NAlice.NData.NReminders.TReminderExtensions Extensions = 8;
    repeated string OriginPlatformFeatures = 9;
    .NAlice.ELang Language = 11;
    optional .NAlice.NData.NReminders.TState.TTriggerPolicy TriggerPolicy = 10;
    optional bool IsXiva = 12;
  }

  message TSurfaceSyncState {
    .NAlice.NData.NReminders.ERemindersSyncState State = 1;
    .google.protobuf.Timestamp CreatedAt = 2;
  }

  message CancelledEntry {
    string key = 1;
    uint64 value = 2;
  }

  message SurfacesSyncStateEntry {
    string key = 1;
    .NAlice.NData.NReminders.TState.TSurfaceSyncState value = 2;
  }

  repeated .NAlice.NData.NReminders.TState.TReminder Reminders = 1;
  repeated .NAlice.NData.NReminders.TState.CancelledEntry Cancelled = 2;
  repeated .NAlice.NData.NReminders.TState.SurfacesSyncStateEntry SurfacesSyncState = 3;
  .NAlice.NData.NReminders.TRemindersSettings RemindersSettings = 4;
}

message TRemindersSettings {
  enum EPlayOn {
    Undefined = 0;
    SameDevice = 1;
    SelectedDevices = 2;
    All = 3;
  }

  bool SendMobileNotification = 1;
  .NAlice.NData.NReminders.TRemindersSettings.EPlayOn PlayOn = 2;
  repeated string DeviceIds = 3;
  int32 OrmMigrationVersion = 4;
}

