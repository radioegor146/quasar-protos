syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data.scenario.ya_disk";
option go_package = "a.yandex-team.ru/alice/protos/data/scenario/ya_disk";

import "alice/protos/extensions/extensions.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TYaDiskTeasersInstructionData {
  string AlbumUrl = 1;
}

message TYaDiskTeaserData {
  .NAlice.NData.EOrientationType OrientationType = 1;
  .NAlice.NData.TYaDiskImage FirstImage = 2;
  .NAlice.NData.TYaDiskImage SecondImage = 3;
}

message TYaDiskTeaserScenarioData {
  bool AlbumIsEmpty = 1;
  string AlbumUrl = 2;
}

message TYaDiskImage {
  string ItemId = 1;
  string Url = 2;
  int32 Width = 3;
  int32 Height = 4;
}

enum EOrientationType {
  Any = 0;
  LandscapeOnly = 1;
  PortraitOnly = 2;
}

