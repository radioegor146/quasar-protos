syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data";
option go_package = "a.yandex-team.ru/alice/protos/data";

import "yt/yt_proto/yt/formats/extension.proto";

message TTimezone {
  string TimezoneName = 1;
  int64 OffsetSeconds = 2;
}

message TDateTime {
  uint64 Epoch = 1;
  string TimeZone = 2;
}

