syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.tts_interruption_timings";
option java_outer_classname = "TtsInterruptionTimingsProto";
option go_package = "a.yandex-team.ru/alice/protos/data/tts_interruption_timings";

import "yt/yt_proto/yt/formats/extension.proto";

message TTtsInterruptionTimings {
  message TTiming {
    string Word = 1;
    uint64 StartMs = 2;
    uint64 FinishMs = 3;
  }

  repeated .NAlice.TTtsInterruptionTimings.TTiming Timings = 1;
  uint64 TriggerMs = 2;
}

