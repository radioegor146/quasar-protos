  .NAlice.TCommonScenarioSettings Settings = 1;
  .NAlice.TCommonScenarioState State = 2;
}

message TInputControlScenario {
  .NAlice.TCommonScenarioSettings Settings = 1;
  .NAlice.TCommonScenarioState State = 2;
}

