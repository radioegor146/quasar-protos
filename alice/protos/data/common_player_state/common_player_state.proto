syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.common_player_state";
option java_outer_classname = "CommonPlayerStateProto";
option go_package = "a.yandex-team.ru/alice/protos/data/common_player_state";

import "yt/yt_proto/yt/formats/extension.proto";

message TCommonPlayerState {
  message ScenarioMetaEntry {
    string key = 1;
    string value = 2;
  }

  bool IsPlaying = 1;
  uint64 LastPlayTimestamp = 2;
  uint64 LastStopTimestamp = 3;
  repeated .NAlice.TCommonPlayerState.ScenarioMetaEntry ScenarioMeta = 4;
  uint32 DurationMs = 5;
  uint32 PlayedMs = 6;
  int32 OffsetMs = 7;
}

