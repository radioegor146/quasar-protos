syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data.date";
option go_package = "a.yandex-team.ru/alice/protos/data/date";

import "yt/yt_proto/yt/formats/extension.proto";

message TGregorianDate {
  enum EMonth {
    None = 0;
    January = 1;
    February = 2;
    March = 3;
    April = 4;
    May = 5;
    June = 6;
    July = 7;
    August = 8;
    September = 9;
    October = 10;
    November = 11;
    December = 12;
  }

  uint32 DayOfMonth = 1;
  .NAlice.NData.TGregorianDate.EMonth Month = 2;
  uint32 Year = 3;
}

