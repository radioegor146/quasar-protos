syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data";
option go_package = "a.yandex-team.ru/alice/protos/data";

import "yt/yt_proto/yt/formats/extension.proto";

message TPlaybackOptions {
  message TSpeedOptions {
    bool ChangeSupport = 1;
  }

  string PlaybackStarterUserId = 1;
  .NAlice.NData.TPlaybackOptions.TSpeedOptions SpeedOptions = 2;
}

