syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.action";
option java_outer_classname = "TvAction";
option go_package = "a.yandex-team.ru/alice/protos/data/action";

import "alice/protos/data/event_source/event_source.proto";
import "yt/yt_proto/yt/formats/extension.proto";
import "google/protobuf/any.proto";

message TTvAction {
  reserved "RequestId";
  reserved 3;
  .google.protobuf.Any Directive = 2;
  optional string AliceRequestId = 4;
  optional .NAlice.TEventSource EventSource = 5;
}

