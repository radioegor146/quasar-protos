syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.device";
option java_outer_classname = "Info";
option go_package = "a.yandex-team.ru/alice/protos/data/device";

import "alice/protos/data/color/color.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TDeviceStatusInfo {
  .NAlice.EDeviceState Status = 1;
  double Updated = 2;
  bool Reportable = 3;
  double Changed = 4;
  .NAlice.EDeviceState ParentStatus = 5;
}

message TUserDeviceInfo {
  string Manufacturer = 1;
  string Model = 2;
  string HwVersion = 3;
  string SwVersion = 4;
  uint32 ProductID = 5;
  uint32 VendorID = 6;
  string SerialNumber = 7;
}

message TUserQuasarInfo {
  string DeviceId = 1;
  string Platform = 2;
  .NAlice.NData.EColor QuasarColor = 4;
}

message TUserSharingInfo {
  reserved "Roles";
  reserved 4;
  uint64 OwnerID = 1;
  uint64 GuestID = 3;
  string HouseholdID = 2;
  repeated .NAlice.TUserSharingInfoRole SubjectRoles = 5;
}

message TUserSharingInfoRole {
  string Type = 1;
  optional string SubjectID = 2;
  optional string Subject = 3;
}

enum EDeviceState {
  UnknownDeviceState = 0;
  OnlineDeviceState = 1;
  OfflineDeviceState = 2;
  NotFoundDeviceState = 3;
  SplitState = 4;
}

