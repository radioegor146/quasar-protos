syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.tv.search";
option java_outer_classname = "TvSearchResult";
option go_package = "a.yandex-team.ru/alice/protos/data/tv/search";

import "alice/protos/api/voice_control/voice_control.proto";
import "alice/protos/data/tv/carousel.proto";
import "alice/protos/data/common_multisearch/multisearch.proto";
import "alice/protos/data/common_search/feature.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TTvSearchRequest {
  string SearchText = 1;
  string RestrictionMode = 2;
  string RestrictionAge = 3;
  string Entref = 4;
  repeated string ExcludeOntoIds = 5;
  string Provider = 6;
  bool WebItemsProhibited = 7;
  repeated .NAlice.EMultiSearchContent SupportedContentTypes = 8;
  repeated .NAlice.ESearchFeatures Features = 9;
}

message TTvSearchCarouselWrapper {
  string Id = 1;
  oneof Carousel {
    .NAlice.NTv.TCarousel BasicCarousel = 101;
  }
}

message TTvSearchResultData {
  repeated .NAlice.TTvSearchCarouselWrapper Galleries = 1;
  repeated .NAlice.TTvSearchCarouselWrapper Carousels = 2;
  string SearchText = 3;
  repeated .NAlice.TVoiceControl VoiceControls = 4;
}

