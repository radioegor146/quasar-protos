syntax = "proto3";

package NAlice.NTv;

option java_package = "ru.yandex.alice.protos.data.tv";
option java_outer_classname = "Music";
option go_package = "a.yandex-team.ru/alice/protos/data/tv";

import "alice/protos/data/avatar/avatar.proto";
import "alice/protos/data/scenario/music/content_id.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TMusicItem {
  message TArtistInfo {
    string Id = 1;
    string Name = 2;
  }

  enum EMusicCategory {
    Unknown = 0;
    Music = 1;
    Audiobook = 2;
  }

  string Id = 1;
  string Title = 2;
  .NAlice.TAvatarMdsImage Thumbnails = 3;
  .NAlice.NData.NMusic.TContentId ContentId = 4;
  repeated .NAlice.NTv.TMusicItem.TArtistInfo Artists = 6;
  .NAlice.NTv.TMusicItem.EMusicCategory MusicCategory = 9;
  optional string Subtitle = 5;
  optional float Progress = 7;
  optional uint64 LastInteractionTime = 8;
}

