syntax = "proto3";

package NAlice.NTv;

option java_package = "ru.yandex.alice.protos.data.tv.serialnavigator";
option java_outer_classname = "SerialNavigatorInfoWrapperProto";
option go_package = "a.yandex-team.ru/alice/protos/data/tv/serial_navigator";

import "yt/yt_proto/yt/formats/extension.proto";
import "alice/protos/api/voice_control/voice_control.proto";
import "alice/protos/data/serial_navigator/season_info.proto";
import "alice/protos/data/serial_navigator/serial_info.proto";

message TSeasonInfoWrapper {
  .NAlice.TSeasonInfo Info = 1;
  repeated .NAlice.TVoiceControl VoiceControl = 2;
}

message TSerialInfoWrapper {
  .NAlice.TSerialInfo Info = 1;
  repeated .NAlice.NTv.TSeasonInfoWrapper Seasons = 2;
  repeated .NAlice.TVoiceControl VoiceControl = 3;
}

