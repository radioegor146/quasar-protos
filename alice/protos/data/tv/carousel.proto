syntax = "proto3";

package NAlice.NTv;

option java_package = "ru.yandex.alice.protos.data.tv";
option java_outer_classname = "Carousel";
option go_package = "a.yandex-team.ru/alice/protos/data/tv";

import "alice/protos/api/voice_control/voice_control.proto";
import "alice/protos/data/video/video.proto";
import "alice/protos/data/tv/application.proto";
import "alice/protos/data/tv/carousel_item_config/config.proto";
import "alice/protos/data/tv/channels/carousel_item.proto";
import "alice/protos/data/tv/music.proto";
import "alice/protos/data/tv/recent/application.proto";
import "alice/protos/data/tv/recent/channel.proto";
import "alice/protos/data/tv/recent/source.proto";
import "alice/protos/data/tv/sport/carousel.proto";
import "alice/protos/data/tv/whats_new/whats_new.proto";
import "alice/protos/data/action/tv_action.proto";
import "alice/protos/div/div2card.proto";
import "google/protobuf/struct.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TCarouselItemWrapper {
  int32 Number = 1;
  repeated .NAlice.TTvAction OnClickAction = 2;
  repeated .NAlice.TTvAction OnLongClickAction = 3;
  repeated .NAlice.TTvAction OnDoubleClickAction = 4;
  .NAlice.NTv.TItemConfig ItemConfig = 5;
  .google.protobuf.Struct CarouselItemGeneralAnalyticsInfoPayload = 6;
  repeated .NAlice.TVoiceControl VoiceControls = 7;
  oneof Item {
    .NAlice.TPersonItem PersonItem = 101;
    .NAlice.TCollectionItem CollectionItem = 102;
    .NAlice.TOttVideoItem VideoItem = 103;
    .NAlice.TWebVideoItem SearchVideoItem = 104;
    .NAlice.NTv.TRecentApplicationsItem RecentApplicationsItem = 105;
    .NAlice.NTv.TMusicItem MusicItem = 106;
    .NAlice.NTv.TRecentApplicationItem RecentApplicationItem = 107;
    .NAlice.NTv.TRecentChannelItem RecentChannelItem = 108;
    .NAlice.NTv.TRecentSourceItem RecentSourceItem = 109;
    .NAlice.NTv.TWhatsNewTile WhatsNewTile = 110;
    .NAlice.NTv.TTvChannelItemWrapper TvChannelItem = 111;
    .NAlice.NTv.TSportEventItem SportEventItem = 112;
  }
}

message TCarouselImageBackground {
  string Url = 1;
}

message TCarousel {
  string Title = 1;
  repeated .NAlice.NTv.TCarouselItemWrapper Items = 2;
  string Id = 3;
  string CacheHash = 4;
  repeated .NAlice.TVoiceControl VoiceControls = 5;
  bool HasMore = 6;
  string LogoUrl = 7;
  oneof Background {
    .NAlice.NTv.TCarouselImageBackground ImageBackground = 101;
  }
}

message TDivCarousel {
  reserved "DivJson";
  reserved 2;
  string Id = 1;
  int32 ElementsCount = 3;
  .NAlice.TDiv2Card DivCardJson = 4;
  string Title = 5;
  repeated .NAlice.TVoiceControl VoiceControls = 6;
  .NAlice.NTv.TDivMetaInfo DivMetaInfo = 14;
}

message TEmptyCarousel {
  string Id = 1;
}

message TDivMetaInfo {
  string OntoId = 1;
  uint64 CreationTimestamp = 2;
}

message TDeleteOttCandidate {
  reserved "OntoId";
  reserved 1;
  string KpId = 2;
}

message TDeleteWebCandidate {
  string Url = 1;
  string KpId = 2;
}

