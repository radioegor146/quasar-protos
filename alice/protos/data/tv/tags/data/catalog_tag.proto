syntax = "proto3";

package NAlice.NTv;

option java_package = "ru.yandex.alice.protos.data.tv.tags.data";
option java_outer_classname = "CatalogTag";
option go_package = "a.yandex-team.ru/alice/protos/data/tv/tags/data";

import "yt/yt_proto/yt/formats/extension.proto";

message TCatalogTag {
  enum ETagType {
    TT_UNKNOWN = 0;
    TT_CONTENT_TYPE = 1;
    TT_GENRE = 2;
    TT_COUNTRY = 3;
    TT_YEAR = 4;
    TT_AGE_RATING = 5;
    TT_QUALITY = 6;
    TT_SORT_ORDER = 7;
    TT_TOP = 8;
  }

  string Name = 1;
  string Id = 2;
  uint32 Priority = 3;
  .NAlice.NTv.TCatalogTag.ETagType TagType = 4;
}

message TCatalogTags {
  repeated .NAlice.NTv.TCatalogTag CatalogTagValue = 1;
}

