syntax = "proto3";

package NAlice.NTv;

option java_package = "ru.yandex.alice.protos.data.tv.recent";
option java_outer_classname = "RecentExternalAppVideo";
option go_package = "a.yandex-team.ru/alice/protos/data/tv/recent";

import "yt/yt_proto/yt/formats/extension.proto";

message TRecentExternalAppVideoItem {
  enum EAspectRatio {
    HORIZONTAL = 0;
    SQUARE = 1;
    VERTICAL = 2;
  }

  enum ERecentType {
    CONTINUE_WATCHING = 0;
    NEXT_EPISODE = 1;
    NEW_EPISODE = 2;
    WILL_WATCH = 3;
  }

  string Id = 1;
  string PackageName = 2;
  string Title = 3;
  string AppIconUri = 7;
  string IntentUri = 8;
  bool IsLive = 9;
  int64 DurationMs = 10;
  int64 PositionMs = 11;
  .NAlice.NTv.TRecentExternalAppVideoItem.EAspectRatio PosterAspectRatio = 12;
  .NAlice.NTv.TRecentExternalAppVideoItem.ERecentType ItemRecentType = 13;
  string AppName = 14;
  optional string PosterUri = 4;
  optional string ThumbnailUri = 5;
  optional string PreviewVideoUri = 6;
}

