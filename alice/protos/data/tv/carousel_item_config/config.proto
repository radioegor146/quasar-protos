syntax = "proto3";

package NAlice.NTv;

option java_package = "ru.yandex.alice.protos.data.tv.carousel_item_config";
option java_outer_classname = "CarouselItemConfig";
option go_package = "a.yandex-team.ru/alice/protos/data/tv/carousel_item_config";

import "yt/yt_proto/yt/formats/extension.proto";

message TItemConfig {
  .NAlice.NTv.EDisplayType DisplayType = 1;
  .NAlice.NTv.EItemBadge ItemBadge = 2;
  bool ShowProgress = 3;
  bool ShowTitleOnImage = 4;
}

enum EDisplayType {
  Unknown = 0;
  HorizontalSmall = 1;
  HorizontalMedium = 2;
  HorizontalBig = 3;
  SquareMedium = 4;
  SquareBig = 5;
  VerticalMedium = 6;
}

enum EItemBadge {
  None = 0;
  Free = 1;
  Bought = 2;
  Rent = 3;
  Plus = 4;
  KpPurchase = 5;
  PlusAmediateka = 6;
  NewEpisode = 7;
  Duration = 8;
}

