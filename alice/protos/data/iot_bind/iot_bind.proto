syntax = "proto3";

package NAlice.NIotBind;

option java_package = "ru.yandex.alice.protos.data.iot_bind";
option java_outer_classname = "IotBindProto";
option go_package = "a.yandex-team.ru/alice/protos/data/iot_bind;iotbindpb";

import "yt/yt_proto/yt/formats/extension.proto";

message TIotBindKey {
  .NAlice.NIotBind.ERole Role = 1;
  uint32 ClusterId = 2;
}

enum ERole {
  CLIENT = 0;
  SERVER = 1;
}

