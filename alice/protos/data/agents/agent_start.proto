syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.agents";
option java_outer_classname = "AgentStartRequest";
option go_package = "a.yandex-team.ru/alice/protos/data/agents";

import "alice/library/censor/protos/extension.proto";
import "yt/yt_proto/yt/formats/extension.proto";
import "google/protobuf/any.proto";

message TAgentStartRequest {
  message THttpHeader {
    string Name = 1;
    string Value = 2;
  }

  .google.protobuf.Any Body = 1;
  repeated .NAlice.TAgentStartRequest.THttpHeader AdditionalHeaders = 2;
}

