syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.calls";
option java_outer_classname = "CallableDevices";
option go_package = "a.yandex-team.ru/alice/protos/data/calls";

import "yt/yt_proto/yt/formats/extension.proto";
import "alice/library/yt/extensions/alice_options.proto";

message TCallableDevice {
  message TQuasarInfo {
    string DeviceId = 1;
    string Platform = 2;
  }

  string Id = 1;
  string Name = 2;
  string RoomId = 3;
  string HouseholdId = 4;
  .NAlice.TCallableDevice.TQuasarInfo QuasarInfo = 5;
  string DeviceIconUrl = 6;
  bool RadioNannyEnabled = 7;
  bool DropInEnabled = 8;
  bool VideoCallEnabled = 9;
}

message TRoom {
  string Id = 1;
  string Name = 2;
  string HouseholdId = 3;
}

message THousehold {
  string Id = 1;
  string Name = 2;
}

message TCallableDevicesData {
  repeated .NAlice.TCallableDevice CallableDevices = 1;
  repeated .NAlice.THousehold Households = 2;
  repeated .NAlice.TRoom Rooms = 3;
}

