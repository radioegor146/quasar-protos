syntax = "proto3";

package NAlice.NData;

option java_package = "ru.yandex.alice.protos.data";
option go_package = "a.yandex-team.ru/alice/protos/data";

import "yt/yt_proto/yt/formats/extension.proto";

message TLayer {
  message TContentLayer {
  }

  message TAlarmLayer {
  }

  message TDialogLayer {
  }

  oneof Layer {
    .NAlice.NData.TLayer.TContentLayer Content = 1;
    .NAlice.NData.TLayer.TDialogLayer Dialog = 2;
    .NAlice.NData.TLayer.TAlarmLayer Alarm = 3;
  }
}

