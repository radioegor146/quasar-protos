syntax = "proto3";

package NAlice;

option go_package = "a.yandex-team.ru/alice/protos/data/video/centaur";

import "alice/protos/api/voice_control/voice_control.proto";
import "alice/protos/data/video/video.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TSeasonSeriesDetails {
  message TSeasonInfo {
    string ProviderItemId = 1;
    string ContentType = 2;
    uint32 Season = 3;
    uint32 EpisodeCount = 4;
    string SeasonName = 5;
  }

  message TEpisodeInfo {
    .NAlice.TOttVideoItem Episode = 1;
    repeated .NAlice.TVoiceControl VoiceControls = 2;
  }

  string ProviderItemId = 1;
  string ContentType = 2;
  string Name = 3;
  repeated .NAlice.TSeasonSeriesDetails.TSeasonInfo Seasons = 4;
  uint32 CurrentSeason = 5;
  repeated .NAlice.TSeasonSeriesDetails.TEpisodeInfo EpisodeInfo = 6;
  repeated .NAlice.TVoiceControl VoiceControls = 7;
}

