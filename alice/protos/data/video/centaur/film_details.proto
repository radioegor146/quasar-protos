syntax = "proto3";

package NAlice;

option go_package = "a.yandex-team.ru/alice/protos/data/video/centaur";

import "alice/protos/data/video/video.proto";
import "alice/protos/api/voice_control/voice_control.proto";
import "yt/yt_proto/yt/formats/extension.proto";

message TFilmDetails {
  reserved "RelatedItems";
  reserved 3;
  .NAlice.TOttVideoItem VideoItem = 1;
  repeated .NAlice.TPersonItem Actors = 2;
  repeated .NAlice.TOttVideoItem RelatedFilms = 5;
  string ThumbnailLogo = 6;
  string ShortDescription = 7;
  repeated .NAlice.TVoiceControl VoiceControls = 4;
}

