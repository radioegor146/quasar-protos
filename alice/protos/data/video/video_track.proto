syntax = "proto3";

package NAlice;

option java_package = "ru.yandex.alice.protos.data.video";
option java_outer_classname = "VideoTrackProto";
option go_package = "a.yandex-team.ru/alice/protos/data/video";

import "yt/yt_proto/yt/formats/extension.proto";

message TTrackVariant {
  string Id = 1;
  string Title = 2;
  bool Selected = 3;
  bool DisabledForSelection = 5;
  oneof OptionalLanguage {
    string Language = 4;
  }
}

enum ETrackType {
  UnknownTrackType = 0;
  VideoTrackType = 1;
  AudioTrackType = 2;
  SubtitlesTrackType = 3;
  SpeedTrackType = 4;
}

