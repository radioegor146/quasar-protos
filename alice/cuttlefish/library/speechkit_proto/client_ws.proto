syntax = "proto2";

package NSpeechkitProtocol;

import "google/protobuf/any.proto";

message TAudioStream {
  required int32 StreamId = 1;
  required bytes Data = 2;
}

message TStreamControl {
  enum EAction {
    ACTION_CLOSE = 0;
    ACTION_CHUNK = 1;
    ACTION_SPOTTER_END = 2;
    ACTION_NEXT_CHUNK = 3;
    ACTION_INVALID = -1;
  }

  optional string MessageId = 1;
  optional int64 StreamId = 2;
  optional .NSpeechkitProtocol.TStreamControl.EAction Action = 3;
}

message TMessageHeader {
  optional string MessageId = 1;
  optional string RefMessageId = 2;
  optional string EventId = 3;
  optional int64 StreamId = 4;
  optional int64 Ack = 5;
  optional int64 SequenceNumber = 6;
  optional int64 RefStreamId = 7;
  optional string RtLogId = 8;
  optional string Namespace = 9;
  optional string Name = 10;
}

message THttpHeader {
  optional string Name = 1;
  optional string Value = 2;
}

message TMusicOptions {
  repeated .NSpeechkitProtocol.THttpHeader Headers = 1;
  optional bool RecognizeMusicOnly = 2;
}

message TApplicationInfo {
  optional string Uuid = 1;
  optional string Name = 2;
}

message TAsrOptions {
  optional bool EnablePartials = 1;
  optional bool MultiEOU = 2;
  optional string Topic = 3;
  optional string Lang = 4;
  optional bool EnableAntimat = 5;
  optional bool Punctuation = 6;
}

message TUserInfo {
  optional string Yandexuid = 1;
}

message TAsrRecognize {
  optional string ApiKey = 1;
  optional .NSpeechkitProtocol.TMusicOptions MusicOptions = 2;
  optional .NSpeechkitProtocol.EFormat Format = 3;
  repeated string Experiments = 4;
  optional .NSpeechkitProtocol.TAsrOptions DesiredAsrOptions = 5;
  optional string Tags = 6;
  optional .NSpeechkitProtocol.TApplicationInfo ApplicationInfo = 7;
  optional .NSpeechkitProtocol.TUserInfo UserInfo = 8;
  optional .NSpeechkitProtocol.TMessageHeader Header = 9;
}

message TExApplicationInfo {
  optional string QuasmodromGroup = 1;
  optional string DeviceModel = 2;
  optional string OsVersion = 3;
  optional string ClientTime = 4;
  optional string Timezone = 5;
  optional string QuasmodromSubgroup = 6;
  optional string AppId = 7;
  optional string Platform = 8;
  optional string DeviceId = 9;
  optional string AppVersion = 10;
  optional string Lang = 11;
  optional string DeviceManufacturer = 12;
  optional string Uuid = 13;
  optional string Timestamp = 14;
}

message TXInput {
  reserved 6;
  optional string BiometryClassify = 1;
  optional .NSpeechkitProtocol.TAsrOptions DesiredAsrOptions = 2;
  optional bool EnableSpotterValidation = 3;
  optional string BiometryGroup = 4;
  optional .NSpeechkitProtocol.EFormat Format = 5;
  repeated string Experiments = 7;
  optional string Tags = 8;
  optional .NSpeechkitProtocol.TMusicOptions MusicOptions = 9;
  optional .NSpeechkitProtocol.TMessageHeader Header = 10;
  optional .NSpeechkitProtocol.TExApplicationInfo ApplicationInfo = 11;
}

message TUnusedSpeechkitMessage {
  required uint64 Timestamp = 1;
  oneof Payload {
    .NSpeechkitProtocol.TAudioStream AudioStream = 100;
    .NSpeechkitProtocol.TStreamControl StreamControl = 101;
    .NSpeechkitProtocol.TAsrRecognize AsrRecognize = 102;
    .NSpeechkitProtocol.TXInput VoiceInput = 103;
    .NSpeechkitProtocol.TXInput TextInput = 104;
    .NSpeechkitProtocol.TXInput MusicInput = 105;
  }
}

message TUnusedSpeechkitMessages {
  required int32 ProtocolVersion = 1;
  repeated .NSpeechkitProtocol.TUnusedSpeechkitMessage Messages = 2;
}

message TSpeechkitMessage {
  optional .NSpeechkitProtocol.TMessageHeader Header = 1;
  optional .google.protobuf.Any Payload = 2;
}

enum EFormat {
  FORMAT_RAW_OPUS = 1;
  FORMAT_OPUS_IN_OGG = 2;
  FORMAT_OPUS_IN_WEBM = 3;
  FORMAT_8000_PCM = 4;
  FORMAT_16000_PCM = 5;
  FORMAT_UNKNOWN = 6;
}

